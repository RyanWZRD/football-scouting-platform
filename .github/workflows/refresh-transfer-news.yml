name: Refresh Transfer News

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch: {}

jobs:
  refresh-news:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests psycopg2-binary

      - name: Fetch and cache transfer news
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python transfer_news_refresh.py
