<script type="text/babel" data-presets="react">

// treat it as a real security boundary for sensitive data.
const API_KEY = "scout9x7k2mQpL4vRt8";

// ---------------------------------------------------------------------------
// SEED DATA (fallback if the live API can't be reached)
// ---------------------------------------------------------------------------

    note:"Modern inverted wing-back. Comfortable stepping into midfield to overload the half-space — profile echoes early Frimpong.",

  { id:"adewumi", name:"Oluwaseun Adewumi", age:20, position:"AM", posLabel:"Attacking Mid",
    club:"Dundee (loan, parent: Burnley)", league:"Scottish Championship", flag:"🏴", potential:76, marketValue:"€3.5M",

    note:"Won Dundee's Young Player of the Season on loan — an eye for the killer pass in a league most databases don't track.",

  { id:"estevao", name:"Estêvão (pre-move case study)", age:18, position:"RW", posLabel:"Winger",

    note:"Validation case: led Série A in shots on target, big chances created and take-ons as a teenager — before the €35M move.",

  { id:"gen1", name:"Marcos Ferreira*", age:20, position:"CB", posLabel:"Centre-Back",
    club:"Vitória SC", league:"Liga Portugal", flag:"🇵🇹", potential:71, marketValue:"€6M",
    metrics:{ Finishing:12, Progression:55, Defense:82, Physical:74, Creativity:34, Composure:69 },
    note:"*Illustrative — stands in for the ball-playing centre-back archetype Portuguese academies reliably produce.",

  { id:"gen2", name:"Kenji Iwasaki*", age:19, position:"CM", posLabel:"Central Mid",

function potentialColor(v) {
  if (v == null) return "#4A5C52";
  if (v >= 85) return "#E3A857";
  if (v >= 70) return "#C9C08A";
  return "#8A9A8E";
}

// Metrics can be plain numbers (seed/demo players, already 0-100 skill scores)
// or {raw, scaled} objects (live players, real per-90 stats with a chart-only
// scaled value). These helpers read whichever shape is present.
function metricScaled(v) {
  return typeof v === "object" && v !== null ? v.scaled : v;
}
function metricRaw(v) {
  return typeof v === "object" && v !== null ? v.raw : v;
}
function metricLabel(v) {
  const raw = metricRaw(v);
  return Number.isInteger(raw) ? raw : Math.round(raw * 10) / 10;
}

// ---------------------------------------------------------------------------
// Hand-rolled SVG charts (no chart library dependency)
// ---------------------------------------------------------------------------
function polar(cx, cy, r, angleDeg) {
  const rad = (Math.PI / 180) * (angleDeg - 90);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function RadarChart({ metrics }) {
  const entries = Object.entries(metrics);
  const n = entries.length;
  const cx = 100, cy = 85, maxR = 60;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = entries.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const dataPts = entries.map(([, v], i) => polar(cx, cy, maxR * (Math.min(metricScaled(v), 100) / 100), i * angleStep));
  const dataPolygon = dataPts.map(p => `${p.x},${p.y}`).join(" ");

  const labels = entries.map(([k], i) => {
    const p = polar(cx, cy, maxR + 14, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#6B8570" fontSize="9"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  return (
    <svg viewBox="0 0 200 160" width="100%" height="100%">
      {gridRings}
      {entries.map((_, i) => {
        const p = polar(cx, cy, maxR, i * angleStep);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
      })}
      <polygon points={dataPolygon} fill="#E3A857" fillOpacity="0.25" stroke="#E3A857" strokeWidth="1.5" />
      {labels}
    </svg>
  );
}

function BarChart({ metrics }) {
  const entries = Object.entries(metrics);
  const rowH = 28;
  const height = entries.length * rowH + 10;
  return (
    <svg viewBox={`0 0 300 ${height}`} width="100%" height="100%">
      {entries.map(([k, v], i) => {
        const y = i * rowH + 8;
        const w = Math.max(0, Math.min(100, metricScaled(v))) * 1.6;
        return (
          <g key={k}>
            <text x="0" y={y + 14} fill="#9AAA9E" fontSize="11">{k}</text>
            <rect x="90" y={y} width="170" height="16" fill="#152922" />
            <rect x="90" y={y} width={w} height="16" fill="#E3A857" />
            <text x={90 + w + 6} y={y + 13} fill="#EDEDE3" fontSize="10">{metricLabel(v)}</text>
          </g>
        );
      })}
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Scaling reference points for chart display only (raw numbers are always
// shown as the actual label/text — these maxes just set what counts as
// "full bar" for visual comparison, roughly a very good per-90 rate).
const STAT_SCALE = {
  "Goals/90": 0.8,
  "Assists/90": 0.5,
  "Key Passes/90": 3,
  "Tackles/90": 4,
  "Take-ons/90": 3,
  "Pass Acc %": 100,
  "Rating": 10,
};

function scaledMetrics(raw) {
  const out = {};
  for (const [k, v] of Object.entries(raw)) {
    const max = STAT_SCALE[k] || 100;
    out[k] = { raw: v, scaled: Math.min(100, Math.max(0, (v / max) * 100)) };
  }
  return out;
}

function normalizeLivePlayer(row) {
  const age = row.date_of_birth
    ? Math.floor((Date.now() - new Date(row.date_of_birth)) / 3.15576e10)
    : null;
  const minutes = row.minutes_played || 0;
  const p90 = (total) => minutes > 0 ? (total || 0) * 90 / minutes : 0;
  const hasStats = minutes > 0;

  return {
    id: `live-${row.id}`,
    name: row.full_name,
    age,
    position: row.primary_position,
    posLabel: row.primary_position,
    club: row.club || "Unattached",
    league: row.league || "Unknown league",
    flag: "",
    potential: row.potential_index != null ? Math.round(row.potential_index) : null,
    marketValue: "—",
    minutesPlayed: minutes,
    metrics: hasStats ? scaledMetrics({
      "Goals/90": p90(row.goals),
      "Assists/90": p90(row.assists),
      "Key Passes/90": p90(row.key_passes),
      "Tackles/90": p90(row.tackles),
      "Take-ons/90": p90(row.take_ons_completed),
      "Pass Acc %": row.pass_accuracy_pct ?? 0,
      "Rating": row.avg_rating ?? 0,
    }) : scaledMetrics({ "Goals/90": 0, "Assists/90": 0, "Key Passes/90": 0, "Tackles/90": 0 }),
    note: !hasStats
      ? "Live record — no match data ingested yet for this player, so no real stats to show."
      : row.potential_index != null
        ? `Live record, ${Math.round(minutes)} minutes across ingested matches.`
        : "Live record — has match stats, but not enough minutes yet for a potential score.",
    tags: !hasStats ? ["Live data", "No match data"] : row.potential_index != null ? ["Live data"] : ["Live data", "Unscored"],
  };
}

function PlayerCard({ p, onOpen, onToggleCompare, isComparing, compareDisabled }) {
  return (
    <div className="bg-[#152922] border border-[#2C4A3B] hover:border-[#E3A857] transition-colors duration-200 p-5 flex flex-col gap-3 w-full relative">
      <label className="absolute top-4 right-4 flex items-center gap-1.5 text-[10px] uppercase tracking-wide text-[#6B8570] cursor-pointer z-10">
        <input type="checkbox" checked={isComparing} disabled={compareDisabled && !isComparing}
          onChange={() => onToggleCompare(p)}
          className="accent-[#E3A857]" />
        Compare
      </label>
      <button onClick={() => onOpen(p)} className="text-left flex flex-col gap-3 w-full">
        <div className="flex items-start justify-between pr-16">
          <div>
            <div className="text-[11px] tracking-[0.18em] uppercase text-[#6B8570] font-mono">{p.league}</div>
            <h3 className="text-xl text-[#EDEDE3] font-bold leading-tight mt-1">{p.name}</h3>
            <div className="text-sm text-[#9AAA9E] mt-0.5">{p.flag} {p.club} · Age {p.age ?? "—"} · {p.posLabel}</div>
          </div>
          <div className="text-right shrink-0 pl-3">
            <div className="text-3xl font-bold" style={{ color: potentialColor(p.potential) }}>
              {p.potential ?? "—"}
            </div>
            <div className="text-[10px] tracking-[0.15em] uppercase text-[#6B8570]">
              {p.potential == null ? "Unscored" : "Potential"}
            </div>
          </div>
        </div>
        <div className="h-32 -mx-2"><RadarChart metrics={p.metrics} /></div>
        <div className="flex flex-wrap gap-1.5">
          {p.tags.map(t => (
            <span key={t} className="text-[10px] uppercase tracking-wide px-2 py-1 border border-[#2C4A3B] text-[#9AAA9E]">{t}</span>
          ))}
        </div>
      </button>
    </div>
  );
}

function PlayerDossier({ p, onClose }) {
  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-2xl w-full max-h-[90vh] overflow-y-auto p-8 relative"
        onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-mono">Scouting Dossier</div>
        <h2 className="text-3xl text-[#EDEDE3] font-bold mt-2">{p.name}</h2>
        <div className="text-[#9AAA9E] mt-1">{p.flag} {p.club} · {p.league} · Age {p.age ?? "—"} · {p.posLabel}</div>
        <div className="grid grid-cols-2 gap-4 mt-6 border-t border-b border-[#2C4A3B] py-4">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">
              {p.potential == null ? "Status" : "Potential Index"}
            </div>
            <div className="text-2xl font-bold" style={{ color: potentialColor(p.potential) }}>
              {p.potential ?? "Unscored"}
            </div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">
              {p.minutesPlayed != null ? "Minutes (ingested)" : "Est. Value"}
            </div>
            <div className="text-xl font-mono text-[#EDEDE3]">
              {p.minutesPlayed != null ? p.minutesPlayed : p.marketValue}
            </div>
          </div>
        </div>
        <div className="mt-6"><BarChart metrics={p.metrics} /></div>
        <div className="mt-6">
          <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Scout note</div>
          <p className="text-[#C9C08A] leading-relaxed text-sm">{p.note}</p>
        </div>
        <div className="flex flex-wrap gap-1.5 mt-4">
          {p.tags.map(t => (
            <span key={t} className="text-[10px] uppercase tracking-wide px-2 py-1 border border-[#2C4A3B] text-[#9AAA9E]">{t}</span>
          ))}
        </div>
      </div>
    </div>
  );
}

function CompareBar({ selected, onClear, onCompare }) {
  if (selected.length === 0) return null;
  return (
    <div className="fixed bottom-0 left-0 right-0 bg-[#152922] border-t border-[#E3A857] px-6 py-4 flex items-center justify-between z-40">
      <div className="text-sm text-[#EDEDE3]">
        {selected.length === 1
          ? `${selected[0].name} selected — pick one more to compare`
          : `Comparing ${selected[0].name} vs ${selected[1].name}`}
      </div>
      <div className="flex gap-3">
        <button onClick={onClear} className="text-xs uppercase tracking-wide text-[#9AAA9E] hover:text-[#EDEDE3] px-3 py-2">
          Clear
        </button>
        <button onClick={onCompare} disabled={selected.length < 2}
          className="text-xs uppercase tracking-wide px-4 py-2 bg-[#E3A857] text-[#0E1A15] font-bold disabled:opacity-40 disabled:cursor-not-allowed">
          Compare
        </button>
      </div>
    </div>
  );
}

function ComparePanel({ players, onClose }) {
  const [a, b] = players;
  const allMetrics = Array.from(new Set([...Object.keys(a.metrics), ...Object.keys(b.metrics)]));
  return (
    <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-3xl w-full max-h-[90vh] overflow-y-auto p-8 relative"
        onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-mono mb-4">Head to Head</div>
        <div className="grid grid-cols-2 gap-6">
          {[a, b].map(p => (
            <div key={p.id}>
              <h3 className="text-xl text-[#EDEDE3] font-bold">{p.name}</h3>
              <div className="text-xs text-[#9AAA9E] mb-2">{p.club} · {p.league} · Age {p.age ?? "—"}</div>
              <div className="text-3xl font-bold" style={{ color: potentialColor(p.potential) }}>
                {p.potential ?? "—"}
              </div>
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">
                {p.potential == null ? "Unscored" : "Potential Index"}
              </div>
            </div>
          ))}
        </div>
        <div className="mt-6 space-y-2">
          {allMetrics.map(m => {
            const av = metricScaled(a.metrics[m] ?? 0);
            const bv = metricScaled(b.metrics[m] ?? 0);
            const total = av + bv || 1;
            return (
              <div key={m}>
                <div className="flex justify-between text-[11px] text-[#9AAA9E] mb-1">
                  <span>{metricLabel(a.metrics[m] ?? 0)}</span>
                  <span className="uppercase tracking-wide text-[#6B8570]">{m}</span>
                  <span>{metricLabel(b.metrics[m] ?? 0)}</span>
                </div>
                <div className="flex h-2 bg-[#152922] overflow-hidden">
                  <div style={{ width: `${(av / total) * 100}%` }} className="bg-[#E3A857]" />
                  <div style={{ width: `${(bv / total) * 100}%` }} className="bg-[#8A9A8E]" />
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function ScoutDashboard() {
  const [league, setLeague] = useState("All leagues");
  const [position, setPosition] = useState("All positions");
  const [query, setQuery] = useState("");
  const [sortDesc, setSortDesc] = useState(true);
  const [selected, setSelected] = useState(null);
  const [livePlayers, setLivePlayers] = useState(null);
  const [connectionStatus, setConnectionStatus] = useState(API_BASE_URL ? "connecting" : "offline");
  const [compareList, setCompareList] = useState([]);
  const [comparing, setComparing] = useState(false);

  const toggleCompare = (p) => {
    setCompareList(list => {
      if (list.find(x => x.id === p.id)) return list.filter(x => x.id !== p.id);
      if (list.length >= 2) return list;
      return [...list, p];
    });
  };

  useEffect(() => {
    if (!API_BASE_URL) return;
    let cancelled = false;
    setConnectionStatus("connecting");
    fetch(`${API_BASE_URL}/players?limit=200`, {
      headers: API_KEY ? { "X-API-Key": API_KEY } : {}
    })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        if (cancelled) return;
        setLivePlayers(rows.map(normalizeLivePlayer));
        setConnectionStatus("live");
      })
      .catch(() => { if (!cancelled) setConnectionStatus("offline"); });
    return () => { cancelled = true; };
  }, []);

  const dataSource = livePlayers && connectionStatus === "live" ? livePlayers : PLAYERS;

  const availableLeagues = useMemo(() =>
    ["All leagues", ...Array.from(new Set(dataSource.map(p => p.league)))], [dataSource]);
  const availablePositions = useMemo(() =>
    ["All positions", ...Array.from(new Set(dataSource.map(p => p.position)))], [dataSource]);

  const filtered = useMemo(() => {
    let list = dataSource.filter(p => {
      if (league !== "All leagues" && p.league !== league) return false;
      if (position !== "All positions" && p.position !== position) return false;
      if (query && !p.name.toLowerCase().includes(query.toLowerCase()) &&
          !p.club.toLowerCase().includes(query.toLowerCase())) return false;
      return true;
    });
    list.sort((a, b) => {
      if (a.potential == null && b.potential == null) return 0;
      if (a.potential == null) return 1;
      if (b.potential == null) return -1;
      return sortDesc ? b.potential - a.potential : a.potential - b.potential;
    });
    return list;
  }, [dataSource, league, position, query, sortDesc]);

  return (
    <div className="min-h-screen bg-[#0E1A15] text-[#EDEDE3]">
      <div className="border-b border-[#2C4A3B] px-6 py-10 md:px-10">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[11px] tracking-[0.25em] uppercase text-[#E3A857] font-mono">Cross-League Scouting Index</div>
          <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-[#6B8570]">
            {connectionStatus === "live" && <>📡 Live API</>}
            {connectionStatus === "connecting" && <>⏳ Connecting...</>}
            {connectionStatus === "offline" && <>⚠ Seed data</>}
          </div>
        </div>
        <h1 className="text-3xl md:text-5xl leading-[1.05] max-w-3xl font-bold">
          Find the player before the big five leagues do.
        </h1>
        <p className="text-[#9AAA9E] mt-4 max-w-2xl text-sm md:text-base">
          A scouting index spanning leagues most databases ignore. Filter, sort, and open any
          dossier for the full statistical + qualitative profile.
        </p>
      </div>

      <div className="px-6 md:px-10 py-5 flex flex-col md:flex-row gap-3 md:items-center border-b border-[#2C4A3B]">
        <div className="flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 flex-1">
          🔍
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search player or club..."
            className="bg-transparent outline-none text-sm w-full placeholder:text-[#6B8570]" />
        </div>
        <select value={league} onChange={e => setLeague(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
          {availableLeagues.map(l => <option key={l}>{l}</option>)}
        </select>
        <select value={position} onChange={e => setPosition(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
          {availablePositions.map(p => <option key={p}>{p}</option>)}
        </select>
        <button onClick={() => setSortDesc(s => !s)}
          className="flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm hover:border-[#E3A857]">
          ↕ Potential {sortDesc ? "↓" : "↑"}
        </button>
      </div>

      <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-24">
        {connectionStatus === "connecting" && (
          [...Array(6)].map((_, i) => (
            <div key={i} className="bg-[#152922] border border-[#2C4A3B] p-5 h-64 animate-pulse" />
          ))
        )}
        {connectionStatus !== "connecting" && filtered.map(p => (
          <PlayerCard key={p.id} p={p} onOpen={setSelected}
            onToggleCompare={toggleCompare}
            isComparing={!!compareList.find(x => x.id === p.id)}
            compareDisabled={compareList.length >= 2} />
        ))}
        {connectionStatus !== "connecting" && filtered.length === 0 && (
          <div className="text-[#6B8570] text-sm">No players match those filters.</div>
        )}
      </div>

      <div className="px-6 md:px-10 py-6 border-t border-[#2C4A3B] text-xs text-[#6B8570]">
        ℹ When "Live API" shows above, you're looking at real ingested data. "Unscored" players
        need more ingested match minutes before a potential score can be computed.
      </div>

      {selected && <PlayerDossier p={selected} onClose={() => setSelected(null)} />}
      <CompareBar selected={compareList} onClear={() => setCompareList([])} onCompare={() => setComparing(true)} />
      {comparing && compareList.length === 2 && (
        <ComparePanel players={compareList} onClose={() => setComparing(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ScoutDashboard />);
</script>
</body>
</html>
