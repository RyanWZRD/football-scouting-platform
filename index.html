function Avatar({ name, photoUrl, size = 44 }) {

// Turns a timestamp into "3h ago", "Just now", "2d ago", etc.
function relativeTime(isoString) {
  if (!isoString) return null;
  const then = new Date(isoString).getTime();
  const diffMs = Date.now() - then;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "Just now";
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function potentialColor(v) {
  if (v == null) return "#4A5C52";
  if (v >= 85) return "#E3A857";
  if (v >= 70) return "#C9C08A";
  return "#8A9A8E";
}

// Metrics can be plain numbers (seed/demo players, already 0-100 skill scores)
// or {raw, scaled} objects (live players, real per-90 stats with a chart-only
// scaled value). These helpers read whichever shape is present.
function metricScaled(v) {
  return typeof v === "object" && v !== null ? v.scaled : v;
}
function metricRaw(v) {
  return typeof v === "object" && v !== null ? v.raw : v;
}
function metricLabel(v) {
  const raw = metricRaw(v);
  return Number.isInteger(raw) ? raw : Math.round(raw * 10) / 10;
}

// ---------------------------------------------------------------------------
// Hand-rolled SVG charts (no chart library dependency)
// ---------------------------------------------------------------------------
function polar(cx, cy, r, angleDeg) {
  const rad = (Math.PI / 180) * (angleDeg - 90);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function RadarChart({ metrics }) {
  const entries = Object.entries(metrics);
  const n = entries.length;
  const cx = 100, cy = 85, maxR = 60;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = entries.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const dataPts = entries.map(([, v], i) => polar(cx, cy, maxR * (Math.min(metricScaled(v), 100) / 100), i * angleStep));
  const dataPolygon = dataPts.map(p => `${p.x},${p.y}`).join(" ");

  const labels = entries.map(([k], i) => {
    const p = polar(cx, cy, maxR + 14, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#6B8570" fontSize="9"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  return (
    <svg viewBox="0 0 200 160" width="100%" height="100%">
      {gridRings}
      {entries.map((_, i) => {
        const p = polar(cx, cy, maxR, i * angleStep);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
      })}
      <polygon points={dataPolygon} fill="#E3A857" fillOpacity="0.25" stroke="#E3A857" strokeWidth="1.5" />
      {labels}
    </svg>
  );
}

// Overlays one or more players' stat shapes on the same axes — the "octagon"
// comparison view. series: [{ label, color, metrics }, ...]
function OverlayRadarChart({ series }) {
  // Union of all metric keys across every series, preserving first-seen order.
  const axes = [];
  series.forEach(s => Object.keys(s.metrics).forEach(k => { if (!axes.includes(k)) axes.push(k); }));
  const n = axes.length;
  if (n === 0) return null;
  const cx = 150, cy = 135, maxR = 95;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = axes.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const axisLines = axes.map((_, i) => {
    const p = polar(cx, cy, maxR, i * angleStep);
    return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
  });

  const labels = axes.map((k, i) => {
    const p = polar(cx, cy, maxR + 20, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#9AAA9E" fontSize="10"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  const shapes = series.map((s, si) => {
    const pts = axes.map((k, i) => {
      const v = metricScaled(s.metrics[k] ?? 0);
      return polar(cx, cy, maxR * (Math.min(v, 100) / 100), i * angleStep);
    });
    const poly = pts.map(p => `${p.x},${p.y}`).join(" ");
    return (
      <g key={si}>
        <polygon points={poly} fill={s.color} fillOpacity="0.22" stroke={s.color} strokeWidth="2" />
        {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={s.color} />)}
      </g>
    );
  });

  return (
    <svg viewBox="0 0 300 300" width="100%" height="100%">
      {gridRings}
      {axisLines}
      {shapes}
      {labels}
    </svg>
  );
}

// Reads an axis value for a player: "Potential"/"Age" are direct fields,
// anything else is looked up in metrics (raw value, e.g. real Goals/90).
function getAxisValue(p, key) {
  if (key === "Potential") return p.potential;
  if (key === "Age") return p.age;
  return metricRaw(p.metrics[key] ?? null);
}

function ScatterPlot({ players, xKey, yKey, onSelect, topProspectIds, compareIds }) {
  const width = 640, height = 440, pad = 55;
  const pts = players
    .map(p => ({ p, x: getAxisValue(p, xKey), y: getAxisValue(p, yKey) }))
    .filter(d => d.x != null && d.y != null && !isNaN(d.x) && !isNaN(d.y));

  if (pts.length === 0) {
    return (
      <div className="text-[#6B8570] text-sm p-10 text-center">
        No players have real data for both "{xKey}" and "{yKey}" yet. Try different axes or connect to live data.
      </div>
    );
  }

  const xs = pts.map(d => d.x), ys = pts.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  // Pad the range a bit so points don't sit right on the axis edges.
  const xPad = (xMax - xMin) * 0.1 || 1, yPad = (yMax - yMin) * 0.1 || 1;
  const xLo = xMin - xPad, xHi = xMax + xPad;
  const yLo = yMin - yPad, yHi = yMax + yPad;
  const sx = (v) => pad + ((v - xLo) / (xHi - xLo || 1)) * (width - pad - 20);
  const sy = (v) => height - pad - ((v - yLo) / (yHi - yLo || 1)) * (height - pad - 20);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%">
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`h${f}`} x1={pad} x2={width - 20} y1={pad + f * (height - pad - 20)} y2={pad + f * (height - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`v${f}`} y1={pad} y2={height - pad} x1={pad + f * (width - pad - 20)} x2={pad + f * (width - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      <line x1={pad} y1={height - pad} x2={width - 20} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <line x1={pad} y1={pad} x2={pad} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <text x={(width + pad) / 2} y={height - 15} fill="#9AAA9E" fontSize="12" textAnchor="middle">{xKey}</text>
      <text x={16} y={(height - pad + pad) / 2} fill="#9AAA9E" fontSize="12" textAnchor="middle"
        transform={`rotate(-90 16 ${(height - pad + pad) / 2})`}>{yKey}</text>
      {pts.map(({ p, x, y }) => {
        const color = topProspectIds.has(p.id) ? "#E3A857" : compareIds.has(p.id) ? "#7FB3D5" : "#8A9A8E";
        return (
          <circle key={p.id} cx={sx(x)} cy={sy(y)} r={topProspectIds.has(p.id) ? 6 : 5}
            fill={color} fillOpacity="0.85" stroke="#0E1A15" strokeWidth="1"
            style={{ cursor: "pointer" }} onClick={() => onSelect(p)}>
            <title>{`${p.name} · ${p.club}\n${xKey}: ${Math.round(x * 100) / 100}\n${yKey}: ${Math.round(y * 100) / 100}`}</title>
          </circle>
        );
      })}
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Percentile-based scaling: each player's stat is ranked against real peers
// (same position where there's enough sample size, otherwise the whole
// ingested pool) rather than an arbitrary fixed scale. This is computed
// once per fetch across the full player list — see buildPercentileMetrics.
// ---------------------------------------------------------------------------

// Full pool of stats we can compute percentiles for. Not every position's
// radar shows all of these — see POSITION_METRIC_SETS below.
const RAW_STAT_KEYS = ["Goals/90", "Assists/90", "Shots on Target/90", "Key Passes/90",
  "Tackles/90", "Interceptions/90", "Take-ons/90", "Pass Acc %", "Duel Win %", "Rating",
  "Saves/90", "Save %", "Goals Conceded/90"];
const MIN_PEERS_FOR_POSITION_GROUP = 5;

// Stats where a LOWER raw number is actually better (e.g. conceding fewer
// goals). Percentiles for these get inverted so "further out on the radar"
// still consistently means "better" across every axis.
const LOWER_IS_BETTER = new Set(["Goals Conceded/90"]);

// Which axes actually show on a player's radar/octagon, by position — a
// centre-back's radar shouldn't be judged on goals, a striker's shouldn't
// foreground tackles. Percentiles are still computed for every stat (in
// case you compare across positions), this just controls the default view.
// Note: radar shape follows axis count directly (4 axes = diamond, 5 =
// pentagon, etc) — that's normal chart geometry, not a bug.
const POSITION_METRIC_SETS = {
  "Attacker": ["Goals/90", "Shots on Target/90", "Assists/90", "Take-ons/90", "Pass Acc %"],
  "Midfielder": ["Key Passes/90", "Assists/90", "Take-ons/90", "Tackles/90", "Pass Acc %"],
  "Defender": ["Tackles/90", "Interceptions/90", "Duel Win %", "Pass Acc %", "Take-ons/90"],
  "Goalkeeper": ["Saves/90", "Save %", "Goals Conceded/90", "Pass Acc %", "Rating"],
};
const DEFAULT_METRIC_SET = ["Goals/90", "Key Passes/90", "Tackles/90", "Pass Acc %", "Rating"];

function rawStatsForRow(row) {
  const minutes = row.minutes_played || 0;
  const hasStats = minutes > 0;
  const p90 = (total) => hasStats ? (total || 0) * 90 / minutes : null;
  if (!hasStats) {
    const empty = {};
    RAW_STAT_KEYS.forEach(k => { empty[k] = null; });
    return empty;
  }
  return {
    "Goals/90": p90(row.goals),
    "Assists/90": p90(row.assists),
    "Shots on Target/90": p90(row.shots_on_target),
    "Key Passes/90": p90(row.key_passes),
    "Tackles/90": p90(row.tackles),
    "Interceptions/90": p90(row.interceptions),
    "Take-ons/90": p90(row.take_ons_completed),
    "Pass Acc %": row.pass_accuracy_pct ?? null,
    "Duel Win %": row.duel_win_pct ?? null,
    "Rating": row.avg_rating ?? null,
    "Saves/90": p90(row.saves),
    "Save %": row.save_pct ?? null,
    "Goals Conceded/90": p90(row.goals_conceded),
  };
}

// Percentile rank of `value` within `pool` (array of numbers, no nulls).
// Ties split the difference, matching standard percentile-rank convention.
function percentileRank(value, pool) {
  if (value == null || pool.length === 0) return null;
  let below = 0, equal = 0;
  for (const v of pool) {
    if (v < value) below++;
    else if (v === value) equal++;
  }
  return ((below + 0.5 * equal) / pool.length) * 100;
}

// Takes raw /players rows, returns fully-formed player objects with
// percentile-scaled metrics computed against the real ingested pool.
function buildPercentilePlayers(rows) {
  const rawStats = rows.map(rawStatsForRow);

  // Pools per position group, and an overall fallback pool, per metric.
  const positionPools = {};
  const overallPools = {};
  RAW_STAT_KEYS.forEach(k => { overallPools[k] = []; });

  rows.forEach((row, i) => {
    const pos = row.primary_position || "Unknown";
    if (!positionPools[pos]) {
      positionPools[pos] = {};
      RAW_STAT_KEYS.forEach(k => { positionPools[pos][k] = []; });
    }
    RAW_STAT_KEYS.forEach(k => {
      const v = rawStats[i][k];
      if (v != null) {
        positionPools[pos][k].push(v);
        overallPools[k].push(v);
      }
    });
  });

  return rows.map((row, i) => {
    const age = row.date_of_birth
      ? Math.floor((Date.now() - new Date(row.date_of_birth)) / 3.15576e10)
      : null;
    const minutes = row.minutes_played || 0;
    const hasStats = minutes > 0;
    const pos = row.primary_position || "Unknown";
    const raw = rawStats[i];

    const metrics = {};
    RAW_STAT_KEYS.forEach(k => {
      const posPool = positionPools[pos][k];
      const pool = posPool.length >= MIN_PEERS_FOR_POSITION_GROUP ? posPool : overallPools[k];
      let pct = percentileRank(raw[k], pool);
      if (pct != null && LOWER_IS_BETTER.has(k)) pct = 100 - pct;
      metrics[k] = { raw: raw[k] ?? 0, scaled: pct ?? 0 };
    });

    // The subset actually shown on the radar by default — relevant to this
    // player's position. Full `metrics` (all stats) stays available for
    // scatter plots, sorting, and rankings regardless of position.
    const radarKeys = POSITION_METRIC_SETS[pos] || DEFAULT_METRIC_SET;
    const radarMetrics = {};
    radarKeys.forEach(k => { if (metrics[k]) radarMetrics[k] = metrics[k]; });

    const usedPositionPeers = positionPools[pos]?.["Goals/90"]?.length >= MIN_PEERS_FOR_POSITION_GROUP;

    return {
      id: `live-${row.id}`,
      name: row.full_name,
      age,
      position: row.primary_position,
      posLabel: row.primary_position,
      club: row.club || "Unattached",
      league: row.league_display || row.league || "Unknown league",
      flag: "",
      photoUrl: row.photo_url || null,
      injury: row.injury_type ? { type: row.injury_type, reason: row.reason, date: row.reported_date } : null,
      potential: row.potential_index != null ? Math.round(row.potential_index) : null,
      marketValue: "—",
      minutesPlayed: minutes,
      appearances: row.appearances ?? null,
      seasonTotals: hasStats ? {
        "Goals": row.goals ?? 0,
        "Assists": row.assists ?? 0,
        "Shots (Total)": row.shots ?? 0,
        "Shots on Target": row.shots_on_target ?? 0,
        "Key Passes": row.key_passes ?? 0,
        "Passes (Completed/Attempted)": `${row.passes_completed ?? 0}/${row.passes_attempted ?? 0}`,
        "Tackles": row.tackles ?? 0,
        "Interceptions": row.interceptions ?? 0,
        "Take-ons (Completed/Attempted)": `${row.take_ons_completed ?? 0}/${row.take_ons_attempted ?? 0}`,
        "Duels (Won/Attempted)": `${row.duels_won ?? 0}/${row.duels_attempted ?? 0}`,
        ...(row.primary_position === "Goalkeeper" ? {
          "Saves": row.saves ?? 0,
          "Goals Conceded": row.goals_conceded ?? 0,
        } : {}),
      } : null,
      // Discipline stats were only added to ingestion recently — many
      // already-ingested matches genuinely have no data for these yet.
      // Only show the section once there's at least one real non-zero
      // value, rather than displaying a wall of placeholder zeros.
      hasDisciplineData: !!(row.yellow_cards || row.red_cards || row.fouls_committed ||
        row.fouls_drawn || row.offsides || row.penalties_won || row.penalties_scored ||
        row.penalties_missed || row.penalties_committed),
      disciplineTotals: hasStats ? {
        "Yellow Cards": row.yellow_cards ?? 0,
        "Red Cards": row.red_cards ?? 0,
        "Fouls (Committed/Drawn)": `${row.fouls_committed ?? 0}/${row.fouls_drawn ?? 0}`,
        "Offsides": row.offsides ?? 0,
        ...((row.penalties_won || row.penalties_scored || row.penalties_missed || row.penalties_committed) ? {
          "Penalties (Scored/Missed)": `${row.penalties_scored ?? 0}/${row.penalties_missed ?? 0}`,
        } : {}),
      } : null,
      metrics,
      radarMetrics,
      watchLevel: row.watch_level ?? null,
      note: !hasStats
        ? "Live record — no match data ingested yet for this player, so no real stats to show."
        : `Live record, ${Math.round(minutes)} minutes across ingested matches. Chart shows percentile rank ${usedPositionPeers ? `vs other ${pos}s` : "vs the full ingested player pool (not enough same-position peers yet)"}.`,
      tags: !hasStats ? ["Live data", "No match data"] : row.potential_index != null ? ["Live data"] : ["Live data", "Unscored"],
    };
  });
}

function PlayerCard({ p, onOpen, onToggleCompare, isComparing, compareDisabled, isTopProspect, onToggleShortlist, sortBy }) {
  const showSortValue = sortBy && !["potential", "age", "name"].includes(sortBy) && p.metrics[sortBy] !== undefined;
  const shortlisted = p.watchLevel === "shortlist";
  return (

function Sparkline({ points, width = 200, height = 50 }) {
  if (!points || points.length < 2) return null;
  const values = points.map(p => p.potential_index);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = width / (points.length - 1);
  const coords = values.map((v, i) => `${i * stepX},${height - ((v - min) / range) * height}`);
  const trendUp = values[values.length - 1] >= values[0];
  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height}>
      <polyline points={coords.join(" ")} fill="none" stroke={trendUp ? "#7FD99A" : "#E88B7D"} strokeWidth="2" />
      {coords.map((c, i) => {
        const [x, y] = c.split(",");
        return <circle key={i} cx={x} cy={y} r="2.5" fill={trendUp ? "#7FD99A" : "#E88B7D"} />;
      })}
    </svg>
  );
}

  const [similarLoading, setSimilarLoading] = useState(false);
  const shortlisted = p.watchLevel === "shortlist";
  const realId = String(p.id).replace("live-", "");

  const downloadShareCard = () => {
    if (!shareCardRef.current || typeof html2canvas === "undefined") {
      alert("Image export isn't available right now — check your connection and try again.");
      return;
    }
    setExportingImage(true);
    html2canvas(shareCardRef.current, { backgroundColor: "#0E1A15", scale: 2 })
      .then(canvas => {
        const link = document.createElement("a");
        link.download = `${p.name.replace(/\s+/g, "_")}_${tab}_card.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      })
      .catch(() => alert("Image export failed — please try again."))
      .finally(() => setExportingImage(false));
  };

  useEffect(() => {
    if (!API_BASE_URL || !String(p.id).startsWith("live-")) return;
    fetch(`${API_BASE_URL}/players/${realId}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => setDetails(data))
      .catch(() => setDetails(null));
  }, [p.id]);

  // Fetch a broad, position-matched pool and rank by similarity across all
  // real stats — lazy-loaded only when the Similar tab is actually opened.
  useEffect(() => {
    if (tab !== "similar" || similarPlayers !== null || !API_BASE_URL || !p.position) return;
    setSimilarLoading(true);
    const params = new URLSearchParams({ position: p.position, limit: "3000" });
    fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        const pool = buildPercentilePlayers(rows);
        const target = pool.find(x => x.id === p.id) || p;
        const keys = Object.keys(target.metrics);
        const scored = pool
          .filter(x => x.id !== p.id)
          .map(x => {
            let sumSq = 0, n = 0;
            keys.forEach(k => {
              if (target.metrics[k]?.scaled == null || x.metrics[k]?.scaled == null) return;
              const diff = target.metrics[k].scaled - x.metrics[k].scaled;
              sumSq += diff * diff;
              n++;
            });
            return { player: x, distance: n > 0 ? Math.sqrt(sumSq / n) : Infinity };
          })
          .sort((a, b) => a.distance - b.distance)
          .slice(0, 6);
        setSimilarPlayers(scored);
      })
      .catch(() => setSimilarPlayers([]))
      .finally(() => setSimilarLoading(false));

  const saveNote = async () => {
    if (!noteText.trim() || !API_BASE_URL) return;

function ClubProfile({ players, clubName, leagueName, onClose, onSelectPlayer }) {
  const scored = players.filter(p => p.potential != null);
  const avgPotential = scored.length ? Math.round(scored.reduce((s, p) => s + p.potential, 0) / scored.length) : null;
  const agesKnown = players.filter(p => p.age != null);
  const avgAge = agesKnown.length ? (agesKnown.reduce((s, p) => s + p.age, 0) / agesKnown.length).toFixed(1) : null;

  const POSITION_ORDER = ["Goalkeeper", "Defender", "Midfielder", "Attacker"];
  const byPosition = POSITION_ORDER
    .map(pos => ({ pos, list: players.filter(p => p.position === pos).sort((a, b) => (b.potential ?? -1) - (a.potential ?? -1)) }))
    .filter(g => g.list.length > 0);
  const otherPos = players.filter(p => !POSITION_ORDER.includes(p.position));
  if (otherPos.length > 0) byPosition.push({ pos: "Other / Unknown", list: otherPos });

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-2xl w-full max-h-[90vh] overflow-y-auto p-4 sm:p-8 relative"

        <button onClick={onClose} className="absolute top-5 right-5 text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">Squad Profile</div>
        <h2 className="text-3xl text-[#EDEDE3] font-display mt-2">{clubName}</h2>
        <div className="text-[#9AAA9E] mt-1">{leagueName}</div>

        <div className="grid grid-cols-3 gap-4 mt-6 border-b border-[#2C4A3B] pb-4">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">Squad Size</div>
            <div className="text-2xl font-bold text-[#EDEDE3]">{players.length}</div>

function ComparePanel({ players, onClose }) {

  const colorA = "#E3A857";
  const colorB = "#7FB3D5";
  // Always use the FULL stat set here, not the position-narrowed radarMetrics
  // used elsewhere — every player has real percentile data for every stat
  // regardless of position, so a head-to-head should show real numbers on
  // every axis rather than a fake 0 for whichever subset isn't "their" position's.
  const aMetrics = a.metrics;
  const bMetrics = b.metrics;
  const allMetrics = Array.from(new Set([...Object.keys(aMetrics), ...Object.keys(bMetrics)]));
  const samePosition = a.position && a.position === b.position;
  return (
    <div className="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50" onClick={onClose}>

        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono mb-4">Head to Head</div>
        {!samePosition && a.position && b.position && (
          <div className="text-xs text-[#6B8570] mb-3">
            ⚠ Different positions ({a.position} vs {b.position}) — showing all tracked stats for a fair comparison, though some (e.g. Goals/90 for a defender) are naturally less central to that player's role.
          </div>
        )}

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 sm:gap-6">
          {[[a, colorA], [b, colorB]].map(([p, color]) => (
            <div key={p.id}>
              <div className="flex items-center gap-2">
                <span className="w-3 h-3 inline-block rounded-full" style={{ background: color }} />
                <h3 className="text-lg text-[#EDEDE3] font-display">{p.name}</h3>
              </div>
              <div className="text-xs text-[#9AAA9E] mb-1 ml-5">{p.club} · {p.league} · Age {p.age ?? "—"}</div>
              <div className="text-2xl font-bold ml-5" style={{ color: potentialColor(p.potential) }}>
                {p.potential ?? "—"}
              </div>
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570] ml-5">
                {p.potential == null ? "Unscored" : "Potential Index"}
              </div>
            </div>
          ))}
        </div>

        <div className="h-80 mt-4">
          <OverlayRadarChart series={[
            { label: a.name, color: colorA, metrics: aMetrics },
            { label: b.name, color: colorB, metrics: bMetrics },
          ]} />
        </div>

        <div className="mt-4 space-y-1.5">
          {allMetrics.map(m => (
            <div key={m} className="flex items-center justify-between text-sm border-b border-[#2C4A3B] py-1.5">
              <span className="font-plexmono w-16 text-left" style={{ color: colorA }}>{metricLabel(aMetrics[m] ?? 0)}</span>
              <span className="text-[#9AAA9E] text-xs uppercase tracking-wide text-center flex-1">{m}</span>
              <span className="font-plexmono w-16 text-right" style={{ color: colorB }}>{metricLabel(bMetrics[m] ?? 0)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ExploreView({ onSelectPlayer }) {
  const [boards, setBoards] = useState({});

  useEffect(() => {
    if (!API_BASE_URL) return;
    // Count-based stats only — ratio stats (pass accuracy %, duel win %)
    // are excluded here since a small sample can misleadingly rank #1
    // (e.g. 1/1 passes = "100%"), unlike raw counts which naturally
    // reward sustained real contribution.
    const specs = [
      { key: "scorers", title: "🥅 Top Scorers", sort: "goals", statField: "goals" },
      { key: "assists", title: "🎯 Most Assists", sort: "assists", statField: "assists" },
      { key: "keepers", title: "🧤 Most Saves", sort: "saves", position: "Goalkeeper", statField: "saves" },
      { key: "tacklers", title: "🛡 Most Tackles", sort: "tackles", statField: "tackles" },
      { key: "young", title: "🔮 Best U21 Prospects", sort: "potential", maxAge: 21, statField: "potential_index" },
    ];
    specs.forEach(spec => {
      const params = new URLSearchParams({ sort: spec.sort, limit: "8" });
      if (spec.position) params.set("position", spec.position);
      if (spec.maxAge) params.set("max_age", String(spec.maxAge));
      fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
        .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
        .then(rows => setBoards(prev => ({ ...prev, [spec.key]: { ...spec, rows } })))
        .catch(() => setBoards(prev => ({ ...prev, [spec.key]: { ...spec, rows: [] } })));
    });
  }, []);

  const order = ["scorers", "assists", "keepers", "tacklers", "young"];

  return (
    <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
      {order.map(key => {
        const board = boards[key];
        return (
          <div key={key}>
            <div className="text-sm uppercase tracking-wide text-[#E3A857] font-plexmono mb-3">
              {board ? board.title : "Loading…"}
            </div>
            {!board && <div className="text-xs text-[#6B8570]">Fetching leaderboard…</div>}
            {board?.rows.length === 0 && <div className="text-xs text-[#6B8570]">No data yet.</div>}
            <div>
              {board?.rows.map((row, i) => (
                <button key={row.id} onClick={() => onSelectPlayer(row)}
                  className="w-full flex items-center justify-between text-sm py-2 px-2 -mx-2 hover:bg-[#152922] text-left border-b border-[#1C2E26]">
                  <span className="flex items-center gap-2 text-[#EDEDE3] truncate">
                    <span className="text-[#6B8570] w-5 shrink-0">{i + 1}.</span>
                    <Avatar name={row.full_name} photoUrl={row.photo_url} size={26} />
                    <span className="truncate">{row.full_name}</span>
                    <span className="text-[#6B8570] text-xs shrink-0">· {row.club}</span>
                  </span>
                  <span className="font-plexmono text-[#E3A857] shrink-0 pl-2">
                    {board.statField === "potential_index"
                      ? Math.round(row.potential_index ?? 0)
                      : (row[board.statField] ?? 0)}
                  </span>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function ScoutDashboard() {
  const [league, setLeague] = useState(() => new URLSearchParams(window.location.search).get("league") || "All leagues");
  const [club, setClub] = useState(() => new URLSearchParams(window.location.search).get("club") || "All clubs");
  const [position, setPosition] = useState(() => new URLSearchParams(window.location.search).get("position") || "All positions");
  const [query, setQuery] = useState("");
  const [searchResults, setSearchResults] = useState(null); // null = not actively searching

  // Real server-side search across the WHOLE database, not just whatever's
  // currently loaded — otherwise anyone outside the top-200 default view
  // (or the current league/club filter) is invisible to search.
  useEffect(() => {
    if (!API_BASE_URL || query.trim().length < 2) {
      setSearchResults(null);
      return;
    }
    const timer = setTimeout(() => {
      const params = new URLSearchParams({ search: query.trim(), limit: "50" });
      fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
        .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
        .then(rows => setSearchResults(rows))
        .catch(() => setSearchResults([]));
    }, 300); // debounce — avoid firing on every keystroke
    return () => clearTimeout(timer);
  }, [query]);
  const [sortDesc, setSortDesc] = useState(true);
  const [sortBy, setSortBy] = useState("potential");
  const [hideUnscored, setHideUnscored] = useState(false);
  const [hideNoMinutes, setHideNoMinutes] = useState(true);
  const [shortlistOnly, setShortlistOnly] = useState(false);
  const [view, setView] = useState("cards");
  const [scatterX, setScatterX] = useState("Goals/90");
  const [scatterY, setScatterY] = useState("Key Passes/90");
  const [selected, setSelected] = useState(null);
  const [clubProfileOpen, setClubProfileOpen] = useState(false);
  const [transfersOpen, setTransfersOpen] = useState(false);
  const [deepLinkPlayerId, setDeepLinkPlayerId] = useState(() => new URLSearchParams(window.location.search).get("player"));
  const [livePlayers, setLivePlayers] = useState(null);
  const [connectionStatus, setConnectionStatus] = useState(API_BASE_URL ? "connecting" : "offline");
  const [compareList, setCompareList] = useState([]);
  const [comparing, setComparing] = useState(false);
  const [linkCopied, setLinkCopied] = useState(false);

  // Keep the URL in sync with the current filters — makes any specific view
  // (e.g. "Nottingham Forest players") bookmarkable and shareable via link.
  // replaceState (not pushState) so filter clicks don't spam browser history.
  useEffect(() => {
    const params = new URLSearchParams();
    if (league !== "All leagues") params.set("league", league);
    if (club !== "All clubs") params.set("club", club);
    if (position !== "All positions") params.set("position", position);
    const newUrl = params.toString() ? `${window.location.pathname}?${params.toString()}` : window.location.pathname;
    window.history.replaceState(null, "", newUrl);
  }, [league, club, position]);

  // Esc closes whichever modal is currently open.
  useEffect(() => {
    const onKeyDown = (e) => {
      if (e.key !== "Escape") return;
      setSelected(null);
      setComparing(false);
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, []);
  const [allLeagueOptions, setAllLeagueOptions] = useState([]);
  const [dataStatus, setDataStatus] = useState(null);

  // Fixed set of positions the API actually uses — cheaper than a dedicated
  // endpoint, and this genuinely doesn't change often.
  const POSITION_OPTIONS = ["Attacker", "Midfielder", "Defender", "Goalkeeper"];

  // Fetch the full list of leagues ONCE, independent of whatever players are
  // currently filtered — otherwise the league dropdown would only ever show
  // whichever league you're already viewing.
  useEffect(() => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/leagues`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => setAllLeagueOptions(rows.map(r => r.league_display).sort()))
      .catch(() => {});
  }, []);

  // When did the nightly pipeline last actually finish? No API key needed —
  // /status is a lightweight, unauthenticated endpoint.
  useEffect(() => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/status`)
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => setDataStatus(data))
      .catch(() => {});
  }, []);

  const [movers, setMovers] = useState(null); // null = not computed yet / no prior visit
  const [favoriteClubs, setFavoriteClubs] = useState([]);
  const FAVORITES_KEY = "scoutindex_favorite_clubs_v1";

  // Load favorites once on mount.
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
      if (Array.isArray(saved)) setFavoriteClubs(saved);
    } catch (e) { /* corrupted or unavailable storage — start empty */ }
  }, []);

  const isFavorited = (clubName, leagueName) =>
    favoriteClubs.some(f => f.club === clubName && f.league === leagueName);

  const toggleFavoriteClub = (clubName, leagueName) => {
    setFavoriteClubs(prev => {
      const next = isFavorited(clubName, leagueName)
        ? prev.filter(f => !(f.club === clubName && f.league === leagueName))
        : [...prev, { club: clubName, league: leagueName }];
      try { localStorage.setItem(FAVORITES_KEY, JSON.stringify(next)); } catch (e) { /* skip if storage unavailable */ }
      return next;
    });
  };
  const [moversDismissed, setMoversDismissed] = useState(false);

  const SNAPSHOT_KEY = "scoutindex_snapshot_v1";

  function computeMovers(currentPlayers) {
    let prevSnapshot;
    try {
      prevSnapshot = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || "null");
    } catch (e) {
      prevSnapshot = null;
    }

    const currentSnapshot = {};
    currentPlayers.forEach(p => {
      if (p.potential != null) currentSnapshot[p.id] = { potential: p.potential, name: p.name, club: p.club, league: p.league };
    });

    let result = null;
    if (prevSnapshot) {
      const risers = [];
      const newEntries = [];
      Object.entries(currentSnapshot).forEach(([id, cur]) => {
        const prev = prevSnapshot[id];
        if (!prev) {
          newEntries.push({ id, ...cur });
        } else if (cur.potential - prev.potential >= 2) {
          risers.push({ id, ...cur, delta: cur.potential - prev.potential, from: prev.potential });
        }
      });
      risers.sort((a, b) => b.delta - a.delta);
      newEntries.sort((a, b) => b.potential - a.potential);
      if (risers.length > 0 || newEntries.length > 0) {
        result = { risers: risers.slice(0, 5), newEntries: newEntries.slice(0, 5) };
      }
    }

    try {
      localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(currentSnapshot));
    } catch (e) { /* storage full or unavailable — silently skip persisting */ }

    return result;
  }

  const toggleCompare = (p) => {
    setCompareList(list => {
      if (list.find(x => x.id === p.id)) return list.filter(x => x.id !== p.id);
      if (list.length >= 2) return list;
      return [...list, p];
    });
  };

  const toggleShortlist = async (p) => {
    if (!API_BASE_URL || !String(p.id).startsWith("live-")) return; // seed/demo players aren't real DB rows
    const realId = String(p.id).replace("live-", "");
    const newLevel = p.watchLevel === "shortlist" ? null : "shortlist";
    try {
      const res = await fetch(`${API_BASE_URL}/players/${realId}/watch`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(API_KEY ? { "X-API-Key": API_KEY } : {}),
        },
        body: JSON.stringify({ watch_level: newLevel, author: "dashboard" }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setLivePlayers(prev => prev ? prev.map(pl => pl.id === p.id ? { ...pl, watchLevel: newLevel } : pl) : prev);
      setSelected(sel => sel && sel.id === p.id ? { ...sel, watchLevel: newLevel } : sel);
    } catch (e) {
      console.error("Failed to update shortlist status:", e);
    }
  };

  useEffect(() => {
    if (!API_BASE_URL) return;
    let cancelled = false;
    setConnectionStatus("connecting");

    const params = new URLSearchParams();
    const filtersActive = league !== "All leagues" || position !== "All positions";
    // No filters at all = a curated "top prospects" landing view, capped at
    // 200. Any filter active = a much higher cap, since a single league or
    // position can genuinely have 500-1500+ real players.
    params.set("limit", filtersActive ? "3000" : "200");
    if (league !== "All leagues") params.set("league", league);
    if (position !== "All positions") params.set("position", position);

    fetch(`${API_BASE_URL}/players?${params.toString()}`, {
      headers: API_KEY ? { "X-API-Key": API_KEY } : {}
    })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        if (cancelled) return;
        const built = buildPercentilePlayers(rows);
        setLivePlayers(built);
        setConnectionStatus("live");
        // Only compute "since last visit" movers off the default, unfiltered
        // top-prospects view — filtered views would give a misleading,
        // scope-dependent comparison.
        if (!filtersActive) setMovers(computeMovers(built));
      })
      .catch(() => { if (!cancelled) setConnectionStatus("offline"); });
    return () => { cancelled = true; };
  }, [league, position]);

  const dataSource = livePlayers && connectionStatus === "live" ? livePlayers : PLAYERS;

  // Deep-link support: once live data is loaded, find and open the player
  // named in ?player=ID (the URL also restores league/club via the lazy
  // useState initializers above, so this works even outside the top-200).
  useEffect(() => {
    if (!deepLinkPlayerId || connectionStatus !== "live") return;
    const match = dataSource.find(p => p.id === `live-${deepLinkPlayerId}`);
    if (match) {
      setSelected(match);
      setDeepLinkPlayerId(null); // only auto-open once
    }
  }, [dataSource, connectionStatus, deepLinkPlayerId]);

  // While the real league list is still loading (API_BASE_URL set but
  // allLeagueOptions hasn't arrived yet), show just "All leagues" rather
  // than a misleading partial list derived from the 5 seed/demo players.
  const availableLeagues = allLeagueOptions.length > 0
    ? ["All leagues", ...allLeagueOptions]
    : API_BASE_URL
      ? ["All leagues"]
      : ["All leagues", ...Array.from(new Set(dataSource.map(p => p.league)))];
  const availablePositions = connectionStatus === "live"
    ? ["All positions", ...POSITION_OPTIONS]
    : ["All positions", ...Array.from(new Set(dataSource.map(p => p.position)))];
  // Only meaningful once a specific league is picked — dataSource is
  // comprehensive for that league at that point (up to 3000 players),
  // so this list is genuinely complete, not a sample.
  const availableClubs = league !== "All leagues"
    ? ["All clubs", ...Array.from(new Set(dataSource.map(p => p.club))).sort()]
    : ["All clubs"];

  const filtered = useMemo(() => {
    let list = dataSource.filter(p => {
      if (league !== "All leagues" && p.league !== league) return false;
      if (club !== "All clubs" && p.club !== club) return false;
      if (position !== "All positions" && p.position !== position) return false;
      if (hideUnscored && p.potential == null) return false;
      if (hideNoMinutes && (p.minutesPlayed == null || p.minutesPlayed === 0)) return false;
      if (shortlistOnly && p.watchLevel !== "shortlist") return false;
      return true;
    });

    const getSortValue = (p) => {
      if (sortBy === "potential") return p.potential;
      if (sortBy === "age") return p.age;
      if (sortBy === "name") return p.name.toLowerCase();
      return metricRaw(p.metrics[sortBy] ?? null);
    };

    list.sort((a, b) => {
      const av = getSortValue(a), bv = getSortValue(b);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "string") return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      return sortDesc ? bv - av : av - bv;
    });
    return list;
  }, [dataSource, league, club, position, sortDesc, sortBy, hideUnscored, hideNoMinutes, shortlistOnly]);

  const sortOptions = [
    { value: "potential", label: "Potential" },
    { value: "name", label: "Name" },
    { value: "age", label: "Age" },
    ...(connectionStatus === "live" ? [
      { value: "Goals/90", label: "Goals/90" },
      { value: "Key Passes/90", label: "Key Passes/90" },
      { value: "Tackles/90", label: "Tackles/90" },
      { value: "Interceptions/90", label: "Interceptions/90" },
      { value: "Shots on Target/90", label: "Shots on Target/90" },
    ] : []),
  ];

  const topProspectIds = useMemo(() => {
    if (connectionStatus !== "live") return new Set();
    const scored = dataSource.filter(p => p.potential != null);
    scored.sort((a, b) => b.potential - a.potential);
    return new Set(scored.slice(0, 3).map(p => p.id));
  }, [dataSource, connectionStatus]);

  const axisOptions = useMemo(() => {
    const keys = new Set();
    dataSource.forEach(p => Object.keys(p.metrics).forEach(k => keys.add(k)));
    return ["Potential", "Age", ...Array.from(keys)];
  }, [dataSource]);

  return (
    <div className="min-h-screen bg-[#0E1A15] text-[#EDEDE3]">
      <div className="border-b border-[#2C4A3B] px-6 py-10 md:px-10">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[11px] tracking-[0.25em] uppercase text-[#E3A857] font-plexmono">Cross-League Scouting Index</div>
          <div className="flex items-center gap-3 text-[11px] uppercase tracking-wide text-[#6B8570]">
            {connectionStatus === "live" && (
              <button onClick={() => setTransfersOpen(true)} className="hover:text-[#E3A857]">🔄 Transfers</button>
            )}
            {connectionStatus === "live" && dataStatus?.last_updated && (
              <span className="text-[#9AAA9E]" title={new Date(dataStatus.last_updated).toLocaleString()}>
                🔄 Updated {relativeTime(dataStatus.last_updated)} · {dataStatus.scored_players} players scored
              </span>
            )}
            {connectionStatus === "live" && <>📡 Live API</>}
            {connectionStatus === "connecting" && <>⏳ Connecting...</>}
            {connectionStatus === "offline" && <>⚠ Seed data</>}
          </div>
        </div>
        <h1 className="text-3xl md:text-5xl leading-[1.05] max-w-3xl font-display">
          Find the player before the big five leagues do.
        </h1>
        <p className="text-[#9AAA9E] mt-4 max-w-2xl text-sm md:text-base">
          A scouting index spanning leagues most databases ignore. Filter, sort, and open any
          dossier for the full statistical + qualitative profile.
        </p>
      </div>

      {movers && !moversDismissed && league === "All leagues" && position === "All positions" && (
        <div className="px-6 md:px-10 py-5 border-b border-[#2C4A3B] bg-[#152922]">
          <div className="flex items-center justify-between mb-3">
            <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">
              📈 Since Your Last Visit
            </div>
            <button onClick={() => setMoversDismissed(true)}
              className="text-[#6B8570] hover:text-[#EDEDE3] text-lg leading-none">×</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {movers.risers.length > 0 && (
              <div>
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Biggest Risers</div>
                <div className="space-y-1.5">
                  {movers.risers.map(r => (
                    <div key={r.id} className="flex items-center justify-between text-sm">
                      <span className="text-[#EDEDE3]">{r.name} <span className="text-[#6B8570] text-xs">· {r.club}</span></span>
                      <span className="font-plexmono text-[#7FD99A]">
                        {r.from} → {r.potential} (+{r.delta})
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {movers.newEntries.length > 0 && (
              <div>
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">New to Top Prospects</div>
                <div className="space-y-1.5">
                  {movers.newEntries.map(n => (
                    <div key={n.id} className="flex items-center justify-between text-sm">
                      <span className="text-[#EDEDE3]">{n.name} <span className="text-[#6B8570] text-xs">· {n.club}</span></span>
                      <span className="font-plexmono text-[#E3A857]">{n.potential}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      <div className="sticky top-0 z-30 bg-[#0E1A15] px-6 md:px-10 py-5 flex flex-col md:flex-row gap-3 md:items-center border-b border-[#2C4A3B] flex-wrap">
        <div className="flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 flex-1 min-w-[180px]">
          🔍
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search player or club..."
            className="bg-transparent outline-none text-sm w-full placeholder:text-[#6B8570]" />
        </div>
        <select value={league} onChange={e => { setLeague(e.target.value); setClub("All clubs"); }}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none w-full md:w-auto">
          {availableLeagues.map(l => <option key={l}>{l}</option>)}
        </select>
        {league !== "All leagues" && (
          <select value={club} onChange={e => setClub(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none w-full md:w-auto">
            {availableClubs.map(c => <option key={c}>{c}</option>)}
          </select>
        )}
        {league !== "All leagues" && club !== "All clubs" && (
          <button onClick={() => toggleFavoriteClub(club, league)}
            title={isFavorited(club, league) ? "Remove from favorite clubs" : "Add to favorite clubs"}
            className={`px-3 py-2 border text-lg leading-none ${isFavorited(club, league) ? "border-[#E3A857] text-[#E3A857]" : "border-[#2C4A3B] text-[#4A5C52] hover:text-[#9AAA9E]"}`}>
            {isFavorited(club, league) ? "★" : "☆"}
          </button>
        )}
        {league !== "All leagues" && club !== "All clubs" && (
          <button onClick={() => setClubProfileOpen(true)}
            className="px-3 py-2 border border-[#2C4A3B] text-[#9AAA9E] hover:border-[#E3A857] hover:text-[#E3A857] text-xs uppercase tracking-wide">
            🏟 View Squad
          </button>
        )}
        <select value={position} onChange={e => setPosition(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none w-full md:w-auto">
          {availablePositions.map(p => <option key={p}>{p}</option>)}
        </select>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none w-full md:w-auto">
          {sortOptions.map(o => <option key={o.value} value={o.value}>Sort: {o.label}</option>)}
        </select>
        <button onClick={() => setSortDesc(s => !s)}
          className="flex items-center justify-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm hover:border-[#E3A857] w-full md:w-auto">
          {sortDesc ? "↓" : "↑"}
        </button>
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1">
            <input type="checkbox" checked={hideUnscored} onChange={e => setHideUnscored(e.target.checked)}
              className="accent-[#E3A857]" />
            Hide unscored
          </label>
        )}
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1" title="Hides players with 0 minutes across the whole ingested season — usually means they've left, retired, or a roster listing hasn't caught up">
            <input type="checkbox" checked={hideNoMinutes} onChange={e => setHideNoMinutes(e.target.checked)}
              className="accent-[#E3A857]" />
            Hide 0-minute players
          </label>
        )}
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1">
            <input type="checkbox" checked={shortlistOnly} onChange={e => setShortlistOnly(e.target.checked)}
              className="accent-[#E3A857]" />
            ★ Shortlist only
          </label>
        )}
        {(league !== "All leagues" || club !== "All clubs" || position !== "All positions" || query || hideUnscored || !hideNoMinutes || shortlistOnly) && (
          <button onClick={() => { setLeague("All leagues"); setClub("All clubs"); setPosition("All positions"); setQuery(""); setHideUnscored(false); setHideNoMinutes(true); setShortlistOnly(false); }}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2">
            Reset
          </button>
        )}
        {(league !== "All leagues" || club !== "All clubs" || position !== "All positions") && (
          <button onClick={() => {
              navigator.clipboard?.writeText(window.location.href);
              setLinkCopied(true);
              setTimeout(() => setLinkCopied(false), 1500);
            }}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2 flex items-center gap-1">
            🔗 {linkCopied ? "Copied!" : "Copy Link"}
          </button>
        )}
        <div className="flex border border-[#2C4A3B] w-full md:w-auto md:ml-auto">
          <button onClick={() => setView("cards")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "cards" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Cards
          </button>
          <button onClick={() => setView("rankings")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "rankings" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Rankings
          </button>
          <button onClick={() => setView("scatter")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "scatter" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Scatter
          </button>
          <button onClick={() => setView("explore")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "explore" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Explore
          </button>
        </div>
      </div>

      {favoriteClubs.length > 0 && (
        <div className="px-6 md:px-10 py-3 flex flex-wrap gap-2 items-center border-b border-[#2C4A3B] bg-[#152922]">
          <span className="text-[10px] uppercase tracking-wide text-[#6B8570] mr-1">★ Favorites:</span>
          {favoriteClubs.map(f => (
            <button key={`${f.league}-${f.club}`}
              onClick={() => { setLeague(f.league); setClub(f.club); }}
              className={`text-xs px-3 py-1.5 border ${league === f.league && club === f.club ? "border-[#E3A857] text-[#E3A857] bg-[#0E1A15]" : "border-[#2C4A3B] text-[#9AAA9E] hover:border-[#6B8570]"}`}>
              {f.club}
            </button>
          ))}
        </div>
      )}

      {searchResults === null && view === "scatter" && (
        <div className="px-6 md:px-10 py-4 flex flex-wrap gap-3 items-center border-b border-[#2C4A3B]">
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">X axis</span>
          <select value={scatterX} onChange={e => setScatterX(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">Y axis</span>
          <select value={scatterY} onChange={e => setScatterY(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs text-[#6B8570] ml-auto">Click a point to open its dossier</span>
        </div>
      )}

      {searchResults === null && view === "explore" && connectionStatus === "live" && (
        <ExploreView onSelectPlayer={(row) => {
          // Reuse the tested deep-link mechanism — set matching filters so
          // this player is guaranteed to be in the fetched dataset, then
          // let the existing effect find and open their full dossier.
          if (row.league_display) setLeague(row.league_display);
          if (row.club) setClub(row.club);
          setDeepLinkPlayerId(String(row.id));
        }} />
      )}
      {searchResults === null && view === "explore" && connectionStatus !== "live" && (
        <div className="px-6 md:px-10 py-8 text-sm text-[#6B8570]">
          Explore needs a live connection to the API — currently showing seed data.
        </div>
      )}

      {searchResults !== null && (
        <div className="px-6 md:px-10 py-6">
          <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">
            {searchResults.length} result{searchResults.length !== 1 ? "s" : ""} for "{query}" — searched across all leagues
          </div>
          {searchResults.length === 0 && <div className="text-sm text-[#6B8570]">No players found.</div>}
          <div className="space-y-1">
            {searchResults.map(row => (
              <button key={row.id} onClick={() => {
                  if (row.league_display) setLeague(row.league_display);
                  if (row.club) setClub(row.club);
                  setDeepLinkPlayerId(String(row.id));
                  setQuery("");
                }}
                className="w-full flex items-center justify-between text-sm py-2.5 px-2 -mx-2 hover:bg-[#152922] text-left border-b border-[#1C2E26]">
                <span className="flex items-center gap-2 text-[#EDEDE3]">
                  <Avatar name={row.full_name} photoUrl={row.photo_url} size={28} />
                  {row.full_name} <span className="text-[#6B8570] text-xs">· {row.club} · {row.league_display}</span>
                </span>
                <span className="font-plexmono" style={{ color: potentialColor(row.potential_index != null ? Math.round(row.potential_index) : null) }}>
                  {row.potential_index != null ? Math.round(row.potential_index) : "—"}
                </span>
              </button>
            ))}
          </div>
        </div>
      )}

      {searchResults === null && view === "cards" && (
        <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-24">
          {connectionStatus === "connecting" && (
            [...Array(6)].map((_, i) => (
              <div key={i} className="bg-[#152922] border border-[#2C4A3B] p-5 h-64 animate-pulse" />
            ))
          )}
          {connectionStatus !== "connecting" && filtered.map(p => (
            <PlayerCard key={p.id} p={p} onOpen={setSelected}
              onToggleCompare={toggleCompare}
              isComparing={!!compareList.find(x => x.id === p.id)}
              compareDisabled={compareList.length >= 2}
              isTopProspect={topProspectIds.has(p.id)}
              sortBy={sortBy}
              onToggleShortlist={connectionStatus === "live" ? toggleShortlist : null} />
          ))}
          {connectionStatus !== "connecting" && filtered.length === 0 && (
            <div className="text-[#6B8570] text-sm">No players match those filters.</div>
          )}
        </div>
      )}

      {searchResults === null && view === "rankings" && connectionStatus !== "connecting" && (
        <RankingsTable players={filtered} sortBy={sortBy} onSelect={setSelected}
          onToggleCompare={toggleCompare}
          compareIds={new Set(compareList.map(x => x.id))}
          compareDisabled={compareList.length >= 2}
          topProspectIds={topProspectIds} />
      )}

      {searchResults === null && view === "scatter" && connectionStatus !== "connecting" && (
        <div className="px-6 md:px-10 py-8 pb-24">
          <ScatterPlot players={filtered} xKey={scatterX} yKey={scatterY} onSelect={setSelected}
            topProspectIds={topProspectIds}
            compareIds={new Set(compareList.map(x => x.id))} />
        </div>
      )}

      <div className="px-6 md:px-10 py-6 border-t border-[#2C4A3B] text-xs text-[#6B8570]">
        ℹ When "Live API" shows above, you're looking at real ingested data. Radar/octagon charts
        show each stat as a percentile rank against real peers (same position where enough data
        exists, otherwise the whole ingested pool) — not a fixed scale. The axes shown adapt to
        position (attackers see goals/take-ons, defenders see tackles/interceptions, etc).
        Click the ★ on any live player to add them to your shortlist — it's saved to the database,
        not just this browser. "Unscored" players need more ingested match minutes before a
        potential score can be computed. A dossier's "Discipline" section (cards/fouls/offsides)
        only appears once real data exists — added recently, populates on the next data refresh.
      </div>

      {selected && <PlayerDossier key={selected.id} p={selected} onClose={() => setSelected(null)}
        onToggleShortlist={connectionStatus === "live" ? toggleShortlist : null}
        onNavigateToPlayer={(sp) => setSelected(sp)} />}
      {clubProfileOpen && league !== "All leagues" && club !== "All clubs" && (
        <ClubProfile
          players={dataSource.filter(p => p.club === club && p.league === league)}
          clubName={club}
          leagueName={league}
          onClose={() => setClubProfileOpen(false)}
          onSelectPlayer={(p) => { setClubProfileOpen(false); setSelected(p); }}
        />
      )}
      {transfersOpen && (
        <TransfersModal
          onClose={() => setTransfersOpen(false)}
          onSelectPlayer={(row) => {
            setTransfersOpen(false);
            // Reuse the deep-link mechanism (tested, correct) rather than
            // constructing an incomplete player object from the transfer row.
            // Also set league/club so the fetch scope actually includes this
            // player — otherwise the default top-200 view might not have them.
            if (row.league) setLeague(row.league);
            if (row.new_club) setClub(row.new_club);
            setDeepLinkPlayerId(String(row.player_id));
          }}
        />
      )}
      <CompareBar selected={compareList} onClear={() => setCompareList([])} onCompare={() => setComparing(true)} />
      {comparing && compareList.length === 2 && (
        <ComparePanel players={compareList} onClose={() => setComparing(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ScoutDashboard />);
</script>
</body>
</html>
