function RecruitmentBoardModal({ onClose, onSelectPlayer }) {
  const [rows, setRows] = useState(null);
  const [sortCol, setSortCol] = useState("potential_index");
  const [sortDir, setSortDir] = useState("desc");
  const [showAll, setShowAll] = useState(false); // false = shortlist only (the real "board"), true = broader view
  const [exporting, setExporting] = useState(false);

  useEffect(() => {
    if (!API_BASE_URL) return;
    setRows(null);
    const params = new URLSearchParams({ sort: "potential", limit: "200" });
    if (!showAll) params.set("shortlist_only", "true");
    fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(data => setRows(data))
      .catch(() => setRows([]));
  }, [showAll]);

  const exportCsv = () => {
    if (!API_BASE_URL) return;
    setExporting(true);
    const params = new URLSearchParams({ sort: "potential", limit: "200", format: "csv" });
    if (!showAll) params.set("shortlist_only", "true");
    fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.blob() : null)
      .then(blob => {
        if (!blob) return;
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = "recruitment_board.csv";
        link.click();
        URL.revokeObjectURL(url);
      })
      .catch(() => alert("Export failed — please try again."))
      .finally(() => setExporting(false));
  };

  const columns = [
    { key: "full_name", label: "Player" },
    { key: "club", label: "Club" },
    { key: "primary_position", label: "Pos" },
    { key: "age", label: "Age" },
    { key: "potential_index", label: "Potential" },
    { key: "minutes_played", label: "Mins" },
    { key: "goals", label: "G" },
    { key: "assists", label: "A" },
    { key: "pass_accuracy_pct", label: "Pass%" },
  ];

  const computeAge = (dob) => dob ? Math.floor((Date.now() - new Date(dob)) / (365.25 * 24 * 3600 * 1000)) : null;

  const sorted = rows ? [...rows].map(r => ({ ...r, age: computeAge(r.date_of_birth) })).sort((a, b) => {
    const av = a[sortCol], bv = b[sortCol];
    if (av == null) return 1;
    if (bv == null) return -1;
    if (typeof av === "string") return sortDir === "asc" ? av.localeCompare(bv) : bv.localeCompare(av);
    return sortDir === "asc" ? av - bv : bv - av;
  }) : [];

  const toggleSort = (key) => {
    if (sortCol === key) setSortDir(d => d === "asc" ? "desc" : "asc");
    else { setSortCol(key); setSortDir("desc"); }
  };

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-5xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">📋 Recruitment Board</div>
          <div className="flex items-center gap-3">
            <label className="flex items-center gap-1.5 text-[10px] text-[#9AAA9E] uppercase tracking-wide">
              <input type="checkbox" checked={showAll} onChange={e => setShowAll(e.target.checked)} />
              Show all (not just shortlist)
            </label>
            <button onClick={exportCsv} disabled={exporting} className="text-[10px] uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] disabled:opacity-50">
              {exporting ? "Exporting…" : "📤 Export CSV"}
            </button>
            <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
          </div>
        </div>

        {rows === null && <div className="text-sm text-[#6B8570]">Loading…</div>}
        {rows?.length === 0 && <div className="text-sm text-[#6B8570] text-center py-4">Nothing shortlisted yet — check "Show all" or shortlist some players first.</div>}

        {rows?.length > 0 && (
          <div className="overflow-x-auto">
            <table className="w-full text-xs">
              <thead>
                <tr className="text-[#6B8570] uppercase tracking-wide border-b border-[#2C4A3B]">
                  {columns.map(c => (
                    <th key={c.key} onClick={() => toggleSort(c.key)} className="text-left py-2 px-2 cursor-pointer hover:text-[#E3A857] whitespace-nowrap">
                      {c.label} {sortCol === c.key && (sortDir === "asc" ? "↑" : "↓")}
                    </th>
                  ))}
                </tr>
              </thead>
              <tbody>
                {sorted.map(r => (
                  <tr key={r.id} onClick={() => onSelectPlayer(r)} className="border-b border-[#1C2E26] text-[#EDEDE3] hover:bg-[#152922] cursor-pointer">
                    <td className="py-2 px-2 whitespace-nowrap">{r.full_name}</td>
                    <td className="py-2 px-2 text-[#9AAA9E] whitespace-nowrap">{r.club}</td>
                    <td className="py-2 px-2">{r.primary_position}</td>
                    <td className="py-2 px-2 font-plexmono">{r.age ?? "—"}</td>
                    <td className="py-2 px-2 font-plexmono text-[#E3A857]">{r.potential_index ? Math.round(r.potential_index) : "—"}</td>
                    <td className="py-2 px-2 font-plexmono">{r.minutes_played ?? "—"}</td>
                    <td className="py-2 px-2 font-plexmono">{r.goals ?? 0}</td>
                    <td className="py-2 px-2 font-plexmono">{r.assists ?? 0}</td>
                    <td className="py-2 px-2 font-plexmono">{r.pass_accuracy_pct ?? "—"}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        )}
      </div>
    </div>
  );
}

function FixtureRow({ m }) {
  const [apiPrediction, setApiPrediction] = useState(null);
  const [loadingApi, setLoadingApi] = useState(false);

  const loadApiPrediction = () => {
    if (!API_BASE_URL) return;
    setLoadingApi(true);
    fetch(`${API_BASE_URL}/fixtures/${m.id}/api-prediction`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setApiPrediction(data))
      .catch(() => setApiPrediction({ prediction: null }))
      .finally(() => setLoadingApi(false));
  };

  // Defensive reads — API-Football's own response shape is theirs to
  // change, so this fails gracefully (shows nothing) rather than
  // crashing if a field isn't where expected.
  const percent = apiPrediction?.prediction?.predictions?.percent;

  return (
    <div className="py-3 border-b border-[#1C2E26]">
      <div className="flex justify-between text-sm text-[#EDEDE3] mb-1">
        <span>{m.home_club}</span>
        <span className="text-[#6B8570] text-xs">{new Date(m.match_date).toLocaleDateString()}</span>
        <span>{m.away_club}</span>
      </div>
      <div className="text-[9px] uppercase tracking-wide text-[#4A5C52] mb-1">Our estimate</div>
      <div className="flex h-2 w-full overflow-hidden">
        <div style={{ width: `${m.home_win_pct}%`, background: "#E3A857" }} />
        <div style={{ width: `${m.draw_pct}%`, background: "#6B8570" }} />
        <div style={{ width: `${m.away_win_pct}%`, background: "#7FA8D9" }} />
      </div>
      <div className="flex justify-between text-[10px] text-[#6B8570] mt-1 font-plexmono mb-2">
        <span>{m.home_win_pct}%</span>
        <span>{m.draw_pct}% draw</span>
        <span>{m.away_win_pct}%</span>
      </div>

      {!apiPrediction && (
        <button onClick={loadApiPrediction} disabled={loadingApi} className="text-[10px] uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] disabled:opacity-50">
          {loadingApi ? "Loading…" : "Compare against API-Football's own prediction →"}
        </button>
      )}
      {apiPrediction && !percent && (
        <div className="text-[10px] text-[#4A5C52] italic">No API-Football prediction available for this fixture.</div>
      )}
      {percent && (
        <>
          <div className="text-[9px] uppercase tracking-wide text-[#4A5C52] mb-1">API-Football's own model</div>
          <div className="flex justify-between text-[10px] text-[#7FD99A] font-plexmono">
            <span>{percent.home}</span>
            <span>{percent.draw} draw</span>
            <span>{percent.away}</span>
          </div>
        </>
      )}
    </div>
  );
}

function LeagueReportModal({ allLeagueOptions, onClose }) {
  const [league, setLeague] = useState("");
  const [report, setReport] = useState(null);
  const [exporting, setExporting] = useState(false);
  const cardRef = useRef(null);

  useEffect(() => {
    if (!API_BASE_URL || !league) { setReport(null); return; }
    setReport(null);
    const params = new URLSearchParams({ league });
    fetch(`${API_BASE_URL}/leagues/full-report?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setReport(data))
      .catch(() => setReport(null));
  }, [league]);

  const downloadImage = () => {
    if (!cardRef.current || typeof html2canvas === "undefined") {
      alert("Image export isn't available right now — check your connection and try again.");
      return;
    }
    setExporting(true);
    html2canvas(cardRef.current, { backgroundColor: "#0E1A15", scale: 2 })
      .then(canvas => {
        const link = document.createElement("a");
        link.download = `${league.replace(/\s+/g, "_")}_full_report.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      })
      .catch(() => alert("Image export failed — please try again."))
      .finally(() => setExporting(false));
  };

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">📄 Full League Report</div>
          <div className="flex items-center gap-3">
            {report && (
              <button onClick={downloadImage} disabled={exporting} className="text-[10px] uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] disabled:opacity-50">
                {exporting ? "Exporting…" : "📸 Export Image"}
              </button>
            )}
            <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
          </div>
        </div>

        <select value={league} onChange={e => setLeague(e.target.value)}
          className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] mb-4">
          <option value="">Select a league...</option>
          {allLeagueOptions.map(l => <option key={l} value={l}>{l}</option>)}
        </select>

        {league && report === null && <div className="text-sm text-[#6B8570]">Loading…</div>}
        {report && (
          <>
            <div style={{ position: "fixed", top: 0, left: -99999 }}>
              <LeagueReportCard league={league} report={report} forwardedRef={cardRef} />
            </div>
            <div className="text-sm text-[#EDEDE3]">
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Standings (Top 10)</div>
              {report.standings.map((s, i) => (
                <div key={s.club} className="flex justify-between py-1 border-b border-[#1C2E26]">
                  <span>{i + 1}. {s.club}</span>
                  <span className="font-plexmono text-[#E3A857]">{s.points} pts</span>
                </div>
              ))}
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mt-4 mb-2">Top Scorers</div>
              {report.top_scorers.map(s => (
                <div key={s.full_name} className="py-1">{s.full_name} <span className="text-[#E3A857]">({s.goals})</span></div>
              ))}
            </div>
          </>
        )}
      </div>
    </div>
  );
}

              <div className="mb-5">
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">🌟 New Debuts This Week</div>
                {digest.content.debuts_this_week.map((d, i) => (
                  <button key={i} onClick={() => onSelectPlayer(d)} className="w-full text-sm py-1.5 border-b border-[#1C2E26] hover:bg-[#152922] text-left">
                    <span className="text-[#EDEDE3]">{d.full_name} <span className="text-[#6B8570] text-xs">· {d.club}</span></span>
                  </button>
                ))}
              </div>
            )}

            {!digest.content.biggest_movers?.length && !digest.content.shortlist_highlights?.length && !digest.content.debuts_this_week?.length && (
              <div className="text-sm text-[#6B8570] text-center py-4">Nothing notable this week.</div>

        )}

    </div>
  );
}

function StandingsModal({ allLeagueOptions, onClose }) {
  const [league, setLeague] = useState("");

  const [formTable, setFormTable] = useState(null);
  const [exporting, setExporting] = useState(false);
  const cardRef = useRef(null);

  useEffect(() => {
    if (!API_BASE_URL || !league) { setTable(null); return; }
    setTable(null);
    const params = new URLSearchParams({ league });
    fetch(`${API_BASE_URL}/standings?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setTable(rows))
      .catch(() => setTable([]));
  }, [league]);

  useEffect(() => {
    if (!API_BASE_URL || !league || mode !== "form") { setFormTable(null); return; }
    setFormTable(null);
    const params = new URLSearchParams({ league, window: "5" });
    fetch(`${API_BASE_URL}/standings/form?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setFormTable(rows))
      .catch(() => setFormTable([]));

  const downloadImage = () => {
    if (!cardRef.current || typeof html2canvas === "undefined") {
      alert("Image export isn't available right now — check your connection and try again.");
      return;
    }
    setExporting(true);
    html2canvas(cardRef.current, { backgroundColor: "#0E1A15", scale: 2 })
      .then(canvas => {
        const link = document.createElement("a");
        link.download = `${league.replace(/\s+/g, "_")}_standings.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      })
      .catch(() => alert("Image export failed — please try again."))
      .finally(() => setExporting(false));

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>

        {league && (
          <div className="flex border border-[#2C4A3B] mb-4 w-fit">

              className={`px-4 py-1.5 text-xs uppercase tracking-wide ${mode === "season" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>

            <button onClick={() => setMode("form")}

        {/* Hidden, full-size, untransformed — the only thing html2canvas ever captures */}
        {mode === "season" && table?.length > 0 && (
          <div style={{ position: "fixed", top: 0, left: -99999 }}>
            <StandingsCard league={league} table={table} forwardedRef={cardRef} />
          </div>
        )}

        {mode === "form" && (
          <>
            {formTable === null && <div className="text-sm text-[#6B8570]">Loading…</div>}
            {formTable?.length === 0 && <div className="text-sm text-[#6B8570]">No recent matches to compute form from.</div>}
            {formTable?.map((r, i) => (
              <div key={r.club} className="flex items-center justify-between text-sm py-2 border-b border-[#1C2E26]">

                    <span key={j} className="w-5 h-5 flex items-center justify-center text-[10px] font-bold rounded-full"

                  <th className="text-center py-2 px-1">GF</th>
                  <th className="text-center py-2 px-1">GA</th>
                  <th className="text-center py-2 px-1">GD</th>

              </thead>
              <tbody>
                {table.map((row, i) => (
                  <tr key={row.club} className="border-b border-[#1C2E26] text-[#EDEDE3]">
                    <td className="py-1.5 pr-2 text-[#6B8570]">{i + 1}</td>

                    <td className="text-center px-1">{row.drawn}</td>
                    <td className="text-center px-1">{row.lost}</td>
                    <td className="text-center px-1">{row.gf}</td>
                    <td className="text-center px-1">{row.ga}</td>

                    <td className="text-center pl-1 font-plexmono font-bold text-[#E3A857]">{row.points}</td>

      </div>

  );

function FixturesModal({ allLeagueOptions, onClose }) {

    if (!API_BASE_URL || !league) { setFixturesList(null); return; }

    const params = new URLSearchParams({ league, upcoming: String(mode === "upcoming"), limit: "50" });

            <option value="">All clubs</option>

        {league && (
          <div className="flex border border-[#2C4A3B] mb-4 w-fit">

              Upcoming
            </button>
            <button onClick={() => setMode("results")}
              className={`px-4 py-1.5 text-xs uppercase tracking-wide ${mode === "results" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>

          </div>

        {!league && <div className="text-sm text-[#6B8570]">Select a league to see its fixtures.</div>}
        {league && fixturesList === null && <div className="text-sm text-[#6B8570]">Loading…</div>}
        {league && fixturesList?.length === 0 && (
          <div className="text-sm text-[#6B8570]">
            No {mode === "upcoming" ? "upcoming fixtures" : "recent results"} found{club ? ` for ${club}` : ""}.
          </div>
        )}
        {fixturesList?.map(f => (
          <div key={f.id}
            onClick={() => f.status === "finished" && setSelectedMatch(f)}

            <div className="text-[#6B8570] text-xs w-24 shrink-0">
              {formatDate(f.match_date)}<br />{formatTime(f.match_date)}
            </div>
            <div className="flex-1 text-center text-[#EDEDE3] truncate px-2">
              {f.home_club} <span className="text-[#6B8570]">vs</span> {f.away_club}
            </div>
            <div className="w-16 text-right shrink-0 font-plexmono">
              {f.status === "finished"

        <MatchDetailModal matchId={selectedMatch.id} homeClub={selectedMatch.home_club} awayClub={selectedMatch.away_club}

  );

function ClubCompareModal({ allLeagueOptions, onClose }) {
  const [league1, setLeague1] = useState("");
  const [club1, setClub1] = useState("");
  const [league2, setLeague2] = useState("");
  const [club2, setClub2] = useState("");
  const [clubs1, setClubs1] = useState([]);
  const [clubs2, setClubs2] = useState([]);
  const [squad1, setSquad1] = useState(null);
  const [squad2, setSquad2] = useState(null);

  const fetchClubsForLeague = (leagueName, setClubsFn) => {
    if (!API_BASE_URL || !leagueName) { setClubsFn([]); return; }
    const params = new URLSearchParams({ league: leagueName, limit: "3000" });
    fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setClubsFn(Array.from(new Set(rows.map(r => r.club).filter(Boolean))).sort()))
      .catch(() => setClubsFn([]));
  };

  useEffect(() => { fetchClubsForLeague(league1, setClubs1); setClub1(""); setSquad1(null); }, [league1]);
  useEffect(() => { fetchClubsForLeague(league2, setClubs2); setClub2(""); setSquad2(null); }, [league2]);

  const fetchSquad = (leagueName, clubName, setSquadFn) => {
    if (!API_BASE_URL || !leagueName || !clubName) return;
    const params = new URLSearchParams({ league: leagueName, limit: "3000" });
    fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setSquadFn(rows.filter(r => r.club === clubName)))
      .catch(() => setSquadFn([]));
  };

  useEffect(() => { if (club1) fetchSquad(league1, club1, setSquad1); }, [club1]);
  useEffect(() => { if (club2) fetchSquad(league2, club2, setSquad2); }, [club2]);

  const summarize = (squad) => {
    if (!squad) return null;
    const scored = squad.filter(p => p.potential_index != null);
    const avgPotential = scored.length ? Math.round(scored.reduce((s, p) => s + p.potential_index, 0) / scored.length) : null;
    const ages = squad.filter(p => p.date_of_birth).map(p => {
      const diff = Date.now() - new Date(p.date_of_birth).getTime();
      return Math.floor(diff / 3.15576e10);
    });
    const avgAge = ages.length ? (ages.reduce((s, a) => s + a, 0) / ages.length).toFixed(1) : null;
    const POSITION_ORDER = ["Goalkeeper", "Defender", "Midfielder", "Attacker"];
    const byPosition = Object.fromEntries(POSITION_ORDER.map(pos => [pos, squad.filter(p => p.primary_position === pos).length]));
    return { size: squad.length, avgPotential, avgAge, byPosition };
  };

  const s1 = summarize(squad1);
  const s2 = summarize(squad2);
  const POSITION_ORDER = ["Goalkeeper", "Defender", "Midfielder", "Attacker"];

  const [h2h, setH2h] = useState(null);
  const [form1, setForm1] = useState(null);
  const [form2, setForm2] = useState(null);

  useEffect(() => {
    if (!API_BASE_URL || !club1 || !club2) { setH2h(null); return; }
    const params = new URLSearchParams({ club1, club2, limit: "10" });
    fetch(`${API_BASE_URL}/h2h?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setH2h(rows))
      .catch(() => setH2h([]));
  }, [club1, club2]);

  useEffect(() => {
    if (!API_BASE_URL || !club1 || !league1) { setForm1(null); return; }
    const params = new URLSearchParams({ club: club1, league: league1 });
    fetch(`${API_BASE_URL}/clubs/form?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : { form: [] })
      .then(data => setForm1(data.form))
      .catch(() => setForm1([]));
  }, [club1, league1]);

  useEffect(() => {
    if (!API_BASE_URL || !club2 || !league2) { setForm2(null); return; }
    const params = new URLSearchParams({ club: club2, league: league2 });
    fetch(`${API_BASE_URL}/clubs/form?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : { form: [] })
      .then(data => setForm2(data.form))
      .catch(() => setForm2([]));
  }, [club2, league2]);

  const FormBadges = ({ form }) => (
    <div className="flex gap-1 justify-center">
      {(form || []).map((r, i) => (
        <span key={i} className="w-5 h-5 flex items-center justify-center text-[10px] font-bold rounded-full"
          style={{ background: r === "W" ? "#7FD99A" : r === "L" ? "#E36B57" : "#6B8570", color: "#0E1A15" }}>
          {r}
        </span>
      ))}
    </div>
  );

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-3xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">⚖ Compare Clubs</div>
          <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <select value={league1} onChange={e => setLeague1(e.target.value)}
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] mb-2">
              <option value="">Select league...</option>
              {allLeagueOptions.map(l => <option key={l} value={l}>{l}</option>)}
            </select>
            <select value={club1} onChange={e => setClub1(e.target.value)} disabled={!league1}
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] disabled:opacity-50">
              <option value="">Select club...</option>
              {clubs1.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
          <div>
            <select value={league2} onChange={e => setLeague2(e.target.value)}
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] mb-2">
              <option value="">Select league...</option>
              {allLeagueOptions.map(l => <option key={l} value={l}>{l}</option>)}
            </select>
            <select value={club2} onChange={e => setClub2(e.target.value)} disabled={!league2}
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] disabled:opacity-50">
              <option value="">Select club...</option>
              {clubs2.map(c => <option key={c} value={c}>{c}</option>)}
            </select>
          </div>
        </div>

        {s1 && s2 && (
          <div className="mt-6">
            <div className="grid grid-cols-2 gap-6 text-center mb-2">
              <div className="text-lg text-[#E3A857] font-display truncate">{club1}</div>
              <div className="text-lg text-[#7FB3D5] font-display truncate">{club2}</div>
            </div>
            <div className="grid grid-cols-2 gap-6 mb-4">
              <FormBadges form={form1} />
              <FormBadges form={form2} />
            </div>
            {[
              ["Squad Size", s1.size, s2.size],
              ["Avg Age", s1.avgAge ?? "—", s2.avgAge ?? "—"],
              ["Avg Potential", s1.avgPotential ?? "—", s2.avgPotential ?? "—"],
            ].map(([label, v1, v2]) => (
              <div key={label} className="grid grid-cols-2 gap-6 border-b border-[#2C4A3B] py-2.5 items-center">
                <div className="text-2xl font-plexmono text-[#E3A857] text-center">{v1}</div>
                <div className="text-2xl font-plexmono text-[#7FB3D5] text-center">{v2}</div>
                <div className="col-span-2 text-[10px] uppercase tracking-wide text-[#6B8570] text-center -mt-2">{label}</div>
              </div>
            ))}
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] text-center mt-5 mb-2">Squad Depth by Position</div>
            {POSITION_ORDER.map(pos => (
              <div key={pos} className="grid grid-cols-2 gap-6 border-b border-[#2C4A3B] py-2 items-center">
                <div className="text-lg font-plexmono text-[#E3A857] text-center">{s1.byPosition[pos]}</div>
                <div className="text-lg font-plexmono text-[#7FB3D5] text-center">{s2.byPosition[pos]}</div>
                <div className="col-span-2 text-xs text-[#6B8570] text-center -mt-1">{pos}</div>
              </div>
            ))}

            {h2h && h2h.length > 0 && (
              <>
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] text-center mt-6 mb-2">Head to Head — Last {h2h.length} Meetings</div>
                {h2h.map((m, i) => (
                  <div key={i} className="flex items-center justify-between text-xs py-1.5 border-b border-[#1C2E26]">
                    <span className="text-[#6B8570] w-20 shrink-0">{new Date(m.match_date).toLocaleDateString(undefined, { day: "numeric", month: "short", year: "2-digit" })}</span>
                    <span className="text-[#EDEDE3] flex-1 text-center">{m.home_club} <span className="font-plexmono text-[#E3A857]">{m.home_score}–{m.away_score}</span> {m.away_club}</span>
                  </div>
                ))}
              </>
            )}
            {h2h && h2h.length === 0 && (
              <div className="text-xs text-[#6B8570] text-center mt-6">No previous meetings found in ingested data.</div>
            )}
          </div>
        )}
        {(club1 && club2 && (!s1 || !s2)) && <div className="text-sm text-[#6B8570] mt-6 text-center">Loading squads…</div>}
      </div>
    </div>
  );
}
