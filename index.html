function potentialColor(v) {
  if (v == null) return "#4A5C52";
  if (v >= 85) return "#E3A857";
  if (v >= 70) return "#C9C08A";
  return "#8A9A8E";
}

// Metrics can be plain numbers (seed/demo players, already 0-100 skill scores)
// or {raw, scaled} objects (live players, real per-90 stats with a chart-only
// scaled value). These helpers read whichever shape is present.
function metricScaled(v) {
  return typeof v === "object" && v !== null ? v.scaled : v;
}
function metricRaw(v) {
  return typeof v === "object" && v !== null ? v.raw : v;
}
function metricLabel(v) {
  const raw = metricRaw(v);
  return Number.isInteger(raw) ? raw : Math.round(raw * 10) / 10;
}

// ---------------------------------------------------------------------------
// Hand-rolled SVG charts (no chart library dependency)
// ---------------------------------------------------------------------------
function polar(cx, cy, r, angleDeg) {
  const rad = (Math.PI / 180) * (angleDeg - 90);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function RadarChart({ metrics }) {
  const entries = Object.entries(metrics);
  const n = entries.length;
  const cx = 100, cy = 85, maxR = 60;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = entries.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const dataPts = entries.map(([, v], i) => polar(cx, cy, maxR * (Math.min(metricScaled(v), 100) / 100), i * angleStep));
  const dataPolygon = dataPts.map(p => `${p.x},${p.y}`).join(" ");

  const labels = entries.map(([k], i) => {
    const p = polar(cx, cy, maxR + 14, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#6B8570" fontSize="9"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  return (
    <svg viewBox="0 0 200 160" width="100%" height="100%">
      {gridRings}
      {entries.map((_, i) => {
        const p = polar(cx, cy, maxR, i * angleStep);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
      })}
      <polygon points={dataPolygon} fill="#E3A857" fillOpacity="0.25" stroke="#E3A857" strokeWidth="1.5" />
      {labels}
    </svg>
  );
}

// Overlays one or more players' stat shapes on the same axes — the "octagon"
// comparison view. series: [{ label, color, metrics }, ...]
function OverlayRadarChart({ series }) {
  // Union of all metric keys across every series, preserving first-seen order.
  const axes = [];
  series.forEach(s => Object.keys(s.metrics).forEach(k => { if (!axes.includes(k)) axes.push(k); }));
  const n = axes.length;
  if (n === 0) return null;
  const cx = 150, cy = 135, maxR = 95;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = axes.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const axisLines = axes.map((_, i) => {
    const p = polar(cx, cy, maxR, i * angleStep);
    return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
  });

  const labels = axes.map((k, i) => {
    const p = polar(cx, cy, maxR + 20, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#9AAA9E" fontSize="10"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  const shapes = series.map((s, si) => {
    const pts = axes.map((k, i) => {
      const v = metricScaled(s.metrics[k] ?? 0);
      return polar(cx, cy, maxR * (Math.min(v, 100) / 100), i * angleStep);
    });
    const poly = pts.map(p => `${p.x},${p.y}`).join(" ");
    return (
      <g key={si}>
        <polygon points={poly} fill={s.color} fillOpacity="0.22" stroke={s.color} strokeWidth="2" />
        {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={s.color} />)}
      </g>
    );
  });

  return (
    <svg viewBox="0 0 300 300" width="100%" height="100%">
      {gridRings}
      {axisLines}
      {shapes}
      {labels}
    </svg>
  );
}

// Reads an axis value for a player: "Potential"/"Age" are direct fields,

function getAxisValue(p, key) {
  if (key === "Potential") return p.potential;
  if (key === "Age") return p.age;
  return metricRaw(p.metrics[key] ?? null);
}

function ScatterPlot({ players, xKey, yKey, onSelect, topProspectIds, compareIds }) {
  const width = 640, height = 440, pad = 55;
  const pts = players
    .map(p => ({ p, x: getAxisValue(p, xKey), y: getAxisValue(p, yKey) }))
    .filter(d => d.x != null && d.y != null && !isNaN(d.x) && !isNaN(d.y));

  if (pts.length === 0) {
    return (
      <div className="text-[#6B8570] text-sm p-10 text-center">
        No players have real data for both "{xKey}" and "{yKey}" yet. Try different axes or connect to live data.
      </div>
    );
  }

  const xs = pts.map(d => d.x), ys = pts.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  // Pad the range a bit so points don't sit right on the axis edges.
  const xPad = (xMax - xMin) * 0.1 || 1, yPad = (yMax - yMin) * 0.1 || 1;
  const xLo = xMin - xPad, xHi = xMax + xPad;
  const yLo = yMin - yPad, yHi = yMax + yPad;
  const sx = (v) => pad + ((v - xLo) / (xHi - xLo || 1)) * (width - pad - 20);
  const sy = (v) => height - pad - ((v - yLo) / (yHi - yLo || 1)) * (height - pad - 20);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%">
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`h${f}`} x1={pad} x2={width - 20} y1={pad + f * (height - pad - 20)} y2={pad + f * (height - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`v${f}`} y1={pad} y2={height - pad} x1={pad + f * (width - pad - 20)} x2={pad + f * (width - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      <line x1={pad} y1={height - pad} x2={width - 20} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <line x1={pad} y1={pad} x2={pad} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <text x={(width + pad) / 2} y={height - 15} fill="#9AAA9E" fontSize="12" textAnchor="middle">{xKey}</text>

        transform={`rotate(-90 16 ${(height - pad + pad) / 2})`}>{yKey}</text>
      {pts.map(({ p, x, y }) => {
        const color = topProspectIds.has(p.id) ? "#E3A857" : compareIds.has(p.id) ? "#7FB3D5" : "#8A9A8E";
        return (
          <circle key={p.id} cx={sx(x)} cy={sy(y)} r={topProspectIds.has(p.id) ? 6 : 5}
            fill={color} fillOpacity="0.85" stroke="#0E1A15" strokeWidth="1"
            style={{ cursor: "pointer" }} onClick={() => onSelect(p)}>
            <title>{`${p.name} · ${p.club}\n${xKey}: ${Math.round(x * 100) / 100}\n${yKey}: ${Math.round(y * 100) / 100}`}</title>
          </circle>
        );
      })}
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Percentile-based scaling: each player's stat is ranked against real peers
// (same position where there's enough sample size, otherwise the whole
// ingested pool) rather than an arbitrary fixed scale. This is computed
// once per fetch across the full player list — see buildPercentileMetrics.
// ---------------------------------------------------------------------------

const RAW_STAT_KEYS = ["Goals/90", "Assists/90", "Key Passes/90", "Tackles/90", "Take-ons/90", "Pass Acc %", "Rating"];
const MIN_PEERS_FOR_POSITION_GROUP = 5;

function rawStatsForRow(row) {
  const minutes = row.minutes_played || 0;
  const hasStats = minutes > 0;
  const p90 = (total) => hasStats ? (total || 0) * 90 / minutes : null;
  if (!hasStats) {
    return { "Goals/90": null, "Assists/90": null, "Key Passes/90": null, "Tackles/90": null,
             "Take-ons/90": null, "Pass Acc %": null, "Rating": null };
  }
  return {
    "Goals/90": p90(row.goals),
    "Assists/90": p90(row.assists),
    "Key Passes/90": p90(row.key_passes),
    "Tackles/90": p90(row.tackles),
    "Take-ons/90": p90(row.take_ons_completed),
    "Pass Acc %": row.pass_accuracy_pct ?? null,
    "Rating": row.avg_rating ?? null,
  };
}

// Percentile rank of `value` within `pool` (array of numbers, no nulls).
// Ties split the difference, matching standard percentile-rank convention.
function percentileRank(value, pool) {
  if (value == null || pool.length === 0) return null;
  let below = 0, equal = 0;
  for (const v of pool) {
    if (v < value) below++;
    else if (v === value) equal++;
  }
  return ((below + 0.5 * equal) / pool.length) * 100;
}

// Takes raw /players rows, returns fully-formed player objects with
// percentile-scaled metrics computed against the real ingested pool.
function buildPercentilePlayers(rows) {
  const rawStats = rows.map(rawStatsForRow);

  // Pools per position group, and an overall fallback pool, per metric.
  const positionPools = {};
  const overallPools = {};
  RAW_STAT_KEYS.forEach(k => { overallPools[k] = []; });

  rows.forEach((row, i) => {
    const pos = row.primary_position || "Unknown";
    if (!positionPools[pos]) {
      positionPools[pos] = {};
      RAW_STAT_KEYS.forEach(k => { positionPools[pos][k] = []; });
    }
    RAW_STAT_KEYS.forEach(k => {
      const v = rawStats[i][k];
      if (v != null) {
        positionPools[pos][k].push(v);
        overallPools[k].push(v);
      }
    });
  });

  return rows.map((row, i) => {
    const age = row.date_of_birth
      ? Math.floor((Date.now() - new Date(row.date_of_birth)) / 3.15576e10)
      : null;
    const minutes = row.minutes_played || 0;
    const hasStats = minutes > 0;
    const pos = row.primary_position || "Unknown";
    const raw = rawStats[i];

    const metrics = {};
    RAW_STAT_KEYS.forEach(k => {
      const posPool = positionPools[pos][k];
      const pool = posPool.length >= MIN_PEERS_FOR_POSITION_GROUP ? posPool : overallPools[k];
      const pct = percentileRank(raw[k], pool);
      metrics[k] = { raw: raw[k] ?? 0, scaled: pct ?? 0 };
    });

    const usedPositionPeers = positionPools[pos]?.["Goals/90"]?.length >= MIN_PEERS_FOR_POSITION_GROUP;

    return {
      id: `live-${row.id}`,
      name: row.full_name,
      age,
      position: row.primary_position,
      posLabel: row.primary_position,
      club: row.club || "Unattached",
      league: row.league || "Unknown league",
      flag: "",
      potential: row.potential_index != null ? Math.round(row.potential_index) : null,
      marketValue: "—",
      minutesPlayed: minutes,
      metrics,
      note: !hasStats
        ? "Live record — no match data ingested yet for this player, so no real stats to show."
        : `Live record, ${Math.round(minutes)} minutes across ingested matches. Chart shows percentile rank ${usedPositionPeers ? `vs other ${pos}s` : "vs the full ingested player pool (not enough same-position peers yet)"}.`,
      tags: !hasStats ? ["Live data", "No match data"] : row.potential_index != null ? ["Live data"] : ["Live data", "Unscored"],
    };
  });
}

        onClick={e => e.stopPropagation()}>
        <button onClick={onClose} className="absolute top-5 right-5 text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono mb-4">Head to Head</div>

        <div className="grid grid-cols-2 gap-6">
          {[[a, colorA], [b, colorB]].map(([p, color]) => (
            <div key={p.id}>
              <div className="flex items-center gap-2">
                <span className="w-3 h-3 inline-block rounded-full" style={{ background: color }} />
                <h3 className="text-lg text-[#EDEDE3] font-display">{p.name}</h3>
              </div>
              <div className="text-xs text-[#9AAA9E] mb-1 ml-5">{p.club} · {p.league} · Age {p.age ?? "—"}</div>
              <div className="text-2xl font-bold ml-5" style={{ color: potentialColor(p.potential) }}>
                {p.potential ?? "—"}
              </div>
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570] ml-5">
                {p.potential == null ? "Unscored" : "Potential Index"}
              </div>
            </div>
          ))}
        </div>

        <div className="h-80 mt-4">
          <OverlayRadarChart series={[
            { label: a.name, color: colorA, metrics: a.metrics },
            { label: b.name, color: colorB, metrics: b.metrics },
          ]} />
        </div>

        <div className="mt-4 space-y-1.5">
          {allMetrics.map(m => (
            <div key={m} className="flex items-center justify-between text-sm border-b border-[#2C4A3B] py-1.5">
              <span className="font-plexmono w-16 text-left" style={{ color: colorA }}>{metricLabel(a.metrics[m] ?? 0)}</span>
              <span className="text-[#9AAA9E] text-xs uppercase tracking-wide text-center flex-1">{m}</span>
              <span className="font-plexmono w-16 text-right" style={{ color: colorB }}>{metricLabel(b.metrics[m] ?? 0)}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function ScoutDashboard() {
  const [league, setLeague] = useState("All leagues");
  const [position, setPosition] = useState("All positions");
  const [query, setQuery] = useState("");
  const [sortDesc, setSortDesc] = useState(true);
  const [sortBy, setSortBy] = useState("potential");
  const [hideUnscored, setHideUnscored] = useState(false);
  const [view, setView] = useState("cards");
  const [scatterX, setScatterX] = useState("Goals/90");
  const [scatterY, setScatterY] = useState("Key Passes/90");
  const [selected, setSelected] = useState(null);
  const [livePlayers, setLivePlayers] = useState(null);
  const [connectionStatus, setConnectionStatus] = useState(API_BASE_URL ? "connecting" : "offline");
  const [compareList, setCompareList] = useState([]);
  const [comparing, setComparing] = useState(false);

  const toggleCompare = (p) => {
    setCompareList(list => {
      if (list.find(x => x.id === p.id)) return list.filter(x => x.id !== p.id);
      if (list.length >= 2) return list;
      return [...list, p];
    });
  };

  useEffect(() => {
    if (!API_BASE_URL) return;
    let cancelled = false;
    setConnectionStatus("connecting");
    fetch(`${API_BASE_URL}/players?limit=200`, {
      headers: API_KEY ? { "X-API-Key": API_KEY } : {}
    })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        if (cancelled) return;
        setLivePlayers(buildPercentilePlayers(rows));
        setConnectionStatus("live");
      })
      .catch(() => { if (!cancelled) setConnectionStatus("offline"); });
    return () => { cancelled = true; };
  }, []);

  const dataSource = livePlayers && connectionStatus === "live" ? livePlayers : PLAYERS;

  const availableLeagues = useMemo(() =>
    ["All leagues", ...Array.from(new Set(dataSource.map(p => p.league)))], [dataSource]);
  const availablePositions = useMemo(() =>
    ["All positions", ...Array.from(new Set(dataSource.map(p => p.position)))], [dataSource]);

  const filtered = useMemo(() => {
    let list = dataSource.filter(p => {
      if (league !== "All leagues" && p.league !== league) return false;
      if (position !== "All positions" && p.position !== position) return false;
      if (hideUnscored && p.potential == null) return false;
      if (query && !p.name.toLowerCase().includes(query.toLowerCase()) &&
          !p.club.toLowerCase().includes(query.toLowerCase())) return false;
      return true;
    });

    const getSortValue = (p) => {
      if (sortBy === "potential") return p.potential;
      if (sortBy === "age") return p.age;
      if (sortBy === "name") return p.name.toLowerCase();
      return metricRaw(p.metrics[sortBy] ?? null);
    };

    list.sort((a, b) => {
      const av = getSortValue(a), bv = getSortValue(b);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "string") return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      return sortDesc ? bv - av : av - bv;
    });
    return list;
  }, [dataSource, league, position, query, sortDesc, sortBy, hideUnscored]);

  const sortOptions = [
    { value: "potential", label: "Potential" },
    { value: "name", label: "Name" },
    { value: "age", label: "Age" },
    ...(connectionStatus === "live" ? [
      { value: "Goals/90", label: "Goals/90" },
      { value: "Key Passes/90", label: "Key Passes/90" },
      { value: "Tackles/90", label: "Tackles/90" },
    ] : []),
  ];

  const topProspectIds = useMemo(() => {
    if (connectionStatus !== "live") return new Set();
    const scored = dataSource.filter(p => p.potential != null);
    scored.sort((a, b) => b.potential - a.potential);
    return new Set(scored.slice(0, 3).map(p => p.id));
  }, [dataSource, connectionStatus]);

  const axisOptions = useMemo(() => {
    const keys = new Set();
    dataSource.forEach(p => Object.keys(p.metrics).forEach(k => keys.add(k)));
    return ["Potential", "Age", ...Array.from(keys)];
  }, [dataSource]);

  return (
    <div className="min-h-screen bg-[#0E1A15] text-[#EDEDE3]">
      <div className="border-b border-[#2C4A3B] px-6 py-10 md:px-10">
        <div className="flex items-center justify-between mb-3">
          <div className="text-[11px] tracking-[0.25em] uppercase text-[#E3A857] font-plexmono">Cross-League Scouting Index</div>
          <div className="flex items-center gap-1.5 text-[11px] uppercase tracking-wide text-[#6B8570]">
            {connectionStatus === "live" && <>📡 Live API</>}
            {connectionStatus === "connecting" && <>⏳ Connecting...</>}
            {connectionStatus === "offline" && <>⚠ Seed data</>}
          </div>
        </div>
        <h1 className="text-3xl md:text-5xl leading-[1.05] max-w-3xl font-display">
          Find the player before the big five leagues do.
        </h1>
        <p className="text-[#9AAA9E] mt-4 max-w-2xl text-sm md:text-base">
          A scouting index spanning leagues most databases ignore. Filter, sort, and open any
          dossier for the full statistical + qualitative profile.
        </p>
      </div>

      <div className="px-6 md:px-10 py-5 flex flex-col md:flex-row gap-3 md:items-center border-b border-[#2C4A3B] flex-wrap">
        <div className="flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 flex-1 min-w-[180px]">
          🔍
          <input value={query} onChange={e => setQuery(e.target.value)}
            placeholder="Search player or club..."
            className="bg-transparent outline-none text-sm w-full placeholder:text-[#6B8570]" />
        </div>
        <select value={league} onChange={e => setLeague(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
          {availableLeagues.map(l => <option key={l}>{l}</option>)}
        </select>
        <select value={position} onChange={e => setPosition(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
          {availablePositions.map(p => <option key={p}>{p}</option>)}
        </select>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
          {sortOptions.map(o => <option key={o.value} value={o.value}>Sort: {o.label}</option>)}
        </select>
        <button onClick={() => setSortDesc(s => !s)}
          className="flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm hover:border-[#E3A857]">
          {sortDesc ? "↓" : "↑"}
        </button>
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1">
            <input type="checkbox" checked={hideUnscored} onChange={e => setHideUnscored(e.target.checked)}
              className="accent-[#E3A857]" />
            Hide unscored
          </label>
        )}
        {(league !== "All leagues" || position !== "All positions" || query || hideUnscored) && (
          <button onClick={() => { setLeague("All leagues"); setPosition("All positions"); setQuery(""); setHideUnscored(false); }}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2">
            Reset
          </button>
        )}
        <div className="flex border border-[#2C4A3B] ml-auto">
          <button onClick={() => setView("cards")}
            className={`px-3 py-2 text-xs uppercase tracking-wide ${view === "cards" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Cards
          </button>
          <button onClick={() => setView("scatter")}
            className={`px-3 py-2 text-xs uppercase tracking-wide ${view === "scatter" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Scatter
          </button>
        </div>
      </div>

      {view === "scatter" && (
        <div className="px-6 md:px-10 py-4 flex flex-wrap gap-3 items-center border-b border-[#2C4A3B]">
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">X axis</span>
          <select value={scatterX} onChange={e => setScatterX(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">Y axis</span>
          <select value={scatterY} onChange={e => setScatterY(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs text-[#6B8570] ml-auto">Click a point to open its dossier</span>
        </div>
      )}

      {view === "cards" && (
        <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-24">
          {connectionStatus === "connecting" && (
            [...Array(6)].map((_, i) => (
              <div key={i} className="bg-[#152922] border border-[#2C4A3B] p-5 h-64 animate-pulse" />
            ))
          )}
          {connectionStatus !== "connecting" && filtered.map(p => (
            <PlayerCard key={p.id} p={p} onOpen={setSelected}
              onToggleCompare={toggleCompare}
              isComparing={!!compareList.find(x => x.id === p.id)}
              compareDisabled={compareList.length >= 2}
              isTopProspect={topProspectIds.has(p.id)} />
          ))}
          {connectionStatus !== "connecting" && filtered.length === 0 && (
            <div className="text-[#6B8570] text-sm">No players match those filters.</div>
          )}
        </div>
      )}

      {view === "scatter" && connectionStatus !== "connecting" && (
        <div className="px-6 md:px-10 py-8 pb-24">
          <ScatterPlot players={filtered} xKey={scatterX} yKey={scatterY} onSelect={setSelected}
            topProspectIds={topProspectIds}
            compareIds={new Set(compareList.map(x => x.id))} />
        </div>
      )}

      <div className="px-6 md:px-10 py-6 border-t border-[#2C4A3B] text-xs text-[#6B8570]">
        ℹ When "Live API" shows above, you're looking at real ingested data. Radar/octagon charts
        show each stat as a percentile rank against real peers (same position where enough data
        exists, otherwise the whole ingested pool) — not a fixed scale. "Unscored" players
        need more ingested match minutes before a potential score can be computed.
      </div>

      {selected && <PlayerDossier p={selected} onClose={() => setSelected(null)} />}
      <CompareBar selected={compareList} onClear={() => setCompareList([])} onCompare={() => setComparing(true)} />
      {comparing && compareList.length === 2 && (
        <ComparePanel players={compareList} onClose={() => setComparing(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ScoutDashboard />);
</script>
</body>
</html>
