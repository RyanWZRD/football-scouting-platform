function Avatar({ name, photoUrl, size = 44 }) {

// Turns a timestamp into "3h ago", "Just now", "2d ago", etc.
function relativeTime(isoString) {
  if (!isoString) return null;
  const then = new Date(isoString).getTime();
  const diffMs = Date.now() - then;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return "Just now";
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

function potentialColor(v) {
  if (v == null) return "#4A5C52";
  if (v >= 85) return "#E3A857";
  if (v >= 70) return "#C9C08A";
  return "#8A9A8E";
}

// Metrics can be plain numbers (seed/demo players, already 0-100 skill scores)
// or {raw, scaled} objects (live players, real per-90 stats with a chart-only
// scaled value). These helpers read whichever shape is present.
function metricScaled(v) {
  return typeof v === "object" && v !== null ? v.scaled : v;
}
function metricRaw(v) {
  return typeof v === "object" && v !== null ? v.raw : v;
}
function metricLabel(v) {
  const raw = metricRaw(v);
  return Number.isInteger(raw) ? raw : Math.round(raw * 10) / 10;
}

// ---------------------------------------------------------------------------
// Hand-rolled SVG charts (no chart library dependency)
// ---------------------------------------------------------------------------
function polar(cx, cy, r, angleDeg) {
  const rad = (Math.PI / 180) * (angleDeg - 90);
  return { x: cx + r * Math.cos(rad), y: cy + r * Math.sin(rad) };
}

function RadarChart({ metrics }) {
  const entries = Object.entries(metrics);
  const n = entries.length;
  const cx = 100, cy = 85, maxR = 60;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = entries.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const dataPts = entries.map(([, v], i) => polar(cx, cy, maxR * (Math.min(metricScaled(v), 100) / 100), i * angleStep));
  const dataPolygon = dataPts.map(p => `${p.x},${p.y}`).join(" ");

  const labels = entries.map(([k], i) => {
    const p = polar(cx, cy, maxR + 14, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#6B8570" fontSize="9"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  return (
    <svg viewBox="0 0 200 160" width="100%" height="100%">
      {gridRings}
      {entries.map((_, i) => {
        const p = polar(cx, cy, maxR, i * angleStep);
        return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
      })}
      <polygon points={dataPolygon} fill="#E3A857" fillOpacity="0.25" stroke="#E3A857" strokeWidth="1.5" />
      {labels}
    </svg>
  );
}

// Overlays one or more players' stat shapes on the same axes — the "octagon"
// comparison view. series: [{ label, color, metrics }, ...]
function OverlayRadarChart({ series }) {
  // Union of all metric keys across every series, preserving first-seen order.
  const axes = [];
  series.forEach(s => Object.keys(s.metrics).forEach(k => { if (!axes.includes(k)) axes.push(k); }));
  const n = axes.length;
  if (n === 0) return null;
  const cx = 150, cy = 135, maxR = 95;
  const angleStep = 360 / n;

  const gridRings = [0.33, 0.66, 1].map((scale, ri) => {
    const pts = axes.map((_, i) => polar(cx, cy, maxR * scale, i * angleStep));
    return <polygon key={ri} points={pts.map(p => `${p.x},${p.y}`).join(" ")}
      fill="none" stroke="#2C4A3B" strokeWidth="1" />;
  });

  const axisLines = axes.map((_, i) => {
    const p = polar(cx, cy, maxR, i * angleStep);
    return <line key={i} x1={cx} y1={cy} x2={p.x} y2={p.y} stroke="#2C4A3B" strokeWidth="1" />;
  });

  const labels = axes.map((k, i) => {
    const p = polar(cx, cy, maxR + 20, i * angleStep);
    return <text key={k} x={p.x} y={p.y} fill="#9AAA9E" fontSize="10"
      textAnchor="middle" dominantBaseline="middle">{k}</text>;
  });

  const shapes = series.map((s, si) => {
    const pts = axes.map((k, i) => {
      const v = metricScaled(s.metrics[k] ?? 0);
      return polar(cx, cy, maxR * (Math.min(v, 100) / 100), i * angleStep);
    });
    const poly = pts.map(p => `${p.x},${p.y}`).join(" ");
    return (
      <g key={si}>
        <polygon points={poly} fill={s.color} fillOpacity="0.22" stroke={s.color} strokeWidth="2" />
        {pts.map((p, i) => <circle key={i} cx={p.x} cy={p.y} r="3" fill={s.color} />)}
      </g>
    );
  });

  return (
    <svg viewBox="0 0 300 300" width="100%" height="100%">
      {gridRings}
      {axisLines}
      {shapes}
      {labels}
    </svg>
  );
}

// Reads an axis value for a player: "Potential"/"Age" are direct fields,
// anything else is looked up in metrics (raw value, e.g. real Goals/90).
function getAxisValue(p, key) {
  if (key === "Potential") return p.potential;
  if (key === "Age") return p.age;
  return metricRaw(p.metrics[key] ?? null);
}

function ScatterPlot({ players, xKey, yKey, onSelect, topProspectIds, compareIds }) {
  const width = 640, height = 440, pad = 55;
  const pts = players
    .map(p => ({ p, x: getAxisValue(p, xKey), y: getAxisValue(p, yKey) }))
    .filter(d => d.x != null && d.y != null && !isNaN(d.x) && !isNaN(d.y));

  if (pts.length === 0) {
    return (
      <div className="text-[#6B8570] text-sm p-10 text-center">
        No players have real data for both "{xKey}" and "{yKey}" yet. Try different axes or connect to live data.
      </div>
    );
  }

  const xs = pts.map(d => d.x), ys = pts.map(d => d.y);
  const xMin = Math.min(...xs), xMax = Math.max(...xs);
  const yMin = Math.min(...ys), yMax = Math.max(...ys);
  // Pad the range a bit so points don't sit right on the axis edges.
  const xPad = (xMax - xMin) * 0.1 || 1, yPad = (yMax - yMin) * 0.1 || 1;
  const xLo = xMin - xPad, xHi = xMax + xPad;
  const yLo = yMin - yPad, yHi = yMax + yPad;
  const sx = (v) => pad + ((v - xLo) / (xHi - xLo || 1)) * (width - pad - 20);
  const sy = (v) => height - pad - ((v - yLo) / (yHi - yLo || 1)) * (height - pad - 20);

  return (
    <svg viewBox={`0 0 ${width} ${height}`} width="100%" height="100%">
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`h${f}`} x1={pad} x2={width - 20} y1={pad + f * (height - pad - 20)} y2={pad + f * (height - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      {[0.25, 0.5, 0.75].map(f => (
        <line key={`v${f}`} y1={pad} y2={height - pad} x1={pad + f * (width - pad - 20)} x2={pad + f * (width - pad - 20)}
          stroke="#1C332A" strokeWidth="1" />
      ))}
      <line x1={pad} y1={height - pad} x2={width - 20} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <line x1={pad} y1={pad} x2={pad} y2={height - pad} stroke="#2C4A3B" strokeWidth="1.5" />
      <text x={(width + pad) / 2} y={height - 15} fill="#9AAA9E" fontSize="12" textAnchor="middle">{xKey}</text>
      <text x={16} y={(height - pad + pad) / 2} fill="#9AAA9E" fontSize="12" textAnchor="middle"
        transform={`rotate(-90 16 ${(height - pad + pad) / 2})`}>{yKey}</text>
      {pts.map(({ p, x, y }) => {
        const color = topProspectIds.has(p.id) ? "#E3A857" : compareIds.has(p.id) ? "#7FB3D5" : "#8A9A8E";
        return (
          <circle key={p.id} cx={sx(x)} cy={sy(y)} r={topProspectIds.has(p.id) ? 6 : 5}
            fill={color} fillOpacity="0.85" stroke="#0E1A15" strokeWidth="1"
            style={{ cursor: "pointer" }} onClick={() => onSelect(p)}>
            <title>{`${p.name} · ${p.club}\n${xKey}: ${Math.round(x * 100) / 100}\n${yKey}: ${Math.round(y * 100) / 100}`}</title>
          </circle>
        );
      })}
    </svg>
  );
}

// ---------------------------------------------------------------------------
// Percentile-based scaling: each player's stat is ranked against real peers
// (same position where there's enough sample size, otherwise the whole
// ingested pool) rather than an arbitrary fixed scale. This is computed
// once per fetch across the full player list — see buildPercentileMetrics.
// ---------------------------------------------------------------------------

// Full pool of stats we can compute percentiles for. Not every position's
// radar shows all of these — see POSITION_METRIC_SETS below.
const RAW_STAT_KEYS = ["Goals/90", "Assists/90", "Shots on Target/90", "Key Passes/90",
  "Tackles/90", "Interceptions/90", "Take-ons/90", "Pass Acc %", "Duel Win %", "Rating",
  "Saves/90", "Save %", "Goals Conceded/90"];
const MIN_PEERS_FOR_POSITION_GROUP = 5;

// Stats where a LOWER raw number is actually better (e.g. conceding fewer
// goals). Percentiles for these get inverted so "further out on the radar"
// still consistently means "better" across every axis.
const LOWER_IS_BETTER = new Set(["Goals Conceded/90"]);

// Which axes actually show on a player's radar/octagon, by position — a
// centre-back's radar shouldn't be judged on goals, a striker's shouldn't
// foreground tackles. Percentiles are still computed for every stat (in
// case you compare across positions), this just controls the default view.
// Note: radar shape follows axis count directly (4 axes = diamond, 5 =
// pentagon, etc) — that's normal chart geometry, not a bug.
const POSITION_METRIC_SETS = {
  "Attacker": ["Goals/90", "Shots on Target/90", "Assists/90", "Take-ons/90", "Pass Acc %"],
  "Midfielder": ["Key Passes/90", "Assists/90", "Take-ons/90", "Tackles/90", "Pass Acc %"],
  "Defender": ["Tackles/90", "Interceptions/90", "Duel Win %", "Pass Acc %", "Take-ons/90"],
  "Goalkeeper": ["Saves/90", "Save %", "Goals Conceded/90", "Pass Acc %", "Rating"],
};
const DEFAULT_METRIC_SET = ["Goals/90", "Key Passes/90", "Tackles/90", "Pass Acc %", "Rating"];

function rawStatsForRow(row) {
  const minutes = row.minutes_played || 0;
  const hasStats = minutes > 0;
  const p90 = (total) => hasStats ? (total || 0) * 90 / minutes : null;
  if (!hasStats) {
    const empty = {};
    RAW_STAT_KEYS.forEach(k => { empty[k] = null; });
    return empty;
  }
  return {
    "Goals/90": p90(row.goals),
    "Assists/90": p90(row.assists),
    "Shots on Target/90": p90(row.shots_on_target),
    "Key Passes/90": p90(row.key_passes),
    "Tackles/90": p90(row.tackles),
    "Interceptions/90": p90(row.interceptions),
    "Take-ons/90": p90(row.take_ons_completed),
    "Pass Acc %": row.pass_accuracy_pct ?? null,
    "Duel Win %": row.duel_win_pct ?? null,
    "Rating": row.avg_rating ?? null,
    "Saves/90": p90(row.saves),
    "Save %": row.save_pct ?? null,
    "Goals Conceded/90": p90(row.goals_conceded),
  };
}

// Percentile rank of `value` within `pool` (array of numbers, no nulls).
// Ties split the difference, matching standard percentile-rank convention.
function percentileRank(value, pool) {
  if (value == null || pool.length === 0) return null;
  let below = 0, equal = 0;
  for (const v of pool) {
    if (v < value) below++;
    else if (v === value) equal++;
  }
  return ((below + 0.5 * equal) / pool.length) * 100;
}

// Takes raw /players rows, returns fully-formed player objects with
// percentile-scaled metrics computed against the real ingested pool.
function buildPercentilePlayers(rows) {
  const rawStats = rows.map(rawStatsForRow);

  // Pools per position group, and an overall fallback pool, per metric.
  const positionPools = {};
  const overallPools = {};
  RAW_STAT_KEYS.forEach(k => { overallPools[k] = []; });

  rows.forEach((row, i) => {
    const pos = row.primary_position || "Unknown";
    if (!positionPools[pos]) {
      positionPools[pos] = {};
      RAW_STAT_KEYS.forEach(k => { positionPools[pos][k] = []; });
    }
    RAW_STAT_KEYS.forEach(k => {
      const v = rawStats[i][k];
      if (v != null) {
        positionPools[pos][k].push(v);
        overallPools[k].push(v);
      }
    });
  });

  return rows.map((row, i) => {
    const age = row.date_of_birth
      ? Math.floor((Date.now() - new Date(row.date_of_birth)) / 3.15576e10)
      : null;
    const minutes = row.minutes_played || 0;
    const hasStats = minutes > 0;
    const pos = row.primary_position || "Unknown";
    const raw = rawStats[i];

    const metrics = {};
    RAW_STAT_KEYS.forEach(k => {
      const posPool = positionPools[pos][k];
      const pool = posPool.length >= MIN_PEERS_FOR_POSITION_GROUP ? posPool : overallPools[k];
      let pct = percentileRank(raw[k], pool);
      if (pct != null && LOWER_IS_BETTER.has(k)) pct = 100 - pct;
      metrics[k] = { raw: raw[k] ?? 0, scaled: pct ?? 0 };
    });

    // The subset actually shown on the radar by default — relevant to this
    // player's position. Full `metrics` (all stats) stays available for
    // scatter plots, sorting, and rankings regardless of position.
    const radarKeys = POSITION_METRIC_SETS[pos] || DEFAULT_METRIC_SET;
    const radarMetrics = {};
    radarKeys.forEach(k => { if (metrics[k]) radarMetrics[k] = metrics[k]; });

    const usedPositionPeers = positionPools[pos]?.["Goals/90"]?.length >= MIN_PEERS_FOR_POSITION_GROUP;

    return {
      id: `live-${row.id}`,
      name: row.full_name,
      age,
      position: row.primary_position,
      posLabel: row.primary_position,
      club: row.club || "Unattached",
      league: row.league_display || row.league || "Unknown league",
      flag: "",
      photoUrl: row.photo_url || null,
      injury: row.injury_type ? { type: row.injury_type, reason: row.reason, date: row.reported_date } : null,
      potential: row.potential_index != null ? Math.round(row.potential_index) : null,
      marketValue: "—",
      minutesPlayed: minutes,
      appearances: row.appearances ?? null,
      seasonTotals: hasStats ? {
        "Goals": row.goals ?? 0,
        "Assists": row.assists ?? 0,
        "Shots (Total)": row.shots ?? 0,
        "Shots on Target": row.shots_on_target ?? 0,
        "Key Passes": row.key_passes ?? 0,
        "Passes (Completed/Attempted)": `${row.passes_completed ?? 0}/${row.passes_attempted ?? 0}`,
        "Tackles": row.tackles ?? 0,
        "Interceptions": row.interceptions ?? 0,
        "Take-ons (Completed/Attempted)": `${row.take_ons_completed ?? 0}/${row.take_ons_attempted ?? 0}`,
        "Duels (Won/Attempted)": `${row.duels_won ?? 0}/${row.duels_attempted ?? 0}`,
        ...(row.primary_position === "Goalkeeper" ? {
          "Saves": row.saves ?? 0,
          "Goals Conceded": row.goals_conceded ?? 0,
        } : {}),
      } : null,
      // Discipline stats were only added to ingestion recently — many
      // already-ingested matches genuinely have no data for these yet.
      // Only show the section once there's at least one real non-zero
      // value, rather than displaying a wall of placeholder zeros.
      hasDisciplineData: !!(row.yellow_cards || row.red_cards || row.fouls_committed ||
        row.fouls_drawn || row.offsides || row.penalties_won || row.penalties_scored ||
        row.penalties_missed || row.penalties_committed),
      disciplineTotals: hasStats ? {
        "Yellow Cards": row.yellow_cards ?? 0,
        "Red Cards": row.red_cards ?? 0,
        "Fouls (Committed/Drawn)": `${row.fouls_committed ?? 0}/${row.fouls_drawn ?? 0}`,
        "Offsides": row.offsides ?? 0,
        ...((row.penalties_won || row.penalties_scored || row.penalties_missed || row.penalties_committed) ? {
          "Penalties (Scored/Missed)": `${row.penalties_scored ?? 0}/${row.penalties_missed ?? 0}`,
        } : {}),
      } : null,
      metrics,
      radarMetrics,
      watchLevel: row.watch_level ?? null,
      note: !hasStats
        ? "Live record — no match data ingested yet for this player, so no real stats to show."
        : `Live record, ${Math.round(minutes)} minutes across ingested matches. Chart shows percentile rank ${usedPositionPeers ? `vs other ${pos}s` : "vs the full ingested player pool (not enough same-position peers yet)"}.`,
      tags: !hasStats ? ["Live data", "No match data"] : row.potential_index != null ? ["Live data"] : ["Live data", "Unscored"],
    };
  });
}

function PlayerCard({ p, onOpen, onToggleCompare, isComparing, compareDisabled, isTopProspect, onToggleShortlist, sortBy }) {
  const showSortValue = sortBy && !["potential", "age", "name"].includes(sortBy) && p.metrics[sortBy] !== undefined;
  const shortlisted = p.watchLevel === "shortlist";

function Sparkline({ points, width = 200, height = 50 }) {
  if (!points || points.length < 2) return null;
  const values = points.map(p => p.potential_index);
  const min = Math.min(...values), max = Math.max(...values);
  const range = max - min || 1;
  const stepX = width / (points.length - 1);
  const coords = values.map((v, i) => `${i * stepX},${height - ((v - min) / range) * height}`);
  const trendUp = values[values.length - 1] >= values[0];
  const color = trendUp ? "#7FD99A" : "#E88B7D";
  const firstDate = new Date(points[0].computed_at).toLocaleDateString(undefined, { day: "numeric", month: "short" });
  const lastDate = new Date(points[points.length - 1].computed_at).toLocaleDateString(undefined, { day: "numeric", month: "short" });
  return (
    <div>
      <svg viewBox={`0 0 ${width} ${height}`} width="100%" height={height}>
        <polyline points={coords.join(" ")} fill="none" stroke={color} strokeWidth="2" />
        {coords.map((c, i) => {
          const [x, y] = c.split(",");
          return <circle key={i} cx={x} cy={y} r="2.5" fill={color} />;
        })}
      </svg>
      <div className="flex justify-between text-[10px] text-[#6B8570] mt-1">
        <span>{firstDate} · {values[0].toFixed(1)}</span>
        <span style={{ color }}>{lastDate} · {values[values.length - 1].toFixed(1)}</span>
      </div>
    </div>
  );
}

  const [news, setNews] = useState(null);

  const loadNews = () => {

    setLoadingNews(true);

      .then(res => res.ok ? res.json() : [])

  const [highlights, setHighlights] = useState(null);

      .then(data => setHighlights(data))
      .catch(() => setHighlights({ found: false }))
      .finally(() => setLoadingHighlights(false));
  };
  const [ratingForm, setRatingForm] = useState({ technical: 5, physical: 5, mental: 5, tactical: 5, notes: "" });
  const [savingRating, setSavingRating] = useState(false);

  const saveScoutRating = () => {
    if (!API_BASE_URL) return;
    setSavingRating(true);
    fetch(`${API_BASE_URL}/players/${realId}/scout-rating`, {
      method: "POST",

    })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(() => {
        setRatingForm({ technical: 5, physical: 5, mental: 5, tactical: 5, notes: "" });
        return fetch(`${API_BASE_URL}/players/${realId}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} });

      .then(res => res.ok ? res.json() : null)
      .then(data => { if (data) setDetails(data); })
      .catch(() => alert("Couldn't save the rating — please try again."))
      .finally(() => setSavingRating(false));
  };

  useEffect(() => {
    if (!API_BASE_URL || !String(p.id).startsWith("live-")) return;
    fetch(`${API_BASE_URL}/players/${realId}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })

      .catch(() => setDetails(null));
    fetch(`${API_BASE_URL}/players/${realId}/projection`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setProjection(data))
      .catch(() => setProjection(null));
    fetch(`${API_BASE_URL}/players/${realId}/season-history`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(data => setSeasonHistory(data))
      .catch(() => setSeasonHistory([]));
  }, [p.id]);

  // Fetch a broad, position-matched pool and rank by similarity across all
  // real stats — lazy-loaded only when the Similar tab is actually opened.
  useEffect(() => {
    if (tab !== "similar" || similarPlayers !== null || !API_BASE_URL || !p.position) return;
    setSimilarLoading(true);
    const params = new URLSearchParams({ position: p.position, limit: "3000" });

      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        const pool = buildPercentilePlayers(rows);
        const target = pool.find(x => x.id === p.id) || p;
        const keys = Object.keys(target.metrics);
        const scored = pool
          .filter(x => x.id !== p.id)
          .map(x => {
            let sumSq = 0, n = 0;
            keys.forEach(k => {
              if (target.metrics[k]?.scaled == null || x.metrics[k]?.scaled == null) return;
              const diff = target.metrics[k].scaled - x.metrics[k].scaled;
              sumSq += diff * diff;
              n++;
            });
            return { player: x, distance: n > 0 ? Math.sqrt(sumSq / n) : Infinity };
          })
          .sort((a, b) => a.distance - b.distance)
          .slice(0, 6);
        setSimilarPlayers(scored);

                          {m.minutes_played}' {m.goals > 0 && `⚽${m.goals > 1 ? m.goals : ""}`} {m.assists > 0 && `🅰${m.assists > 1 ? m.assists : ""}`} {m.yellow_cards > 0 && "🟨"} {m.red_cards > 0 && "🟥"}
                        </span>
                        <span className="text-[#6B8570] font-plexmono w-8 text-right shrink-0">{m.rating ?? "—"}</span>
                      </div>
                    );
                  })}
                </div>
              </>
            )}
          </>
        )}

        {tab === "notes" && (
          <div className="mt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Structured Scout Report</div>
            <div className="border border-[#2C4A3B] p-4 mb-4">
              {["technical", "physical", "mental", "tactical"].map(dim => (
                <div key={dim} className="flex items-center gap-3 mb-2">
                  <span className="text-xs text-[#9AAA9E] w-20 capitalize shrink-0">{dim}</span>
                  <input type="range" min="1" max="10" value={ratingForm[dim]}
                    onChange={e => setRatingForm(prev => ({ ...prev, [dim]: parseInt(e.target.value) }))}
                    className="flex-1" />
                  <span className="text-sm font-plexmono text-[#E3A857] w-6 text-right shrink-0">{ratingForm[dim]}</span>
                </div>
              ))}
              <textarea value={ratingForm.notes} onChange={e => setRatingForm(prev => ({ ...prev, notes: e.target.value }))}
                placeholder="Context for this evaluation (optional)..." rows={2}
                className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm text-[#EDEDE3] outline-none focus:border-[#E3A857] resize-none mt-2" />
              <button onClick={saveScoutRating} disabled={savingRating}
                className="mt-2 text-xs uppercase tracking-wide px-4 py-2 bg-[#E3A857] text-[#0E1A15] font-bold disabled:opacity-40">
                {savingRating ? "Saving..." : "Save Rating"}
              </button>
            </div>

            {details?.scout_ratings?.length > 0 && (
              <div className="mb-6">
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Rating History</div>
                {details.scout_ratings.map(r => (
                  <div key={r.id} className="border-b border-[#2C4A3B] pb-2 mb-2">
                    <div className="flex gap-4 text-xs font-plexmono text-[#EDEDE3]">
                      <span>T:{r.technical}</span><span>P:{r.physical}</span><span>M:{r.mental}</span><span>Ta:{r.tactical}</span>
                      <span className="text-[#E3A857]">avg {((r.technical + r.physical + r.mental + r.tactical) / 4).toFixed(1)}</span>
                    </div>
                    {r.notes && <p className="text-[#C9C08A] text-sm mt-1">{r.notes}</p>}
                    <div className="text-[10px] text-[#6B8570] mt-1">{new Date(r.created_at).toLocaleDateString()}</div>
                  </div>
                ))}
              </div>
            )}

            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Add a scout note</div>
            <textarea value={noteText} onChange={e => setNoteText(e.target.value)}
              placeholder="What did you see? Technical strengths, weaknesses, injury concerns, transfer chatter..."
              rows={3}
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm text-[#EDEDE3] outline-none focus:border-[#E3A857] resize-none" />
            <button onClick={saveNote} disabled={!noteText.trim() || savingNote}
              className="mt-2 text-xs uppercase tracking-wide px-4 py-2 bg-[#E3A857] text-[#0E1A15] font-bold disabled:opacity-40 disabled:cursor-not-allowed">
              {savingNote ? "Saving..." : "Save Note"}
            </button>

            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mt-6 mb-2">
              {details?.scout_notes?.length ? "Note history" : "No notes yet"}
            </div>
            <div className="space-y-3">
              {(details?.scout_notes || []).map((n, i) => (
                <div key={i} className="border-b border-[#2C4A3B] pb-2">
                  <p className="text-[#C9C08A] leading-relaxed text-sm">{n.note}</p>
                  <div className="text-[10px] text-[#6B8570] mt-1">
                    {n.author || "dashboard"} · {new Date(n.created_at).toLocaleDateString()}
                    {n.watch_level && ` · marked ${n.watch_level}`}
                  </div>
                </div>
              ))}
            </div>

            <div className="flex flex-wrap gap-1.5 mt-4">
              {p.tags.map(t => (
                <span key={t} className="text-[10px] uppercase tracking-wide px-2 py-1 border border-[#2C4A3B] text-[#9AAA9E]">{t}</span>
              ))}
            </div>
          </div>
        )}

        {tab === "similar" && (
          <div className="mt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">
              Statistically similar {p.position ? `${p.position}s` : "players"}, ranked across all real stats
            </div>
            {similarLoading && <div className="text-sm text-[#6B8570]">Searching for similar players…</div>}
            {!similarLoading && similarPlayers?.length === 0 && (
              <div className="text-sm text-[#6B8570]">No comparable players found — needs a known position and live data.</div>
            )}
            {!similarLoading && similarPlayers?.map(({ player: sp }, i) => (
              <button key={sp.id} onClick={() => onNavigateToPlayer(sp)}
                className="w-full flex items-center justify-between text-sm py-2 px-2 -mx-2 hover:bg-[#152922] text-left border-b border-[#1C2E26]">
                <span className="flex items-center gap-2 text-[#EDEDE3]">
                  <span className="text-[#6B8570] w-5">{i + 1}.</span>
                  <Avatar name={sp.name} photoUrl={sp.photoUrl} size={28} />
                  {sp.name} <span className="text-[#6B8570] text-xs">· {sp.club} · {sp.league}</span>
                </span>
                <span className="font-plexmono" style={{ color: potentialColor(sp.potential) }}>{sp.potential ?? "—"}</span>
              </button>
            ))}
          </div>
        )}
      </div>

      {shareCardOpen && (
        <div className="fixed inset-0 bg-black/85 flex flex-col items-center justify-center p-4 z-[60]" onClick={() => setShareCardOpen(false)}>
          <div onClick={e => e.stopPropagation()} className="flex flex-col items-center">
            <div style={{ maxWidth: 360, maxHeight: "70vh", overflow: "auto" }}>
              {/* Genuinely smaller — real reduced pixel dimensions, not a CSS
                  transform (which corrupts html2canvas's captured output). */}
              <ShareCard p={p} variant={tab} similarPlayers={similarPlayers}
                noteText={details?.scout_notes?.[0]?.note} scale={0.333} />
            </div>
            <div className="flex items-center gap-3 mt-5">
              <button onClick={() => setShareCardOpen(false)} className="text-xs uppercase tracking-wide text-[#9AAA9E] hover:text-[#EDEDE3] px-4 py-2">
                Cancel
              </button>
              <button onClick={downloadShareCard} disabled={exportingImage}
                className="text-xs uppercase tracking-wide px-5 py-2 bg-[#E3A857] text-[#0E1A15] font-bold disabled:opacity-50">
                {exportingImage ? "Exporting…" : "⬇ Download Image"}
              </button>
            </div>
            <div className="text-[10px] text-[#6B8570] mt-3 max-w-xs text-center">
              Downloads a high-resolution PNG of the <span className="text-[#E3A857] uppercase">{tab}</span> view, ready to share.
            </div>
          </div>
          {/* Hidden, full-size, untransformed — this is the actual node
              html2canvas captures. Positioned off-screen, not display:none,
              so it still renders/lays out normally. */}
          <div style={{ position: "fixed", top: 0, left: -99999, pointerEvents: "none" }}>
            <ShareCard p={p} forwardedRef={shareCardRef} variant={tab}
              similarPlayers={similarPlayers}
              noteText={details?.scout_notes?.[0]?.note} scale={1} />
          </div>
        </div>
      )}

      <div style={{ position: "fixed", top: 0, left: -99999, pointerEvents: "none" }}>
        <FullDossierCard p={p} details={details} forwardedRef={fullDossierRef} />
      </div>
    </div>
  );
}

function ClubProfile({ players, clubName, leagueName, onClose, onSelectPlayer }) {
  const [simulatorOpen, setSimulatorOpen] = useState(false);
  const scored = players.filter(p => p.potential != null);
  const avgPotential = scored.length ? Math.round(scored.reduce((s, p) => s + p.potential, 0) / scored.length) : null;
  const agesKnown = players.filter(p => p.age != null);
  const avgAge = agesKnown.length ? (agesKnown.reduce((s, p) => s + p.age, 0) / agesKnown.length).toFixed(1) : null;

  // Squad Age Curve — free, purely a bucketing of data already in hand.
  const AGE_BUCKETS = [
    { label: "16-18", min: 16, max: 18 }, { label: "19-21", min: 19, max: 21 },
    { label: "22-24", min: 22, max: 24 }, { label: "25-27", min: 25, max: 27 },
    { label: "28-30", min: 28, max: 30 }, { label: "31+", min: 31, max: 99 },
  ];
  const ageCurve = AGE_BUCKETS.map(b => ({
    ...b, count: agesKnown.filter(p => p.age >= b.min && p.age <= b.max).length,
  }));
  const maxBucketCount = Math.max(1, ...ageCurve.map(b => b.count));

  // Youth Pipeline Score — genuine development-depth signal, distinct
  // from squad depth warnings. Free, client-side, using data already in hand.
  const u21s = players.filter(p => p.age != null && p.age <= 21 && p.potential != null);
  const youthPipeline = u21s.length > 0 ? {
    count: u21s.length,
    avgPotential: (u21s.reduce((s, p) => s + p.potential, 0) / u21s.length).toFixed(1),
    topProspect: [...u21s].sort((a, b) => b.potential - a.potential)[0],
  } : null;

  const POSITION_ORDER = ["Goalkeeper", "Defender", "Midfielder", "Attacker"];
  const byPosition = POSITION_ORDER
    .map(pos => ({ pos, list: players.filter(p => p.position === pos).sort((a, b) => (b.potential ?? -1) - (a.potential ?? -1)) }))
    .filter(g => g.list.length > 0);
  const otherPos = players.filter(p => !POSITION_ORDER.includes(p.position));
  if (otherPos.length > 0) byPosition.push({ pos: "Other / Unknown", list: otherPos });

  // Season Review — top scorer/rated computed client-side from data already
  // in hand (free, no new fetch); W-D-L record needs a small dedicated fetch.
  const withGoals = players.filter(p => (p.seasonTotals?.["Goals"] ?? 0) > 0)
    .sort((a, b) => b.seasonTotals["Goals"] - a.seasonTotals["Goals"]);
  const topScorer = withGoals[0];
  const withRating = players.filter(p => p.metrics?.["Rating"]?.raw > 0)
    .sort((a, b) => b.metrics["Rating"].raw - a.metrics["Rating"].raw);
  const topRated = withRating[0];

  const [record, setRecord] = useState(null);
  const [homeAway, setHomeAway] = useState(null);
  const [tacticalFit, setTacticalFit] = useState(null);
  const [balance, setBalance] = useState(null);
  const [manager, setManager] = useState(null);
  const [valueConcentration, setValueConcentration] = useState(null);
  const [partnerships, setPartnerships] = useState(null);
  const [positionContinuity, setPositionContinuity] = useState(null);
  useEffect(() => {
    if (!API_BASE_URL) return;
    const params = new URLSearchParams({ club: clubName, league: leagueName });
    fetch(`${API_BASE_URL}/clubs/record?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setRecord(data))
      .catch(() => setRecord(null));
    fetch(`${API_BASE_URL}/clubs/home-away?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setHomeAway(data))
      .catch(() => setHomeAway(null));
    fetch(`${API_BASE_URL}/clubs/recruitment-priorities?${params.toString()}&limit=6`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setTacticalFit(data))
      .catch(() => setTacticalFit(null));
    fetch(`${API_BASE_URL}/clubs/balance?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setBalance(data))
      .catch(() => setBalance(null));
    fetch(`${API_BASE_URL}/clubs/manager?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setManager(data))
      .catch(() => setManager(null));
    fetch(`${API_BASE_URL}/clubs/value-concentration?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setValueConcentration(data))
      .catch(() => setValueConcentration(null));
    fetch(`${API_BASE_URL}/clubs/partnerships?${params.toString()}&limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(data => setPartnerships(data))
      .catch(() => setPartnerships([]));
    fetch(`${API_BASE_URL}/clubs/position-continuity?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(data => setPositionContinuity(data))
      .catch(() => setPositionContinuity([]));
  }, [clubName, leagueName]);

  return (
    <div className="fixed inset-0 bg-black/70 flex items-center justify-center p-4 z-50" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-2xl w-full max-h-[90vh] overflow-y-auto p-4 sm:p-8 relative"
        onClick={e => e.stopPropagation()}>
        <button aria-label="Close" onClick={onClose} className="absolute top-5 right-5 text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">Squad Profile</div>
        <h2 className="text-3xl text-[#EDEDE3] font-display mt-2">{clubName}</h2>
        <div className="flex items-center justify-between mt-1">
          <div className="text-[#9AAA9E]">{leagueName}</div>
          <button onClick={() => setSimulatorOpen(true)} className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857]">
            🔄 Simulate Transfer
          </button>
        </div>

        {manager && (
          <div className="mt-4 flex items-center gap-3 border border-[#2C4A3B] p-3">
            {manager.photo_url && <img src={manager.photo_url} alt="" style={{ width: 44, height: 44, objectFit: "cover", borderRadius: "50%" }} />}
            <div>
              <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">👔 Manager</div>
              <div className="text-sm text-[#EDEDE3]">{manager.name}</div>
              <div className="text-xs text-[#6B8570]">
                {manager.nationality}{manager.age ? `, ${manager.age}` : ""}
                {manager.appointed_date && ` · since ${new Date(manager.appointed_date).toLocaleDateString(undefined, { month: "short", year: "numeric" })}`}
              </div>
              <div className="text-[10px] text-[#4A5C52] italic mt-0.5">
                Sourced data — can lag a real appointment, especially at clubs with frequent managerial change. Verify for anything time-sensitive.
              </div>
            </div>
          </div>
        )}

        {record && record.played > 0 && (
          <div className="mt-4 border border-[#2C4A3B] p-4">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Season Record</div>
            <div className="flex items-center gap-4 text-sm">
              <span className="font-plexmono text-[#EDEDE3]">{record.won}W {record.drawn}D {record.lost}L</span>
              <span className="text-[#6B8570]">·</span>
              <span className="text-[#9AAA9E]">{record.gf}-{record.ga} goals</span>
            </div>
            <div className="grid grid-cols-2 gap-3 mt-3 text-xs">
              {topScorer && (
                <button onClick={() => onSelectPlayer(topScorer)} className="text-left hover:text-[#E3A857]">
                  <span className="text-[#6B8570]">Top Scorer: </span>
                  <span className="text-[#EDEDE3]">{topScorer.name} ({topScorer.seasonTotals["Goals"]})</span>
                </button>
              )}
              {topRated && (
                <button onClick={() => onSelectPlayer(topRated)} className="text-left hover:text-[#E3A857]">
                  <span className="text-[#6B8570]">Top Rated: </span>
                  <span className="text-[#EDEDE3]">{topRated.name} ({topRated.metrics["Rating"].raw.toFixed(1)})</span>
                </button>
              )}
            </div>
          </div>
        )}

        {homeAway && homeAway.home?.played > 0 && (
          <div className="mt-3 border border-[#2C4A3B] p-4">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Home vs Away</div>
            <div className="grid grid-cols-2 gap-4 text-sm">
              <div>
                <div className="text-[#6B8570] text-xs mb-1">Home</div>
                <span className="font-plexmono text-[#EDEDE3]">{homeAway.home.won}W {homeAway.home.drawn}D {homeAway.home.lost}L</span>
                <span className="text-[#6B8570] text-xs ml-2">({homeAway.home.gf}-{homeAway.home.ga})</span>
              </div>
              <div>
                <div className="text-[#6B8570] text-xs mb-1">Away</div>
                <span className="font-plexmono text-[#EDEDE3]">{homeAway.away.won}W {homeAway.away.drawn}D {homeAway.away.lost}L</span>
                <span className="text-[#6B8570] text-xs ml-2">({homeAway.away.gf}-{homeAway.away.ga})</span>
              </div>
            </div>
          </div>
        )}

        {agesKnown.length > 0 && (
          <div className="mt-3 border border-[#2C4A3B] p-4">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">Squad Age Curve</div>
            <div className="flex items-end gap-2" style={{ height: 80 }}>
              {ageCurve.map(b => (
                <div key={b.label} className="flex-1 flex flex-col items-center justify-end h-full">
                  <div className="text-[10px] text-[#9AAA9E] mb-1">{b.count}</div>
                  <div className="w-full bg-[#E3A857]" style={{ height: `${Math.max(4, (b.count / maxBucketCount) * 60)}px` }} />
                  <div className="text-[10px] text-[#6B8570] mt-1">{b.label}</div>
                </div>
              ))}
            </div>
          </div>
        )}

        {youthPipeline && (
          <div className="mt-3 border border-[#2C4A3B] p-4">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">🌱 Youth Pipeline</div>
            <div className="text-sm text-[#EDEDE3]">
              <span className="font-plexmono text-[#E3A857]">{youthPipeline.count}</span> players U21
              <span className="text-[#6B8570] mx-2">·</span>
              avg potential <span className="font-plexmono text-[#E3A857]">{youthPipeline.avgPotential}</span>
            </div>
            {youthPipeline.topProspect && (
              <button onClick={() => onSelectPlayer(youthPipeline.topProspect)} className="text-xs text-[#6B8570] hover:text-[#E3A857] mt-1">
                Top prospect: {youthPipeline.topProspect.name} ({Math.round(youthPipeline.topProspect.potential)})
              </button>
            )}
          </div>
        )}

        <div className="grid grid-cols-3 gap-4 mt-6 border-b border-[#2C4A3B] pb-4">
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">Squad Size</div>
            <div className="text-2xl font-bold text-[#EDEDE3]">{players.length}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">Avg Age</div>
            <div className="text-2xl font-bold text-[#EDEDE3]">{avgAge ?? "—"}</div>
          </div>
          <div>
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570]">Avg Potential</div>
            <div className="text-2xl font-bold" style={{ color: potentialColor(avgPotential) }}>{avgPotential ?? "—"}</div>
          </div>
        </div>

        {byPosition.map(group => {
          const threshold = group.pos === "Goalkeeper" ? 2 : 4;
          const isThin = group.list.length <= threshold && group.pos !== "Other / Unknown";
          return (
          <div key={group.pos} className="mt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2 flex items-center gap-2">
              {group.pos} ({group.list.length})
              {isThin && (
                <span className="text-[#E36B57] normal-case tracking-normal" title="Thin squad depth in this position">
                  ⚠ Thin depth
                </span>
              )}
            </div>
            <div className="space-y-1">
              {group.list.map(p => (
                <button key={p.id} onClick={() => onSelectPlayer(p)}
                  className="w-full flex items-center justify-between text-sm py-1.5 px-2 -mx-2 hover:bg-[#152922] text-left">
                  <span className="flex items-center gap-2 text-[#EDEDE3]">
                    <Avatar name={p.name} photoUrl={p.photoUrl} size={24} />
                    {p.name} <span className="text-[#6B8570] text-xs">· Age {p.age ?? "—"}</span>
                  </span>
                  <span className="font-plexmono" style={{ color: potentialColor(p.potential) }}>
                    {p.potential ?? "—"}
                  </span>
                </button>
              ))}
            </div>
          </div>
          );
        })}

        {balance && Object.keys(balance).length > 0 && (
          <div className="mt-6 border-t border-[#2C4A3B] pt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">⚖️ Squad Balance</div>
            {Object.entries(balance).map(([position, data]) => (
              <div key={position} className="mb-2 flex items-center justify-between text-sm">
                <span className="text-[#EDEDE3]">{position}</span>
                <span className="text-xs" style={{ color: data.balanced ? "#7FD99A" : "#E36B57" }}>
                  {data.balanced ? "✓ Balanced" : "⚠ Lopsided"}
                  <span className="text-[#6B8570] ml-2">({Object.entries(data.archetype_breakdown).map(([a, n]) => `${a} ×${n}`).join(", ")})</span>
                </span>
              </div>
            ))}
          </div>
        )}

        {valueConcentration?.top3_share_pct != null && (
          <div className="mt-6 border-t border-[#2C4A3B] pt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">📊 Squad Value Concentration</div>
            <div className="text-sm text-[#EDEDE3] mb-2">
              Top 3 players account for <span className="font-plexmono text-[#E3A857]">{valueConcentration.top3_share_pct}%</span> of total squad quality
              {valueConcentration.top3_share_pct >= 40 && <span className="text-[#E36B57] text-xs ml-2">⚠ high reliance</span>}
            </div>
            <div className="text-xs text-[#6B8570]">
              {valueConcentration.top3_players.map(p => p.full_name).join(", ")}
            </div>
          </div>
        )}

        {partnerships?.length > 0 && (
          <div className="mt-6 border-t border-[#2C4A3B] pt-5">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">🤝 Best Playing Partnerships</div>
            {partnerships.map((p, i) => (
              <div key={i} className="flex items-center justify-between text-sm py-1.5 border-b border-[#1C2E26]">

function TransferSimulatorModal({ squad, clubName, onClose }) {
  const [playerOutId, setPlayerOutId] = useState("");
  const [searchText, setSearchText] = useState("");
  const [searchResults, setSearchResults] = useState([]);
  const [playerIn, setPlayerIn] = useState(null);

  useEffect(() => {
    if (!API_BASE_URL || searchText.trim().length < 2) { setSearchResults([]); return; }
    const timer = setTimeout(() => {
      const params = new URLSearchParams({ search: searchText.trim(), limit: "10" });
      fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
        .then(res => res.ok ? res.json() : [])
        .then(rows => setSearchResults(rows))
        .catch(() => setSearchResults([]));
    }, 300);
    return () => clearTimeout(timer);
  }, [searchText]);

  const computeAvg = (list, key) => {
    const known = list.filter(v => v[key] != null);
    return known.length ? (known.reduce((s, v) => s + v[key], 0) / known.length) : null;
  };

  const beforeAge = computeAvg(squad, "age");
  const beforePotential = computeAvg(squad.filter(p => p.potential != null).map(p => ({ potential: p.potential })), "potential");

  let afterAge = beforeAge, afterPotential = beforePotential;
  if (playerOutId && playerIn) {
    const remaining = squad.filter(p => String(p.id) !== String(playerOutId));
    const inAge = playerIn.date_of_birth ? (Date.now() - new Date(playerIn.date_of_birth).getTime()) / 3.15576e10 : null;
    const inPotential = playerIn.potential_index ?? null;
    const ageList = [...remaining.filter(p => p.age != null).map(p => p.age), ...(inAge != null ? [inAge] : [])];
    const potList = [...remaining.filter(p => p.potential != null).map(p => p.potential), ...(inPotential != null ? [inPotential] : [])];
    afterAge = ageList.length ? ageList.reduce((s, v) => s + v, 0) / ageList.length : null;
    afterPotential = potList.length ? potList.reduce((s, v) => s + v, 0) / potList.length : null;
  }

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[70]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-lg w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">🔄 Transfer Simulator — {clubName}</div>
          <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        </div>

        <div className="text-xs uppercase tracking-wide text-[#6B8570] mb-1">Player Out</div>
        <select value={playerOutId} onChange={e => setPlayerOutId(e.target.value)}
          className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] mb-4">
          <option value="">Select a player to remove...</option>
          {squad.map(p => <option key={p.id} value={p.id}>{p.name} ({p.posLabel})</option>)}
        </select>

        <div className="text-xs uppercase tracking-wide text-[#6B8570] mb-1">Player In</div>
        {!playerIn ? (
          <>
            <input value={searchText} onChange={e => setSearchText(e.target.value)}
              placeholder="Search player name..."
              className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3] mb-2" />
            <div className="max-h-48 overflow-y-auto mb-4">
              {searchResults.map(row => (
                <button key={row.id} onClick={() => { setPlayerIn(row); setSearchText(""); setSearchResults([]); }}
                  className="w-full flex items-center gap-2 text-sm py-2 px-2 hover:bg-[#152922] text-left">
                  <Avatar name={row.full_name} photoUrl={row.photo_url} size={22} />
                  <span className="text-[#EDEDE3] truncate">{row.full_name}</span>
                  <span className="text-[#6B8570] text-xs truncate">· {row.club}</span>
                </button>
              ))}
            </div>
          </>
        ) : (
          <div className="flex items-center justify-between border border-[#E3A857] px-3 py-2 mb-4">
            <span className="text-sm text-[#EDEDE3]">{playerIn.full_name} · {playerIn.club}</span>
            <button onClick={() => setPlayerIn(null)} className="text-xs text-[#6B8570] hover:text-[#E36B57]">Change</button>
          </div>
        )}

        <div className="border-t border-[#2C4A3B] pt-4 mt-2">
          <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Squad Impact</div>
          <div className="grid grid-cols-2 gap-4 text-sm">
            <div>
              <div className="text-[#6B8570] text-xs mb-1">Avg Age</div>
              <span className="font-plexmono text-[#EDEDE3]">{beforeAge?.toFixed(1) ?? "—"}</span>
              {playerOutId && playerIn && (
                <>
                  <span className="text-[#6B8570] mx-1">→</span>
                  <span className="font-plexmono" style={{ color: afterAge < beforeAge ? "#7FD99A" : afterAge > beforeAge ? "#E36B57" : "#9AAA9E" }}>{afterAge?.toFixed(1) ?? "—"}</span>
                </>
              )}
            </div>
            <div>
              <div className="text-[#6B8570] text-xs mb-1">Avg Potential</div>
              <span className="font-plexmono text-[#EDEDE3]">{beforePotential?.toFixed(1) ?? "—"}</span>
              {playerOutId && playerIn && (
                <>
                  <span className="text-[#6B8570] mx-1">→</span>
                  <span className="font-plexmono" style={{ color: afterPotential > beforePotential ? "#7FD99A" : afterPotential < beforePotential ? "#E36B57" : "#9AAA9E" }}>{afterPotential?.toFixed(1) ?? "—"}</span>
                </>
              )}
            </div>
          </div>
          {!(playerOutId && playerIn) && (
            <div className="text-xs text-[#6B8570] mt-3">Pick both a player out and a player in to see the impact.</div>
          )}
        </div>
      </div>
    </div>
  );
}

  return (
    <div className="px-6 md:px-10 py-8">

function ExploreView({ onSelectPlayer }) {
  const [boards, setBoards] = useState({});

  useEffect(() => {
    if (!API_BASE_URL) return;
    // Count-based stats only — ratio stats (pass accuracy %, duel win %)
    // are excluded here since a small sample can misleadingly rank #1
    // (e.g. 1/1 passes = "100%"), unlike raw counts which naturally
    // reward sustained real contribution.
    const specs = [
      { key: "scorers", title: "🥅 Top Scorers", sort: "goals", statField: "goals" },
      { key: "assists", title: "🎯 Most Assists", sort: "assists", statField: "assists" },
      { key: "keepers", title: "🧤 Most Saves", sort: "saves", position: "Goalkeeper", statField: "saves" },
      { key: "tacklers", title: "🛡 Most Tackles", sort: "tackles", statField: "tackles" },
      { key: "young", title: "🔮 Best U21 Prospects", sort: "potential", maxAge: 21, statField: "potential_index" },
      { key: "carded", title: "🟨 Most Cards", sort: "yellow_cards", statField: "yellow_cards" },
      { key: "ironman", title: "🏃 Iron Man (Most Minutes)", sort: "minutes_played", statField: "minutes_played" },
      { key: "hiddengems", title: "💎 Hidden Gems (Outside Top 5)", sort: "potential", excludeTop5: true, statField: "potential_index" },
    ];
    specs.forEach(spec => {
      const params = new URLSearchParams({ sort: spec.sort, limit: "8" });
      if (spec.position) params.set("position", spec.position);
      if (spec.maxAge) params.set("max_age", String(spec.maxAge));
      if (spec.excludeTop5) params.set("exclude_top5", "true");
      fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
        .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
        .then(rows => setBoards(prev => ({ ...prev, [spec.key]: { ...spec, rows } })))
        .catch(() => setBoards(prev => ({ ...prev, [spec.key]: { ...spec, rows: [] } })));
    });

    // Most Improved has a different shape (delta, not a simple sorted
    // column) so it's fetched from its own dedicated endpoint.
    fetch(`${API_BASE_URL}/players/most-improved?limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setBoards(prev => ({ ...prev, improved: { title: "📈 Most Improved", statField: "delta", rows: rows.map(r => ({ ...r, id: r.id, full_name: r.full_name, photo_url: r.photo_url, club: r.club })) } })))
      .catch(() => setBoards(prev => ({ ...prev, improved: { title: "📈 Most Improved", statField: "delta", rows: [] } })));

    fetch(`${API_BASE_URL}/players/clean-sheets?limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setBoards(prev => ({ ...prev, cleansheets: { title: "🧤 Clean Sheets", statField: "clean_sheets", rows } })))
      .catch(() => setBoards(prev => ({ ...prev, cleansheets: { title: "🧤 Clean Sheets", statField: "clean_sheets", rows: [] } })));

    fetch(`${API_BASE_URL}/players/debuts?limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setBoards(prev => ({ ...prev, debuts: { title: "🌟 Recent Debuts", statField: "debut", rows: rows.map(r => ({ ...r, full_name: r.full_name, club: r.club })) } })))
      .catch(() => setBoards(prev => ({ ...prev, debuts: { title: "🌟 Recent Debuts", statField: "debut", rows: [] } })));

    fetch(`${API_BASE_URL}/players/breakout-candidates?limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setBoards(prev => ({ ...prev, breakout: { title: "🚀 Breakout Candidates", statField: "breakout_score", rows } })))
      .catch(() => setBoards(prev => ({ ...prev, breakout: { title: "🚀 Breakout Candidates", statField: "breakout_score", rows: [] } })));

    fetch(`${API_BASE_URL}/players/most-capped?limit=8`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setBoards(prev => ({ ...prev, mostcapped: { title: "🌍 Most Capped Internationally", statField: "total_caps", rows: rows.map(r => ({ ...r, club: `${r.team_name} · ${r.club}` })) } })))
      .catch(() => setBoards(prev => ({ ...prev, mostcapped: { title: "🌍 Most Capped Internationally", statField: "total_caps", rows: [] } })));
  }, []);

  const order = ["scorers", "assists", "keepers", "tacklers", "young", "improved", "carded", "cleansheets", "debuts", "ironman", "hiddengems", "breakout", "mostcapped"];

  return (
    <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 gap-x-8 gap-y-8">
      {order.map(key => {
        const board = boards[key];
        return (
          <div key={key}>
            <div className="text-sm uppercase tracking-wide text-[#E3A857] font-plexmono mb-3">
              {board ? board.title : "Loading…"}
            </div>
            {!board && <div className="text-xs text-[#6B8570]">Fetching leaderboard…</div>}
            {board?.rows.length === 0 && (
              <div className="text-xs text-[#6B8570]">
                {key === "improved" ? "Not enough trend history yet — needs a few more nightly runs." : "No data yet."}
              </div>
            )}
            <div>
              {board?.rows.map((row, i) => (
                <button key={row.id} onClick={() => onSelectPlayer(row)}
                  className="w-full flex items-center justify-between text-sm py-2 px-2 -mx-2 hover:bg-[#152922] text-left border-b border-[#1C2E26]">
                  <span className="flex items-center gap-2 text-[#EDEDE3] truncate">
                    <span className="text-[#6B8570] w-5 shrink-0">{i + 1}.</span>
                    <Avatar name={row.full_name} photoUrl={row.photo_url} size={26} />
                    <span className="truncate">{row.full_name}</span>
                    <span className="text-[#6B8570] text-xs shrink-0">· {row.club}</span>
                  </span>
                  <span className="font-plexmono text-[#E3A857] shrink-0 pl-2 text-xs">
                    {board.statField === "potential_index"
                      ? Math.round(row.potential_index ?? 0)
                      : board.statField === "delta"
                        ? `+${Math.round(row.delta)}`
                        : board.statField === "debut"
                          ? new Date(row.match_date).toLocaleDateString(undefined, { day: "numeric", month: "short" })
                          : (row[board.statField] ?? 0)}
                  </span>
                </button>
              ))}
            </div>
          </div>
        );
      })}
    </div>
  );
}

function TeamOfSeasonModal({ allLeagueOptions, onClose }) {
  const [league, setLeague] = useState("");
  const [formation, setFormation] = useState("4-3-3");
  const [pool, setPool] = useState(null);
  const [exporting, setExporting] = useState(false);
  const pitchRef = useRef(null);

  useEffect(() => {
    if (!API_BASE_URL || !league) { setPool(null); return; }
    setPool(null);
    const params = new URLSearchParams({ league });
    fetch(`${API_BASE_URL}/team-of-season?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : null)
      .then(data => setPool(data))
      .catch(() => setPool(null));
  }, [league]);

  // Auto-assign top-ranked players per position into whichever slots the
  // selected formation needs — e.g. 4-3-3 takes the top 4 defenders, top 3
  // midfielders, top 3 forwards from the ranked pool the backend returned.
  const slots = {};
  if (pool) {
    const used = { Goalkeeper: 0, Defender: 0, Midfielder: 0, Attacker: 0 };
    const posForLabel = { GK: "Goalkeeper", DEF: "Defender", MID: "Midfielder", FWD: "Attacker" };
    FORMATIONS[formation].forEach(slot => {
      const pos = posForLabel[slot.label];
      const candidate = pool[pos]?.[used[pos]];
      if (candidate) {
        slots[slot.id] = { id: candidate.id, name: candidate.full_name, photoUrl: candidate.photo_url, potential: candidate.potential_index != null ? Math.round(candidate.potential_index) : null, archetype: candidate.archetype };
        used[pos]++;
      }
    });
  }

  const downloadImage = () => {
    if (!pitchRef.current || typeof html2canvas === "undefined") {
      alert("Image export isn't available right now — check your connection and try again.");
      return;
    }
    setExporting(true);
    html2canvas(pitchRef.current, { backgroundColor: "#0E1A15", scale: 2, useCORS: true })
      .then(canvas => {
        const link = document.createElement("a");
        link.download = `${league.replace(/\s+/g, "_")}_team_of_season.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      })
      .catch(() => alert("Image export failed — please try again."))
      .finally(() => setExporting(false));
  };

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-2xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">🌟 Team of the Season</div>
          <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        </div>

        <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 mb-4">
          <select value={league} onChange={e => setLeague(e.target.value)}
            className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3]">
            <option value="">Select a league...</option>
            {allLeagueOptions.map(l => <option key={l} value={l}>{l}</option>)}
          </select>
          <select value={formation} onChange={e => setFormation(e.target.value)}
            className="w-full bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none text-[#EDEDE3]">
            {FORMATION_NAMES.map(f => <option key={f} value={f}>{f}</option>)}
          </select>
        </div>

        {!league && <div className="text-sm text-[#6B8570] text-center py-8">Select a league — auto-built from real potential scores, not manually picked.</div>}
        {league && pool === null && <div className="text-sm text-[#6B8570] text-center py-8">Loading…</div>}

        {pool && (
          <>
            <div style={{ maxWidth: 300, margin: "0 auto", overflowX: "auto" }}>
              <DreamXIPitch slots={slots} formationSlots={FORMATIONS[formation]} formationName={`${league} · ${formation}`} size={300 / 600} />
            </div>
            <div style={{ position: "fixed", top: 0, left: -99999 }}>
              <DreamXIPitch slots={slots} formationSlots={FORMATIONS[formation]} formationName={`${league} · ${formation}`} forwardedRef={pitchRef} size={1} />
            </div>
            <div className="text-center mt-4">
              <button onClick={downloadImage} disabled={exporting}
                className="text-xs uppercase tracking-wide px-5 py-2 bg-[#E3A857] text-[#0E1A15] font-bold disabled:opacity-50">
                {exporting ? "Exporting…" : "⬇ Download Image"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );
}

// True whenever it's realistically possible something is live across the
// 17 tracked leagues (Japan through Argentina/MLS) — genuinely dead only
// roughly 3am-8am UK time. Uses Intl with an explicit timeZone so this
// stays correct across BST/GMT without manual offset math.
function isWithinLiveWindow() {
  const ukHour = parseInt(new Intl.DateTimeFormat("en-GB", {
    timeZone: "Europe/London", hour: "2-digit", hour12: false,
  }).format(new Date()), 10);
  return ukHour >= 8 || ukHour < 3; // active 08:00–02:59 UK, dead 03:00–07:59
}

function TransferCentreModal({ onClose }) {
  const [generalNews, setGeneralNews] = useState(null);
  const [clubFeeds, setClubFeeds] = useState({});
  const [favorites, setFavorites] = useState([]);

  const fetchGeneral = () => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/transfer-news?limit=30`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(rows => setGeneralNews(rows))
      .catch(() => setGeneralNews([]));
  };

  useEffect(() => {
    let favs = [];
    try { favs = JSON.parse(localStorage.getItem("scoutindex_favorite_clubs_v1") || "[]"); } catch (e) { /* start empty */ }
    setFavorites(favs);

    fetchGeneral();
    // The underlying cache refreshes every 5 minutes in the background
    // regardless of whether this is open — this just re-reads it
    // periodically so the DISPLAY stays current too, without needing to
    // manually refresh. Pauses when the tab isn't visible, same courtesy
    // as Live Scores, even though this endpoint is cheap either way.
    const interval = setInterval(() => {
      if (document.visibilityState === "visible") fetchGeneral();
    }, 120000); // every 2 minutes — the cache itself only changes every 5

    if (favs.length > 0 && API_BASE_URL) {
      favs.forEach(f => {
        const params = new URLSearchParams({ club: f.club, limit: "5" });

          .then(res => res.ok ? res.json() : [])
          .then(rows => setClubFeeds(prev => ({ ...prev, [f.club]: rows })))
          .catch(() => setClubFeeds(prev => ({ ...prev, [f.club]: [] })));
      });
    }

    return () => clearInterval(interval);
  }, []);

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-2xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>

        </div>

        {favorites.length > 0 && (
          <div className="mb-6">
            <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">⭐ Your Clubs</div>
            {favorites.map(f => (
              <div key={f.club} className="mb-3">
                <div className="text-xs text-[#E3A857] mb-1">{f.club}</div>
                {!clubFeeds[f.club] && <div className="text-xs text-[#6B8570]">Loading…</div>}

        {generalNews === null && <div className="text-sm text-[#6B8570]">Loading…</div>}
        {generalNews?.length === 0 && <div className="text-sm text-[#6B8570]">No transfer news cached yet — the background refresh may not have run yet.</div>}

function LiveScoresModal({ onClose }) {
  const [matches, setMatches] = useState(null);
  const [playerEvents, setPlayerEvents] = useState([]);
  const [shortlistClubs, setShortlistClubs] = useState([]);
  const [connectionMode, setConnectionMode] = useState("connecting"); // "connecting" | "live" | "fallback"
  const connectionModeRef = useRef("connecting"); // avoids a stale-closure read inside ws.onclose below
  const inWindow = isWithinLiveWindow();
  const wsRef = useRef(null);

  const setMode = (mode) => { connectionModeRef.current = mode; setConnectionMode(mode); };

  const fetchLiveOnce = () => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/live`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : { matches: [] })
      .then(data => setMatches(data.matches))
      .catch(() => setMatches([]));
  };

  useEffect(() => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/shortlist/clubs`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => res.ok ? res.json() : [])
      .then(clubs => setShortlistClubs(clubs))
      .catch(() => setShortlistClubs([]));
  }, []);

  useEffect(() => {
    if (!inWindow || !API_BASE_URL) return;

    // Real-time push via WebSocket — server polls once, pushes to every
    // connected client instantly, rather than each browser tab polling
    // independently every 60s. Falls back to the old REST polling if the
    // WebSocket connection fails for any reason (proxies, extensions,
    // network quirks) — this should always show SOMETHING, never just break.
    const wsUrl = API_BASE_URL.replace(/^http/, "ws") + "/ws/live" + (API_KEY ? `?key=${encodeURIComponent(API_KEY)}` : "");
    let fallbackInterval = null;

    try {
      const ws = new WebSocket(wsUrl);
      wsRef.current = ws;

      ws.onopen = () => setMode("live");
      ws.onmessage = (event) => {
        try {
          const data = JSON.parse(event.data);
          if (data.matches) setMatches(data.matches);
          if (data.player_event) {
            setPlayerEvents(prev => [data.player_event, ...prev].slice(0, 10));
          }
        } catch (e) { /* ignore a malformed frame, wait for the next one */ }
      };
      ws.onerror = () => {
        setMode("fallback");
        fetchLiveOnce();
        fallbackInterval = setInterval(fetchLiveOnce, 60000);
      };
      ws.onclose = () => {
        // Uses the ref, not the closed-over state var — connectionMode
        // itself would still read "connecting" here even after onopen
        // fired, since this closure was created when the effect first
        // ran, before that update happened.
        if (connectionModeRef.current === "live") {
          setMode("fallback");
          fetchLiveOnce();
          fallbackInterval = setInterval(fetchLiveOnce, 60000);
        }
      };
    } catch (e) {
      setMode("fallback");
      fetchLiveOnce();
      fallbackInterval = setInterval(fetchLiveOnce, 60000);
    }

    return () => {
      if (wsRef.current) wsRef.current.close();
      if (fallbackInterval) clearInterval(fallbackInterval);
    };
  }, [inWindow]);

  return (
    <div className="fixed inset-0 bg-black/85 flex items-center justify-center p-4 z-[60]" onClick={onClose}>
      <div className="bg-[#0E1A15] border border-[#E3A857] max-w-xl w-full max-h-[92vh] overflow-y-auto p-4 sm:p-6" onClick={e => e.stopPropagation()}>
        <div className="flex items-center justify-between mb-4">
          <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono flex items-center gap-2">
            <span className="w-2 h-2 rounded-full bg-[#E36B57] animate-pulse"></span> Live Scores
          </div>
          <button aria-label="Close" onClick={onClose} className="text-[#9AAA9E] hover:text-[#EDEDE3] text-xl">×</button>
        </div>

        {playerEvents.length > 0 && (
          <div className="mb-4 border border-[#E3A857] bg-[#1A2E22] p-3">
            <div className="text-[10px] uppercase tracking-wide text-[#E3A857] mb-2">⭐ Your Shortlist, Live</div>
            {playerEvents.map((ev, i) => (
              <div key={i} className="text-sm text-[#EDEDE3] py-1">
                {ev.type === "Goal" ? "⚽" : "🟨"} <span className="font-bold">{ev.player}</span> ({ev.team})
                <span className="text-[#6B8570] text-xs ml-2">{ev.minute}' · {ev.home_club} vs {ev.away_club}</span>
              </div>
            ))}
          </div>
        )}

        {!inWindow && (
          <div className="text-sm text-[#6B8570] text-center py-8">
            Live scores update 8am–3am UK time. Outside that window right now — check back soon.
          </div>
        )}
        {inWindow && matches === null && <div className="text-sm text-[#6B8570] text-center py-8">Loading…</div>}
        {inWindow && matches?.length === 0 && (
          <div className="text-sm text-[#6B8570] text-center py-8">Nothing live right now across your tracked leagues.</div>
        )}
        {inWindow && matches?.map((m, i) => {
          const isShortlistMatch = shortlistClubs.includes(m.home_club) || shortlistClubs.includes(m.away_club);
          return (
            <div key={i} className={`flex items-center justify-between text-sm py-2.5 border-b ${isShortlistMatch ? "border-[#E3A857] bg-[#1A2E22]" : "border-[#1C2E26]"}`}>
              <div className="text-[#6B8570] text-xs w-16 shrink-0">
                {m.status_short === "HT" ? "HT" : m.elapsed != null ? `${m.elapsed}'` : m.status_short}
              </div>
              <div className="flex-1 text-center text-[#EDEDE3] truncate px-2">
                {isShortlistMatch && <span className="mr-1">⭐</span>}
                {m.home_club} <span className="font-plexmono text-[#E3A857]">{m.home_score}–{m.away_score}</span> {m.away_club}
              </div>
              <div className="text-[#6B8570] text-xs w-24 text-right truncate shrink-0">{m.league}</div>
            </div>
          );
        })}
        {inWindow && (
          <div className="text-[10px] text-[#4A5C52] text-center mt-4">
            {connectionMode === "live" && "🟢 Live — instant updates as they happen."}
            {connectionMode === "fallback" && "🟡 Reconnecting — updating every 60s in the meantime."}
            {connectionMode === "connecting" && "Connecting…"}
            {" "}⭐ = a shortlisted player's club is playing.
          </div>
        )}
      </div>
    </div>
  );
}
