      <Section title="📈 Biggest Risers Since Last Visit">
        {(!movers || movers.risers.length === 0) && <div className="text-xs text-[#6B8570]">No movement detected yet — check back after your next visit.</div>}
        {movers?.risers.map(r => (
          <PlayerRow key={r.id} name={r.name} club={r.club} potential={r.potential} photoUrl={null}
            onClick={() => onSelectPlayer({ league_display: r.league, club: r.club, id: r.id })}
            rightExtra={<span className="font-plexmono text-[#7FD99A] shrink-0">{r.from} → {r.potential}</span>} />
        ))}
      </Section>

      <Section title="🔄 Recent Transfers">
        {transfers === null && <div className="text-xs text-[#6B8570]">Loading…</div>}
        {transfers?.length === 0 && <div className="text-xs text-[#6B8570]">No transfers detected yet.</div>}
        {transfers?.map(t => (
          <PlayerRow key={`${t.player_id}-${t.changed_at}`} name={t.full_name} club={t.new_club} league={null} photoUrl={null}
            onClick={() => onSelectPlayer({ league_display: t.league, club: t.new_club, id: String(t.player_id) })}
            rightExtra={<span className="text-xs text-[#9AAA9E] font-plexmono">{t.old_club} → <span className="text-[#E3A857]">{t.new_club}</span></span>} />
        ))}
      </Section>
    </div>
  );
}

function ScoutDashboard() {
  const [league, setLeague] = useState(() => new URLSearchParams(window.location.search).get("league") || "All leagues");
  const [club, setClub] = useState(() => new URLSearchParams(window.location.search).get("club") || "All clubs");
  const [position, setPosition] = useState(() => new URLSearchParams(window.location.search).get("position") || "All positions");
  const [query, setQuery] = useState("");
  const [searchResults, setSearchResults] = useState(null); // null = not actively searching
  const [moreMenuOpen, setMoreMenuOpen] = useState(false); // nav overflow dropdown

  // Real server-side search across the WHOLE database, not just whatever's
  // currently loaded — otherwise anyone outside the top-200 default view
  // (or the current league/club filter) is invisible to search.
  useEffect(() => {
    if (!API_BASE_URL || query.trim().length < 2) {
      setSearchResults(null);
      return;
    }
    const timer = setTimeout(() => {
      const params = new URLSearchParams({ search: query.trim(), limit: "50" });
      fetch(`${API_BASE_URL}/players?${params.toString()}`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
        .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
        .then(rows => setSearchResults(rows))
        .catch(() => setSearchResults([]));
    }, 300); // debounce — avoid firing on every keystroke
    return () => clearTimeout(timer);
  }, [query]);
  const [sortDesc, setSortDesc] = useState(true);
  const [sortBy, setSortBy] = useState("potential");
  const [hideUnscored, setHideUnscored] = useState(false);
  const [hideNoMinutes, setHideNoMinutes] = useState(true);
  const [shortlistOnly, setShortlistOnly] = useState(false);
  const [view, setView] = useState("cards");
  const [scatterX, setScatterX] = useState("Goals/90");
  const [scatterY, setScatterY] = useState("Key Passes/90");
  const [selected, setSelected] = useState(null);
  const [clubProfileOpen, setClubProfileOpen] = useState(false);
  const [transfersOpen, setTransfersOpen] = useState(false);
  const [dreamXIOpen, setDreamXIOpen] = useState(false);
  const [clubCompareOpen, setClubCompareOpen] = useState(false);
  const [fixturesOpen, setFixturesOpen] = useState(false);
  const [standingsOpen, setStandingsOpen] = useState(false);
  const [liveScoresOpen, setLiveScoresOpen] = useState(false);
  const [teamOfSeasonOpen, setTeamOfSeasonOpen] = useState(false);
  const [leagueStrengthOpen, setLeagueStrengthOpen] = useState(false);
  const [squadContinuityOpen, setSquadContinuityOpen] = useState(false);
  const [tablePredictorOpen, setTablePredictorOpen] = useState(false);
  const [intelligenceFeedOpen, setIntelligenceFeedOpen] = useState(false);
  const [scoutReportCardOpen, setScoutReportCardOpen] = useState(false);
  const [discoveryEngineOpen, setDiscoveryEngineOpen] = useState(false);
  const [transferCentreOpen, setTransferCentreOpen] = useState(false);
  const [underdogIndexOpen, setUnderdogIndexOpen] = useState(false);
  const [pipelineHealthOpen, setPipelineHealthOpen] = useState(false);
  const [weeklyDigestOpen, setWeeklyDigestOpen] = useState(false);
  const [positionScarcityOpen, setPositionScarcityOpen] = useState(false);
  const [rebuildRadarOpen, setRebuildRadarOpen] = useState(false);
  const [leagueReportOpen, setLeagueReportOpen] = useState(false);
  const [bigMatchRadarOpen, setBigMatchRadarOpen] = useState(false);
  const [matchEstimatorOpen, setMatchEstimatorOpen] = useState(false);
  const [recruitmentBoardOpen, setRecruitmentBoardOpen] = useState(false);
  const [suspensionRiskOpen, setSuspensionRiskOpen] = useState(false);
  const [injuryRecoveryOpen, setInjuryRecoveryOpen] = useState(false);
  const [homeAdvantageOpen, setHomeAdvantageOpen] = useState(false);
  const [dataQualityOpen, setDataQualityOpen] = useState(false);
  const [fixtureCongestionOpen, setFixtureCongestionOpen] = useState(false);
  const [superSubsOpen, setSuperSubsOpen] = useState(false);
  const [targetProfileSearchOpen, setTargetProfileSearchOpen] = useState(false);
  const [recruitmentPackOpen, setRecruitmentPackOpen] = useState(false);
  const [decliningMinutesOpen, setDecliningMinutesOpen] = useState(false);
  const [advancedSearchOpen, setAdvancedSearchOpen] = useState(false);
  const [deepLinkPlayerId, setDeepLinkPlayerId] = useState(() => new URLSearchParams(window.location.search).get("player"));
  const [livePlayers, setLivePlayers] = useState(null);
  const [connectionStatus, setConnectionStatus] = useState(API_BASE_URL ? "connecting" : "offline");
  const [compareList, setCompareList] = useState([]);
  const [comparing, setComparing] = useState(false);
  const [linkCopied, setLinkCopied] = useState(false);

  // Keep the URL in sync with the current filters — makes any specific view
  // (e.g. "Nottingham Forest players") bookmarkable and shareable via link.
  // replaceState (not pushState) so filter clicks don't spam browser history.
  useEffect(() => {
    const params = new URLSearchParams();
    if (league !== "All leagues") params.set("league", league);
    if (club !== "All clubs") params.set("club", club);
    if (position !== "All positions") params.set("position", position);
    const newUrl = params.toString() ? `${window.location.pathname}?${params.toString()}` : window.location.pathname;
    window.history.replaceState(null, "", newUrl);
  }, [league, club, position]);

  // Esc closes whichever modal is currently open.
  useEffect(() => {
    const onKeyDown = (e) => {
      if (e.key !== "Escape") return;
      setSelected(null);
      setComparing(false);
    };
    window.addEventListener("keydown", onKeyDown);
    return () => window.removeEventListener("keydown", onKeyDown);
  }, []);
  const [allLeagueOptions, setAllLeagueOptions] = useState([]);
  const [dataStatus, setDataStatus] = useState(null);

  // Fixed set of positions the API actually uses — cheaper than a dedicated
  // endpoint, and this genuinely doesn't change often.
  const POSITION_OPTIONS = ["Attacker", "Midfielder", "Defender", "Goalkeeper"];

  // Fetch the full list of leagues ONCE, independent of whatever players are
  // currently filtered — otherwise the league dropdown would only ever show
  // whichever league you're already viewing.
  useEffect(() => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/leagues`, { headers: API_KEY ? { "X-API-Key": API_KEY } : {} })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => setAllLeagueOptions(rows.map(r => r.league_display).sort()))
      .catch(() => {});
  }, []);

  // When did the nightly pipeline last actually finish? No API key needed —
  // /status is a lightweight, unauthenticated endpoint.
  useEffect(() => {
    if (!API_BASE_URL) return;
    fetch(`${API_BASE_URL}/status`)
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(data => setDataStatus(data))
      .catch(() => {});
  }, []);

  const [movers, setMovers] = useState(null); // null = not computed yet / no prior visit
  const [favoriteClubs, setFavoriteClubs] = useState([]);
  const FAVORITES_KEY = "scoutindex_favorite_clubs_v1";

  // Load favorites once on mount.
  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(FAVORITES_KEY) || "[]");
      if (Array.isArray(saved)) setFavoriteClubs(saved);
    } catch (e) { /* corrupted or unavailable storage — start empty */ }
  }, []);

  const isFavorited = (clubName, leagueName) =>
    favoriteClubs.some(f => f.club === clubName && f.league === leagueName);

  const toggleFavoriteClub = (clubName, leagueName) => {
    setFavoriteClubs(prev => {
      const next = isFavorited(clubName, leagueName)
        ? prev.filter(f => !(f.club === clubName && f.league === leagueName))
        : [...prev, { club: clubName, league: leagueName }];
      try { localStorage.setItem(FAVORITES_KEY, JSON.stringify(next)); } catch (e) { /* skip if storage unavailable */ }
      return next;
    });
  };

  const [savedViews, setSavedViews] = useState([]);
  const SAVED_VIEWS_KEY = "scoutindex_saved_views_v1";

  useEffect(() => {
    try {
      const saved = JSON.parse(localStorage.getItem(SAVED_VIEWS_KEY) || "[]");
      if (Array.isArray(saved)) setSavedViews(saved);
    } catch (e) { /* corrupted or unavailable storage — start empty */ }
  }, []);

  const persistSavedViews = (next) => {
    setSavedViews(next);
    try { localStorage.setItem(SAVED_VIEWS_KEY, JSON.stringify(next)); } catch (e) { /* skip if unavailable */ }
  };

  const saveCurrentView = () => {
    const name = prompt("Name this view (e.g. \"Championship U21 Defenders\"):");
    if (!name || !name.trim()) return;
    const newView = {
      id: `${Date.now()}`, name: name.trim(), league, club, position,
      sortBy, hideUnscored, hideNoMinutes,
    };
    persistSavedViews([...savedViews, newView]);
  };

  const applySavedView = (v) => {
    setLeague(v.league); setClub(v.club); setPosition(v.position);
    setSortBy(v.sortBy); setHideUnscored(v.hideUnscored); setHideNoMinutes(v.hideNoMinutes);
  };

  const deleteSavedView = (id) => {
    persistSavedViews(savedViews.filter(v => v.id !== id));
  };

  const [moversDismissed, setMoversDismissed] = useState(false);

  const SNAPSHOT_KEY = "scoutindex_snapshot_v1";

  function computeMovers(currentPlayers) {
    let prevSnapshot;
    try {
      prevSnapshot = JSON.parse(localStorage.getItem(SNAPSHOT_KEY) || "null");
    } catch (e) {
      prevSnapshot = null;
    }

    const currentSnapshot = {};
    currentPlayers.forEach(p => {
      if (p.potential != null) currentSnapshot[p.id] = { potential: p.potential, name: p.name, club: p.club, league: p.league };
    });

    let result = null;
    if (prevSnapshot) {
      const risers = [];
      const newEntries = [];
      Object.entries(currentSnapshot).forEach(([id, cur]) => {
        const prev = prevSnapshot[id];
        if (!prev) {
          newEntries.push({ id, ...cur });
        } else if (cur.potential - prev.potential >= 2) {
          risers.push({ id, ...cur, delta: cur.potential - prev.potential, from: prev.potential });
        }
      });
      risers.sort((a, b) => b.delta - a.delta);
      newEntries.sort((a, b) => b.potential - a.potential);
      if (risers.length > 0 || newEntries.length > 0) {
        result = { risers: risers.slice(0, 5), newEntries: newEntries.slice(0, 5) };
      }
    }

    try {
      localStorage.setItem(SNAPSHOT_KEY, JSON.stringify(currentSnapshot));
    } catch (e) { /* storage full or unavailable — silently skip persisting */ }

    return result;
  }

  const toggleCompare = (p) => {
    setCompareList(list => {
      if (list.find(x => x.id === p.id)) return list.filter(x => x.id !== p.id);
      if (list.length >= 4) return list;  // was >= 2, silently capping compare at 2 despite UI/ComparePanel both supporting up to 4
      return [...list, p];
    });
  };

  const toggleShortlist = async (p) => {
    if (!API_BASE_URL || !String(p.id).startsWith("live-")) return; // seed/demo players aren't real DB rows
    const realId = String(p.id).replace("live-", "");
    const newLevel = p.watchLevel === "shortlist" ? null : "shortlist";
    try {
      const res = await fetch(`${API_BASE_URL}/players/${realId}/watch`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          ...(API_KEY ? { "X-API-Key": API_KEY } : {}),
        },
        body: JSON.stringify({ watch_level: newLevel, author: "dashboard" }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      setLivePlayers(prev => prev ? prev.map(pl => pl.id === p.id ? { ...pl, watchLevel: newLevel } : pl) : prev);
      setSelected(sel => sel && sel.id === p.id ? { ...sel, watchLevel: newLevel } : sel);
    } catch (e) {
      console.error("Failed to update shortlist status:", e);
    }
  };

  useEffect(() => {
    if (!API_BASE_URL) return;
    let cancelled = false;
    setConnectionStatus("connecting");

    const params = new URLSearchParams();
    const filtersActive = league !== "All leagues" || position !== "All positions";
    // No filters at all = a curated "top prospects" landing view, capped at
    // 200. Any filter active = a much higher cap, since a single league or
    // position can genuinely have 500-1500+ real players.
    params.set("limit", filtersActive ? "3000" : "200");
    if (league !== "All leagues") params.set("league", league);
    if (position !== "All positions") params.set("position", position);

    fetch(`${API_BASE_URL}/players?${params.toString()}`, {
      headers: API_KEY ? { "X-API-Key": API_KEY } : {}
    })
      .then(res => { if (!res.ok) throw new Error(res.status); return res.json(); })
      .then(rows => {
        if (cancelled) return;
        const built = buildPercentilePlayers(rows);
        setLivePlayers(built);
        setConnectionStatus("live");
        // Only compute "since last visit" movers off the default, unfiltered
        // top-prospects view — filtered views would give a misleading,
        // scope-dependent comparison.
        if (!filtersActive) setMovers(computeMovers(built));
      })
      .catch(() => { if (!cancelled) setConnectionStatus("offline"); });
    return () => { cancelled = true; };
  }, [league, position]);

  const dataSource = livePlayers && connectionStatus === "live" ? livePlayers : PLAYERS;

  // Deep-link support: once live data is loaded, find and open the player
  // named in ?player=ID (the URL also restores league/club via the lazy
  // useState initializers above, so this works even outside the top-200).
  useEffect(() => {
    if (!deepLinkPlayerId || connectionStatus !== "live") return;
    const match = dataSource.find(p => p.id === `live-${deepLinkPlayerId}`);
    if (match) {
      setSelected(match);
      setDeepLinkPlayerId(null); // only auto-open once
    }
  }, [dataSource, connectionStatus, deepLinkPlayerId]);

  // While the real league list is still loading (API_BASE_URL set but
  // allLeagueOptions hasn't arrived yet), show just "All leagues" rather
  // than a misleading partial list derived from the 5 seed/demo players.
  const availableLeagues = allLeagueOptions.length > 0
    ? ["All leagues", ...allLeagueOptions]
    : API_BASE_URL
      ? ["All leagues"]
      : ["All leagues", ...Array.from(new Set(dataSource.map(p => p.league)))];
  const availablePositions = connectionStatus === "live"
    ? ["All positions", ...POSITION_OPTIONS]
    : ["All positions", ...Array.from(new Set(dataSource.map(p => p.position)))];
  // Only meaningful once a specific league is picked — dataSource is
  // comprehensive for that league at that point (up to 3000 players),
  // so this list is genuinely complete, not a sample.
  const availableClubs = league !== "All leagues"
    ? ["All clubs", ...Array.from(new Set(dataSource.map(p => p.club))).sort()]
    : ["All clubs"];

  const filtered = useMemo(() => {
    let list = dataSource.filter(p => {
      if (league !== "All leagues" && p.league !== league) return false;
      if (club !== "All clubs" && p.club !== club) return false;
      if (position !== "All positions" && p.position !== position) return false;
      if (hideUnscored && p.potential == null) return false;
      if (hideNoMinutes && (p.minutesPlayed == null || p.minutesPlayed === 0)) return false;
      if (shortlistOnly && p.watchLevel !== "shortlist") return false;
      return true;
    });

    const getSortValue = (p) => {
      if (sortBy === "potential") return p.potential;
      if (sortBy === "age") return p.age;
      if (sortBy === "name") return p.name.toLowerCase();
      return metricRaw(p.metrics[sortBy] ?? null);
    };

    list.sort((a, b) => {
      const av = getSortValue(a), bv = getSortValue(b);
      if (av == null && bv == null) return 0;
      if (av == null) return 1;
      if (bv == null) return -1;
      if (typeof av === "string") return sortDesc ? bv.localeCompare(av) : av.localeCompare(bv);
      return sortDesc ? bv - av : av - bv;
    });
    return list;
  }, [dataSource, league, club, position, sortDesc, sortBy, hideUnscored, hideNoMinutes, shortlistOnly]);

  const exportCSV = (rows, filename) => {
    if (!rows.length) { alert("Nothing to export — no players match the current view."); return; }
    // Defends against CSV/formula injection: a cell starting with =, +, -, or @
    // can be interpreted as a formula by Excel/Sheets when the file is opened.
    // Prefixing with a leading apostrophe forces it to be read as plain text.
    const sanitize = (v) => {
      const s = String(v);
      return /^[=+\-@]/.test(s) ? `'${s}` : s;
    };
    const headers = ["Name", "Club", "League", "Age", "Position", "Potential", "Minutes", "Goals", "Assists", "Watch Level"];
    const csvRows = [headers.join(",")];
    rows.forEach(p => {
      const row = [
        p.name, p.club, p.league, p.age ?? "", p.posLabel, p.potential ?? "",
        p.minutesPlayed ?? "", p.seasonTotals?.["Goals"] ?? "", p.seasonTotals?.["Assists"] ?? "",
        p.watchLevel ?? "",
      ].map(v => `"${sanitize(v).replace(/"/g, '""')}"`); // quote + escape for safety with commas/quotes in names
      csvRows.push(row.join(","));
    });
    const blob = new Blob([csvRows.join("\n")], { type: "text/csv;charset=utf-8;" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = filename;
    link.click();
  };

  const sortOptions = [
    { value: "potential", label: "Potential" },
    { value: "name", label: "Name" },
    { value: "age", label: "Age" },
    ...(connectionStatus === "live" ? [
      { value: "Goals/90", label: "Goals/90" },
      { value: "Key Passes/90", label: "Key Passes/90" },
      { value: "Tackles/90", label: "Tackles/90" },
      { value: "Interceptions/90", label: "Interceptions/90" },
      { value: "Shots on Target/90", label: "Shots on Target/90" },
    ] : []),
  ];

  const topProspectIds = useMemo(() => {
    if (connectionStatus !== "live") return new Set();
    const scored = dataSource.filter(p => p.potential != null);
    scored.sort((a, b) => b.potential - a.potential);
    return new Set(scored.slice(0, 3).map(p => p.id));
  }, [dataSource, connectionStatus]);

  const axisOptions = useMemo(() => {
    const keys = new Set();
    dataSource.forEach(p => Object.keys(p.metrics).forEach(k => keys.add(k)));
    return ["Potential", "Age", ...Array.from(keys)];
  }, [dataSource]);

  return (
    <div className="min-h-screen bg-[#0E1A15] text-[#EDEDE3]">
      <div className="border-b border-[#2C4A3B] px-6 py-10 md:px-10">
        <div className="flex items-center justify-between mb-3 flex-wrap gap-2">
          <div className="text-[11px] tracking-[0.25em] uppercase text-[#E3A857] font-plexmono">Cross-League Scouting Index</div>
          <div className="flex items-center flex-wrap gap-x-3 gap-y-1 text-[11px] uppercase tracking-wide text-[#6B8570]">
            {connectionStatus === "live" && (
              <>
                <button onClick={() => setDreamXIOpen(true)} className="hover:text-[#E3A857]">⚽ Dream XI</button>
                <button onClick={() => setClubCompareOpen(true)} className="hover:text-[#E3A857]">⚖ Compare Clubs</button>
                <button onClick={() => setFixturesOpen(true)} className="hover:text-[#E3A857]">📅 Fixtures</button>
                <button onClick={() => setLiveScoresOpen(true)} className="hover:text-[#E3A857]">🔴 Live</button>
                <div className="relative">
                  <button onClick={() => setMoreMenuOpen(o => !o)}
                    className={`hover:text-[#E3A857] flex items-center gap-1 ${moreMenuOpen ? "text-[#E3A857]" : ""}`}>
                    More {moreMenuOpen ? "▲" : "▼"}
                  </button>
                  {moreMenuOpen && (
                    <>
                      <div className="fixed inset-0 z-40" onClick={() => setMoreMenuOpen(false)}></div>
                      <div className="absolute left-0 top-full mt-2 z-50 bg-[#152922] border border-[#2C4A3B] shadow-lg py-2 w-64 max-h-[80vh] overflow-y-auto normal-case tracking-normal">
                        {[
                          { section: "Data & Results", items: [
                            ["🔄", "Transfers", setTransfersOpen],
                            ["🏆", "Standings", setStandingsOpen],
                            ["📈", "Table Predictor", setTablePredictorOpen],
                            ["📄", "League Report", setLeagueReportOpen],
                            ["⚡", "Big Match Radar", setBigMatchRadarOpen],
                            ["🎲", "Match Estimator", setMatchEstimatorOpen],
                            ["📋", "Recruitment Board", setRecruitmentBoardOpen],
                            ["🟨", "Suspension Risk", setSuspensionRiskOpen],
                            ["🩹", "Injury Recovery Patterns", setInjuryRecoveryOpen],
                            ["🏠", "Home Advantage Index", setHomeAdvantageOpen],
                            ["📅", "Fixture Congestion", setFixtureCongestionOpen],
                            ["⚡", "Super-Sub Detector", setSuperSubsOpen],
                            ["🎯", "Target Profile Search", setTargetProfileSearchOpen],
                            ["🔎", "Advanced Search", setAdvancedSearchOpen],
                          ]},
                          { section: "Scouting Intelligence", items: [
                            ["🧠", "Intelligence Feed", setIntelligenceFeedOpen],
                            ["🔮", "Discovery Engine", setDiscoveryEngineOpen],
                            ["📊", "My Report Card", setScoutReportCardOpen],
                            ["🎯", "Underdog Index", setUnderdogIndexOpen],
                            ["🔍", "Position Scarcity", setPositionScarcityOpen],
                            ["📉", "Declining Minutes", setDecliningMinutesOpen],
                          ]},
                          { section: "Club Analysis", items: [
                            ["🌟", "Team of Season", setTeamOfSeasonOpen],
                            ["🌍", "League Strength", setLeagueStrengthOpen],
                            ["♻️", "Continuity", setSquadContinuityOpen],
                            ["🏗️", "Rebuild Radar", setRebuildRadarOpen],
                          ]},
                          { section: "Live & Operations", items: [
                            ["🔄", "Transfer Centre", setTransferCentreOpen],
                            ["🩺", "Pipeline Health", setPipelineHealthOpen],
                            ["📋", "Data Quality", setDataQualityOpen],
                            ["📅", "Weekly Digest", setWeeklyDigestOpen],
                          ]},
                        ].map(group => (
                          <div key={group.section}>
                            <div className="px-4 pt-2 pb-1 text-[9px] uppercase tracking-wide text-[#4A5C52]">{group.section}</div>
                            {group.items.map(([icon, label, setter]) => (
                              <button key={label} onClick={() => { setter(true); setMoreMenuOpen(false); }}
                                className="w-full text-left px-4 py-2 text-xs text-[#9AAA9E] hover:text-[#E3A857] hover:bg-[#0E1A15] flex items-center gap-2">
                                <span>{icon}</span> {label}
                              </button>
                            ))}
                          </div>
                        ))}
                        <a href="https://talksport.com" target="_blank" rel="noopener noreferrer"
                          onClick={() => setMoreMenuOpen(false)}
                          className="w-full text-left px-4 py-2 text-xs text-[#9AAA9E] hover:text-[#E3A857] hover:bg-[#0E1A15] flex items-center gap-2">
                          <span>🎙️</span> Listen Live
                        </a>
                      </div>
                    </>
                  )}
                </div>
              </>
            )}
            {connectionStatus === "live" && dataStatus?.last_updated && (
              <span className="text-[#9AAA9E]" title={new Date(dataStatus.last_updated).toLocaleString()}>
                🔄 Updated {relativeTime(dataStatus.last_updated)}
                <span className="hidden sm:inline"> · {dataStatus.scored_players} players scored</span>
              </span>
            )}
            {connectionStatus === "live" && <>📡 Live API</>}
            {connectionStatus === "connecting" && <>⏳ Connecting...</>}
            {connectionStatus === "offline" && <>⚠ Seed data</>}
          </div>
        </div>
        <h1 className="text-3xl md:text-5xl leading-[1.05] max-w-3xl font-display">
          Find the player before the big five leagues do.
        </h1>
        <p className="text-[#9AAA9E] mt-4 max-w-2xl text-sm md:text-base">
          A scouting index spanning leagues most databases ignore. Filter, sort, and open any
          dossier for the full statistical + qualitative profile.
        </p>
      </div>

      {movers && !moversDismissed && league === "All leagues" && position === "All positions" && (
        <div className="px-6 md:px-10 py-5 border-b border-[#2C4A3B] bg-[#152922]">
          <div className="flex items-center justify-between mb-3">
            <div className="text-[11px] tracking-[0.2em] uppercase text-[#E3A857] font-plexmono">
              📈 Since Your Last Visit
            </div>
            <button aria-label="Dismiss" onClick={() => setMoversDismissed(true)}
              className="text-[#6B8570] hover:text-[#EDEDE3] text-lg leading-none">×</button>
          </div>
          <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
            {movers.risers.length > 0 && (
              <div>
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">Biggest Risers</div>
                <div className="space-y-1.5">
                  {movers.risers.map(r => (
                    <div key={r.id} className="flex items-center justify-between text-sm">
                      <span className="text-[#EDEDE3]">{r.name} <span className="text-[#6B8570] text-xs">· {r.club}</span></span>
                      <span className="font-plexmono text-[#7FD99A]">
                        {r.from} → {r.potential} (+{r.delta})
                      </span>
                    </div>
                  ))}
                </div>
              </div>
            )}
            {movers.newEntries.length > 0 && (
              <div>
                <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-2">New to Top Prospects</div>
                <div className="space-y-1.5">
                  {movers.newEntries.map(n => (
                    <div key={n.id} className="flex items-center justify-between text-sm">
                      <span className="text-[#EDEDE3]">{n.name} <span className="text-[#6B8570] text-xs">· {n.club}</span></span>
                      <span className="font-plexmono text-[#E3A857]">{n.potential}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      )}

      <div className="sticky top-0 z-30 bg-[#101F19] px-6 md:px-10 py-5 flex flex-col md:flex-row gap-3 md:items-center border-b border-[#2C4A3B] flex-wrap shadow-sm">
        <div className="h-10 flex items-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 flex-1 min-w-[180px]">
          🔍
          <input value={query} onChange={e => setQuery(e.target.value)}
            aria-label="Search player or club" placeholder="Search player or club..."
            className="bg-transparent outline-none text-sm w-full placeholder:text-[#6B8570]" />
        </div>
        <select value={league} onChange={e => { setLeague(e.target.value); setClub("All clubs"); }}
          className="h-10 bg-[#152922] border border-[#2C4A3B] px-3 text-sm outline-none w-full md:w-auto">
          {availableLeagues.map(l => <option key={l}>{l}</option>)}
        </select>
        {league !== "All leagues" && (
          <select value={club} onChange={e => setClub(e.target.value)}
            className="h-10 bg-[#152922] border border-[#2C4A3B] px-3 text-sm outline-none w-full md:w-auto">
            {availableClubs.map(c => <option key={c}>{c}</option>)}
          </select>
        )}
        {league !== "All leagues" && club !== "All clubs" && (
          <button onClick={() => toggleFavoriteClub(club, league)}
            title={isFavorited(club, league) ? "Remove from favorite clubs" : "Add to favorite clubs"}
            className={`h-10 px-3 border text-lg leading-none flex items-center ${isFavorited(club, league) ? "border-[#E3A857] text-[#E3A857]" : "border-[#2C4A3B] text-[#4A5C52] hover:text-[#9AAA9E]"}`}>
            {isFavorited(club, league) ? "★" : "☆"}
          </button>
        )}
        {league !== "All leagues" && club !== "All clubs" && (
          <button onClick={() => setClubProfileOpen(true)}
            className="h-10 px-3 border border-[#2C4A3B] text-[#9AAA9E] hover:border-[#E3A857] hover:text-[#E3A857] text-xs uppercase tracking-wide">
            🏟 View Squad
          </button>
        )}
        <select value={position} onChange={e => setPosition(e.target.value)}
          className="h-10 bg-[#152922] border border-[#2C4A3B] px-3 text-sm outline-none w-full md:w-auto">
          {availablePositions.map(p => <option key={p}>{p}</option>)}
        </select>
        <select value={sortBy} onChange={e => setSortBy(e.target.value)}
          className="h-10 bg-[#152922] border border-[#2C4A3B] px-3 text-sm outline-none w-full md:w-auto">
          {sortOptions.map(o => <option key={o.value} value={o.value}>Sort: {o.label}</option>)}
        </select>
        <button onClick={() => setSortDesc(s => !s)}
          className="h-10 flex items-center justify-center gap-2 bg-[#152922] border border-[#2C4A3B] px-3 text-sm hover:border-[#E3A857] w-full md:w-auto">
          {sortDesc ? "↓" : "↑"}
        </button>
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1">
            <input type="checkbox" checked={hideUnscored} onChange={e => setHideUnscored(e.target.checked)}
              className="accent-[#E3A857]" />
            Hide unscored
          </label>
        )}
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1" title="Hides players with 0 minutes across the whole ingested season — usually means they've left, retired, or a roster listing hasn't caught up">
            <input type="checkbox" checked={hideNoMinutes} onChange={e => setHideNoMinutes(e.target.checked)}
              className="accent-[#E3A857]" />
            Hide 0-minute players
          </label>
        )}
        {connectionStatus === "live" && (
          <label className="flex items-center gap-2 text-xs text-[#9AAA9E] cursor-pointer px-1">
            <input type="checkbox" checked={shortlistOnly} onChange={e => setShortlistOnly(e.target.checked)}
              className="accent-[#E3A857]" />
            ★ Shortlisted only
          </label>
        )}
        {(league !== "All leagues" || club !== "All clubs" || position !== "All positions" || query || hideUnscored || !hideNoMinutes || shortlistOnly) && (
          <button onClick={() => { setLeague("All leagues"); setClub("All clubs"); setPosition("All positions"); setQuery(""); setHideUnscored(false); setHideNoMinutes(true); setShortlistOnly(false); }}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2">
            Reset
          </button>
        )}
        {(league !== "All leagues" || club !== "All clubs" || position !== "All positions") && (
          <button onClick={() => {
              navigator.clipboard?.writeText(window.location.href);
              setLinkCopied(true);
              setTimeout(() => setLinkCopied(false), 1500);
            }}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2 flex items-center gap-1">
            🔗 {linkCopied ? "Copied!" : "Copy Link"}
          </button>
        )}
        {connectionStatus === "live" && (
          <button onClick={() => exportCSV(filtered, "scouting_export.csv")}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2">
            ⬇ Export CSV
          </button>
        )}
        {connectionStatus === "live" && (league !== "All leagues" || position !== "All positions") && (
          <button onClick={saveCurrentView}
            className="text-xs uppercase tracking-wide text-[#6B8570] hover:text-[#E3A857] px-2">
            💾 Save View
          </button>
        )}
        <div className="flex border border-[#2C4A3B] w-full md:w-auto md:ml-auto">
          <button onClick={() => setView("briefing")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "briefing" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            🏠 Briefing
          </button>
          <button onClick={() => setView("cards")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "cards" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Cards
          </button>
          <button onClick={() => setView("rankings")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "rankings" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Rankings
          </button>
          <button onClick={() => setView("scatter")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "scatter" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Scatter
          </button>
          <button onClick={() => setView("explore")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "explore" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            Explore
          </button>
          <button onClick={() => setView("shortlist")}
            className={`flex-1 md:flex-none px-3 py-2 text-xs uppercase tracking-wide ${view === "shortlist" ? "bg-[#E3A857] text-[#0E1A15]" : "text-[#9AAA9E]"}`}>
            ★ My Shortlist
          </button>
        </div>
      </div>

      {favoriteClubs.length > 0 && (
        <div className="px-6 md:px-10 py-3 flex flex-wrap gap-2 items-center border-b border-[#2C4A3B] bg-[#152922]">
          <span className="text-[10px] uppercase tracking-wide text-[#6B8570] mr-1">★ Favorites:</span>
          {favoriteClubs.map(f => (
            <button key={`${f.league}-${f.club}`}
              onClick={() => { setLeague(f.league); setClub(f.club); }}
              className={`text-xs px-3 py-1.5 border ${league === f.league && club === f.club ? "border-[#E3A857] text-[#E3A857] bg-[#0E1A15]" : "border-[#2C4A3B] text-[#9AAA9E] hover:border-[#6B8570]"}`}>
              {f.club}
            </button>
          ))}
        </div>
      )}

      {savedViews.length > 0 && (
        <div className="px-6 md:px-10 py-3 flex flex-wrap gap-2 items-center border-b border-[#2C4A3B] bg-[#152922]">
          <span className="text-[10px] uppercase tracking-wide text-[#6B8570] mr-1">💾 Saved Views:</span>
          {savedViews.map(v => (
            <div key={v.id} className="flex items-center border border-[#2C4A3B] hover:border-[#6B8570]">
              <button onClick={() => applySavedView(v)} className="text-xs px-3 py-1.5 text-[#9AAA9E] hover:text-[#E3A857]">
                {v.name}
              </button>
              <button onClick={() => deleteSavedView(v.id)} aria-label={`Delete saved view ${v.name}`}
                className="text-xs px-2 py-1.5 text-[#6B8570] hover:text-[#E36B57] border-l border-[#2C4A3B]">
                ×
              </button>
            </div>
          ))}
        </div>
      )}

      {searchResults === null && view === "scatter" && (
        <div className="px-6 md:px-10 py-4 flex flex-wrap gap-3 items-center border-b border-[#2C4A3B]">
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">X axis</span>
          <select value={scatterX} onChange={e => setScatterX(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs uppercase tracking-wide text-[#6B8570]">Y axis</span>
          <select value={scatterY} onChange={e => setScatterY(e.target.value)}
            className="bg-[#152922] border border-[#2C4A3B] px-3 py-2 text-sm outline-none">
            {axisOptions.map(k => <option key={k}>{k}</option>)}
          </select>
          <span className="text-xs text-[#6B8570] ml-auto">Click a point to open its dossier</span>
        </div>
      )}

      {searchResults === null && view === "explore" && connectionStatus === "live" && (
        <ExploreView onSelectPlayer={(row) => {
          // Reuse the tested deep-link mechanism — set matching filters so
          // this player is guaranteed to be in the fetched dataset, then
          // let the existing effect find and open their full dossier.
          if (row.league_display) setLeague(row.league_display);
          if (row.club) setClub(row.club);
          setDeepLinkPlayerId(String(row.id));
        }} />
      )}
      {searchResults === null && view === "explore" && connectionStatus !== "live" && (
        <div className="px-6 md:px-10 py-8 text-sm text-[#6B8570]">
          Explore needs a live connection to the API — currently showing seed data.
        </div>
      )}

      {searchResults === null && view === "shortlist" && connectionStatus === "live" && (
        <ShortlistView onSelectPlayer={(row) => {
          if (row.league_display) setLeague(row.league_display);
          if (row.club) setClub(row.club);
          setDeepLinkPlayerId(String(row.id));
        }} />
      )}
      {searchResults === null && view === "shortlist" && connectionStatus !== "live" && (
        <div className="px-6 md:px-10 py-8 text-sm text-[#6B8570]">
          Shortlist needs a live connection to the API — currently showing seed data.
        </div>
      )}

      {searchResults === null && view === "briefing" && connectionStatus === "live" && (
        <BriefingView movers={movers} topProspects={dataSource.slice(0, 5)}
          onSelectPlayer={(row) => {
            if (row.league_display) setLeague(row.league_display);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }} />
      )}
      {searchResults === null && view === "briefing" && connectionStatus !== "live" && (
        <div className="px-6 md:px-10 py-8 text-sm text-[#6B8570]">
          Briefing needs a live connection to the API — currently showing seed data.
        </div>
      )}

      {searchResults !== null && (
        <div className="px-6 md:px-10 py-6">
          <div className="text-[10px] uppercase tracking-wide text-[#6B8570] mb-3">
            {searchResults.length} result{searchResults.length !== 1 ? "s" : ""} for "{query}" — searched across all leagues
          </div>
          {searchResults.length === 0 && <div className="text-sm text-[#6B8570]">No players found.</div>}
          <div className="space-y-1">
            {searchResults.map(row => (
              <button key={row.id} onClick={() => {
                  if (row.league_display) setLeague(row.league_display);
                  if (row.club) setClub(row.club);
                  setDeepLinkPlayerId(String(row.id));
                  setQuery("");
                }}
                className="w-full flex items-center justify-between text-sm py-2.5 px-2 -mx-2 hover:bg-[#152922] text-left border-b border-[#1C2E26]">
                <span className="flex items-center gap-2 text-[#EDEDE3]">
                  <Avatar name={row.full_name} photoUrl={row.photo_url} size={28} />
                  {row.full_name} <span className="text-[#6B8570] text-xs">· {row.club} · {row.league_display}</span>
                </span>
                <span className="font-plexmono" style={{ color: potentialColor(row.potential_index != null ? Math.round(row.potential_index) : null) }}>
                  {row.potential_index != null ? Math.round(row.potential_index) : "—"}
                </span>
              </button>
            ))}
          </div>
        </div>
      )}

      {searchResults === null && view === "cards" && (
        <div className="px-6 md:px-10 py-8 grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-5 pb-24">
          {connectionStatus === "connecting" && (
            [...Array(6)].map((_, i) => (
              <div key={i} className="bg-[#152922] border border-[#2C4A3B] p-5 h-64 animate-pulse" />
            ))
          )}
          {connectionStatus !== "connecting" && filtered.map(p => (
            <PlayerCard key={p.id} p={p} onOpen={setSelected}
              onToggleCompare={toggleCompare}
              isComparing={!!compareList.find(x => x.id === p.id)}
              compareDisabled={compareList.length >= 4}
              isTopProspect={topProspectIds.has(p.id)}
              sortBy={sortBy}
              onToggleShortlist={connectionStatus === "live" ? toggleShortlist : null} />
          ))}
          {connectionStatus !== "connecting" && filtered.length === 0 && (
            <div className="text-[#6B8570] text-sm">No players match those filters.</div>
          )}
        </div>
      )}

      {searchResults === null && view === "rankings" && connectionStatus !== "connecting" && (
        <RankingsTable players={filtered} sortBy={sortBy} onSelect={setSelected}
          onToggleCompare={toggleCompare}
          compareIds={new Set(compareList.map(x => x.id))}
          compareDisabled={compareList.length >= 4}
          topProspectIds={topProspectIds} />
      )}

      {searchResults === null && view === "scatter" && connectionStatus !== "connecting" && (
        <div className="px-6 md:px-10 py-8 pb-24">
          <ScatterPlot players={filtered} xKey={scatterX} yKey={scatterY} onSelect={setSelected}
            topProspectIds={topProspectIds}
            compareIds={new Set(compareList.map(x => x.id))} />
        </div>
      )}

      <div className="px-6 md:px-10 py-6 border-t border-[#2C4A3B] text-xs text-[#6B8570]">
        ℹ When "Live API" shows above, you're looking at real ingested data. Radar/octagon charts
        show each stat as a percentile rank against real peers (same position where enough data
        exists, otherwise the whole ingested pool) — not a fixed scale. The axes shown adapt to
        position (attackers see goals/take-ons, defenders see tackles/interceptions, etc).
        Click the ★ on any live player to add them to your shortlist — it's saved to the database,
        not just this browser. "Unscored" players need more ingested match minutes before a
        potential score can be computed. A dossier's "Discipline" section (cards/fouls/offsides)
        only appears once real data exists — added recently, populates on the next data refresh.
      </div>

      {selected && <PlayerDossier key={selected.id} p={selected} onClose={() => setSelected(null)}
        onToggleShortlist={connectionStatus === "live" ? toggleShortlist : null}
        onNavigateToPlayer={(sp) => setSelected(sp)} />}
      {clubProfileOpen && league !== "All leagues" && club !== "All clubs" && (
        <ClubProfile
          players={dataSource.filter(p => p.club === club && p.league === league)}
          clubName={club}
          leagueName={league}
          onClose={() => setClubProfileOpen(false)}
          onSelectPlayer={(p) => { setClubProfileOpen(false); setSelected(p); }}
        />
      )}
      {transfersOpen && (
        <TransfersModal
          onClose={() => setTransfersOpen(false)}
          onSelectPlayer={(row) => {
            setTransfersOpen(false);
            // Reuse the deep-link mechanism (tested, correct) rather than
            // constructing an incomplete player object from the transfer row.
            // Also set league/club so the fetch scope actually includes this
            // player — otherwise the default top-200 view might not have them.
            if (row.league) setLeague(row.league);
            if (row.new_club) setClub(row.new_club);
            setDeepLinkPlayerId(String(row.player_id));
          }}
        />
      )}
      {dreamXIOpen && <DreamXIBuilder onClose={() => setDreamXIOpen(false)} />}
      {clubCompareOpen && <ClubCompareModal allLeagueOptions={allLeagueOptions} onClose={() => setClubCompareOpen(false)} />}
      {fixturesOpen && <FixturesModal allLeagueOptions={allLeagueOptions} onClose={() => setFixturesOpen(false)} />}
      {standingsOpen && <StandingsModal allLeagueOptions={allLeagueOptions} onClose={() => setStandingsOpen(false)} />}
      {liveScoresOpen && <LiveScoresModal onClose={() => setLiveScoresOpen(false)} />}
      {teamOfSeasonOpen && <TeamOfSeasonModal allLeagueOptions={allLeagueOptions} onClose={() => setTeamOfSeasonOpen(false)} />}
      {leagueStrengthOpen && <LeagueStrengthModal onClose={() => setLeagueStrengthOpen(false)} />}
      {squadContinuityOpen && <SquadContinuityModal onClose={() => setSquadContinuityOpen(false)} />}
      {tablePredictorOpen && <TablePredictorModal allLeagueOptions={allLeagueOptions} onClose={() => setTablePredictorOpen(false)} />}
      {intelligenceFeedOpen && (
        <IntelligenceFeedModal
          onClose={() => setIntelligenceFeedOpen(false)}
          onSelectPlayer={(row) => {
            setIntelligenceFeedOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {scoutReportCardOpen && (
        <ScoutReportCardModal
          onClose={() => setScoutReportCardOpen(false)}
          onSelectPlayer={(row) => {
            setScoutReportCardOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {discoveryEngineOpen && (
        <DiscoveryEngineModal
          onClose={() => setDiscoveryEngineOpen(false)}
          onSelectPlayer={(row) => {
            setDiscoveryEngineOpen(false);
            if (row.league_display) setLeague(row.league_display);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {transferCentreOpen && <TransferCentreModal onClose={() => setTransferCentreOpen(false)} />}
      {underdogIndexOpen && (
        <UnderdogIndexModal
          onClose={() => setUnderdogIndexOpen(false)}
          onSelectClub={(row) => {
            setUnderdogIndexOpen(false);
            setLeague(row.league_display);
            setClub(row.club);
            setClubProfileOpen(true);
          }}
        />
      )}
      {pipelineHealthOpen && <PipelineHealthModal onClose={() => setPipelineHealthOpen(false)} />}
      {dataQualityOpen && <DataQualityModal onClose={() => setDataQualityOpen(false)} />}
      {weeklyDigestOpen && (
        <WeeklyDigestModal
          onClose={() => setWeeklyDigestOpen(false)}
          onSelectPlayer={(row) => {
            setWeeklyDigestOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id || row.player_id));
          }}
        />
      )}
      {positionScarcityOpen && <PositionScarcityModal onClose={() => setPositionScarcityOpen(false)} />}
      {rebuildRadarOpen && (
        <RebuildRadarModal
          onClose={() => setRebuildRadarOpen(false)}
          onSelectClub={(row) => { setRebuildRadarOpen(false); setClub(row.club); }}
        />
      )}
      {leagueReportOpen && <LeagueReportModal allLeagueOptions={allLeagueOptions} onClose={() => setLeagueReportOpen(false)} />}
      {bigMatchRadarOpen && <BigMatchRadarModal onClose={() => setBigMatchRadarOpen(false)} />}
      {matchEstimatorOpen && <MatchEstimatorModal allLeagueOptions={allLeagueOptions} onClose={() => setMatchEstimatorOpen(false)} />}
      {decliningMinutesOpen && (
        <DecliningMinutesModal
          onClose={() => setDecliningMinutesOpen(false)}
          onSelectPlayer={(row) => {
            setDecliningMinutesOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {advancedSearchOpen && (
        <AdvancedSearchModal
          allLeagueOptions={allLeagueOptions}
          onClose={() => setAdvancedSearchOpen(false)}
          onSelectPlayer={(row) => {
            setAdvancedSearchOpen(false);
            if (row.league_display) setLeague(row.league_display);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      <CompareBar
        selected={compareList}
        onClear={() => setCompareList([])}
        onCompare={() => setComparing(true)}
        onRecruitmentPack={() => setRecruitmentPackOpen(true)}
      />
      {recruitmentPackOpen && compareList.length >= 2 && (
        <RecruitmentPackModal players={compareList} onClose={() => setRecruitmentPackOpen(false)} />
      )}
      {recruitmentBoardOpen && (
        <RecruitmentBoardModal
          onClose={() => setRecruitmentBoardOpen(false)}
          onSelectPlayer={(row) => {
            setRecruitmentBoardOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {suspensionRiskOpen && (
        <SuspensionRiskModal
          onClose={() => setSuspensionRiskOpen(false)}
          onSelectPlayer={(row) => {
            setSuspensionRiskOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {injuryRecoveryOpen && <InjuryRecoveryModal onClose={() => setInjuryRecoveryOpen(false)} />}
      {homeAdvantageOpen && (
        <HomeAdvantageModal
          onClose={() => setHomeAdvantageOpen(false)}
          onSelectClub={(row) => { setHomeAdvantageOpen(false); setClub(row.club); }}
        />
      )}
      {fixtureCongestionOpen && <FixtureCongestionModal onClose={() => setFixtureCongestionOpen(false)} />}
      {superSubsOpen && (
        <SuperSubsModal
          onClose={() => setSuperSubsOpen(false)}
          onSelectPlayer={(row) => {
            setSuperSubsOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {targetProfileSearchOpen && (
        <TargetProfileSearchModal
          onClose={() => setTargetProfileSearchOpen(false)}
          onSelectPlayer={(row) => {
            setTargetProfileSearchOpen(false);
            if (row.club) setClub(row.club);
            setDeepLinkPlayerId(String(row.id));
          }}
        />
      )}
      {comparing && compareList.length >= 2 && (
        <ComparePanel players={compareList} onClose={() => setComparing(false)} />
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<ScoutDashboard />);
</script>
</body>
</html>
